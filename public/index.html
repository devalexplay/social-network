<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
            --gold: #ffd700;
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: background 0.2s ease, color 0.2s ease; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loading-content { text-align: center; }
        .loading-logo { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border-color); background: var(--bg-primary); overflow-y: auto; transition: background 0.2s ease, border-color 0.2s ease; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; padding: 12px; color: var(--accent); letter-spacing: -1px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; font-size: 20px; font-weight: 400; width: fit-content; color: var(--text-secondary); background: transparent; transition: color 0.2s ease; }
        .nav-item:hover { color: var(--text-primary); background: transparent; }
        .nav-item.active { font-weight: 700; color: var(--accent); }
        .nav-item.logout:hover { color: #f4212e; }
        .nav-text { font-size: 20px; }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 12px 20px; z-index: 100; justify-content: space-around; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s ease; font-size: 12px; font-weight: 500; border-radius: 12px; }
        .bottom-nav-item.active { color: var(--accent); background: rgba(29, 155, 240, 0.1); }
        .bottom-nav-item span { font-size: 13px; font-weight: 500; }
        .bottom-nav-item:active { transform: scale(0.95); }
        
        .main-content { margin-left: 275px; flex: 1; min-height: 100vh; border-right: 1px solid var(--border-color); transition: border-color 0.2s ease; padding-bottom: 0; }
        .header { position: sticky; top: 0; background: var(--bg-primary); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 800; z-index: 10; color: var(--text-primary); transition: background 0.2s ease, color 0.2s ease; }
        
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin: 16px 0; }
        .stat-item { text-align: center; cursor: pointer; transition: opacity 0.2s ease; }
        .stat-item:hover { opacity: 0.7; }
        .stat-number { font-weight: 700; font-size: 18px; }
        .stat-label { color: var(--text-secondary); font-size: 13px; }
        
        .user-list { max-height: 300px; overflow-y: auto; margin: 16px 0; }
        .user-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 12px; transition: background 0.2s ease; }
        .user-list-item:hover { background: var(--hover-bg); }
        .user-list-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .feed-container { max-width: 600px; margin: 0 auto; }
        .create-post { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-img:hover { opacity: 0.8; }
        .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-placeholder:hover { opacity: 0.8; }
        .post-input-area { flex: 1; }
        .post-input-area textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 18px; resize: vertical; font-family: inherit; outline: none; min-height: 60px; }
        .post-actions-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .image-upload { color: var(--accent); cursor: pointer; font-size: 20px; padding: 8px; border-radius: 50%; transition: opacity 0.2s ease; }
        .image-upload:hover { opacity: 0.8; background: transparent; }
        .publish-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .publish-btn:hover { opacity: 0.9; }
        .publish-btn:active { transform: scale(0.98); }
        
        .post-card { border-bottom: 1px solid var(--border-color); padding: 12px 16px; transition: background 0.2s ease; cursor: pointer; }
        .post-card:hover { background: var(--hover-bg); }
        .post-header { display: flex; gap: 12px; }
        .post-avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .post-avatar-img:hover { opacity: 0.8; }
        .post-body { flex: 1; }
        .post-user { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .post-username { color: var(--text-secondary); font-weight: 400; font-size: 14px; cursor: pointer; transition: color 0.2s ease; }
        .post-username:hover { color: var(--accent); text-decoration: underline; }
        .post-time { color: var(--text-secondary); font-size: 13px; }
        .post-content { font-size: 15px; margin: 8px 0; line-height: 1.4; }
        .mention { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .mention:hover { opacity: 0.8; }
        .hashtag { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .hashtag:hover { opacity: 0.8; }
        .post-image { margin-top: 12px; border-radius: 16px; max-width: 100%; max-height: 400px; object-fit: cover; border: 1px solid var(--border-color); transition: transform 0.2s ease; }
        .post-image:hover { transform: scale(1.01); }
        .post-stats { display: flex; gap: 32px; margin-top: 12px; align-items: center; }
        .stat-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; transition: color 0.2s ease; }
        .stat-btn:hover { color: var(--text-primary); background: transparent; }
        .stat-btn.liked { color: #f91880; }
        .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 6px 12px; border-radius: 9999px; margin-left: auto; transition: color 0.2s ease; }
        .delete-btn:hover { color: #f4212e; background: transparent; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .comment { font-size: 14px; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .comment strong { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .comment strong:hover { opacity: 0.8; }
        .comment-input { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; padding: 10px 16px; color: var(--text-primary); outline: none; transition: all 0.2s ease; }
        .comment-input input:focus { border-color: var(--accent); transform: scale(1.01); }
        .profile-container { max-width: 600px; margin: 0 auto; }
        .profile-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; cursor: pointer; transition: opacity 0.2s ease; }
        .profile-avatar:hover { opacity: 0.8; }
        .follow-btn { background: var(--accent); color: white; border: none; padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.2s ease; }
        .follow-btn:hover { opacity: 0.9; }
        .unfollow-btn { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all 0.2s ease; }
        .unfollow-btn:hover { background: var(--hover-bg); }
        .search-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .search-input { width: 100%; padding: 12px 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; color: var(--text-primary); font-size: 16px; outline: none; transition: all 0.2s ease; }
        .search-input:focus { border-color: var(--accent); transform: scale(1.01); }
        .search-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; }
        .search-result:hover { background: var(--hover-bg); }
        .search-result-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .search-post-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s ease; }
        .search-post-result:hover { background: var(--hover-bg); }
        .recommendation-card { background: transparent; border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; }
        .recommendation-card:hover { background: var(--hover-bg); }
        .recommendation-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .notification { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; transition: background 0.2s ease; }
        .notification:hover { background: var(--hover-bg); }
        .notification-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .messages-container { display: flex; height: calc(100vh - 70px); background: var(--bg-primary); }
        .chat-sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .chat-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-color); font-weight: 700; }
        .chat-users-list { flex: 1; overflow-y: auto; }
        .chat-user-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s ease; border-bottom: 1px solid var(--border-color); }
        .chat-user-item:hover { background: var(--hover-bg); }
        .chat-user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .chat-user-info { flex: 1; }
        .chat-user-name { font-weight: 700; }
        .chat-user-last-message { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-main-header { padding: 16px; border-bottom: 1px solid var(--border-color); font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
        .message-wrapper.outgoing { align-self: flex-end; }
        .message-wrapper.incoming { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .message-bubble.outgoing { background: var(--accent); color: white; }
        .message-bubble.incoming { background: var(--border-color); }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 8px; cursor: pointer; }
        .message-reactions { display: flex; gap: 6px; margin-top: 6px; font-size: 12px; flex-wrap: wrap; }
        .reaction-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 12px; transition: background 0.2s ease; }
        .reaction-btn:hover { background: var(--hover-bg); }
        .reaction-badge { background: var(--bg-secondary); border-radius: 12px; padding: 2px 6px; font-size: 12px; cursor: pointer; transition: background 0.2s ease; }
        .chat-input-area { padding: 16px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; padding: 12px 16px; color: var(--text-primary); outline: none; }
        .chat-input:focus { border-color: var(--accent); }
        .chat-image-label { cursor: pointer; font-size: 20px; color: var(--accent); transition: opacity 0.2s ease; }
        .chat-image-label:hover { opacity: 0.8; }
        .chat-send-btn { background: var(--accent); border: none; border-radius: 9999px; padding: 8px 20px; color: white; cursor: pointer; transition: opacity 0.2s ease; }
        .chat-send-btn:hover { opacity: 0.9; }
        
        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .custom-modal-content { background: #000000; border-radius: 28px; padding: 28px; width: 400px; text-align: center; border: 1px solid #2f3336; max-height: 80vh; overflow-y: auto; }
        .custom-modal-content p { margin-bottom: 20px; font-size: 18px; font-weight: 500; color: var(--text-primary); }
        .custom-modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; }
        .custom-modal-content input:focus { border-color: var(--accent); }
        .custom-modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; resize: vertical; font-family: inherit; }
        .custom-modal-content textarea:focus { border-color: var(--accent); }
        .custom-modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; }
        .custom-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .custom-modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s ease; }
        .custom-modal-btn-yes { background: #f4212e; color: white; }
        .custom-modal-btn-cancel { background: #2f3336; color: white; }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        .custom-modal-btn:hover { opacity: 0.85; }
        .error-message { color: #f4212e; font-size: 13px; margin-top: 8px; text-align: center; }
        .success-message { color: #1d9bf0; font-size: 13px; margin-top: 8px; text-align: center; }
        .crop-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .crop-modal-content { background: #000000; border-radius: 28px; padding: 24px; width: 450px; max-width: 90%; text-align: center; border: 1px solid #2f3336; }
        .crop-container { position: relative; width: 300px; height: 300px; margin: 16px auto; overflow: hidden; border-radius: 50%; border: 2px solid var(--accent); cursor: grab; }
        .crop-container:active { cursor: grabbing; }
        .crop-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: none; transform-origin: center; }
        .zoom-slider { width: 100%; margin: 16px 0; accent-color: var(--accent); }
        .custom-select { position: relative; width: 100%; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 9999px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .custom-select:hover { border-color: var(--accent); }
        .custom-select-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 16px; margin-top: 8px; z-index: 100; overflow: hidden; }
        .custom-select-option { padding: 12px 16px; cursor: pointer; transition: background 0.2s ease; color: var(--text-primary); }
        .custom-select-option:hover { background: var(--hover-bg); }
        .custom-select-option.selected { color: var(--accent); }
        .auth-card { background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 40px; width: 400px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 8px; color: #ffffff; outline: none; transition: all 0.2s ease; }
        .auth-card input:focus { border-color: var(--accent); transform: scale(1.01); }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .auth-card button:hover { opacity: 0.9; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        .email-masked { color: var(--text-secondary); font-size: 14px; margin-top: 4px; display: inline-block; }
        .edit-link { color: var(--accent); font-size: 12px; cursor: pointer; margin-left: 8px; text-decoration: underline; transition: opacity 0.2s ease; }
        .edit-link:hover { opacity: 0.8; }
        .verified-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent); color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; transition: opacity 0.2s ease; }
        .verified-badge:hover { opacity: 0.8; }
        .gold-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--gold); color: #000000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; transition: opacity 0.2s ease; }
        .gold-badge:hover { opacity: 0.8; }
        .verification-popup { position: fixed; background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 20px; width: 320px; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: scaleIn 0.15s ease; }
        .user-preview { position: fixed; background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 16px; width: 280px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: scaleIn 0.15s ease; }
        .suggestions-dropdown { position: absolute; background: #000000; border: 1px solid #2f3336; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 150; width: 300px; }
        .suggestion-item { padding: 10px 12px; cursor: pointer; transition: background 0.2s ease; color: var(--text-primary); }
        .suggestion-item:hover { background: var(--hover-bg); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #2f3336; border-radius: 4px; transition: background 0.2s ease; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; border-right: none; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .header { font-size: 18px; padding: 14px 16px; }
            .feed-container { max-width: 100%; }
            .post-card { padding: 10px 12px; }
            .post-avatar-img, .avatar-img, .avatar-placeholder { width: 40px; height: 40px; font-size: 16px; }
            .post-content { font-size: 14px; }
            .post-username { font-size: 13px; }
            .stat-btn, .delete-btn { padding: 4px 8px; font-size: 12px; }
            .profile-avatar { width: 80px; height: 80px; }
            .profile-stats { gap: 20px; }
            .stat-number { font-size: 16px; }
            .stat-label { font-size: 11px; }
            .custom-modal-content { width: 90%; padding: 20px; }
            .publish-btn { padding: 6px 16px; font-size: 14px; }
            .chat-sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; z-index: 10; background: var(--bg-primary); transform: translateX(-100%); transition: transform 0.3s ease; }
            .chat-sidebar.open { transform: translateX(0); }
        }
        @media (max-width: 480px) {
            .bottom-nav-item span { font-size: 11px; }
            .bottom-nav-item { padding: 6px; }
            .post-stats { gap: 16px; }
        }
    </style>
</head>
<body>
<div id="loading" class="loading-screen">
    <div class="loading-content">
        <div class="loading-logo">FreedomNet</div>
    </div>
</div>
<div id="root" style="display:none;"></div>

<script>
    setTimeout(() => {
        const loading = document.getElementById('loading');
        const root = document.getElementById('root');
        if (loading) {
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
                root.style.display = 'block';
            }, 500);

    const allowedDomains = ['gmail.com', 'mail.com', 'hotmail.com', 'outlook.com', 'yahoo.com'];

    function isValidEmail(email) {
        const domain = email.split('@')[1];
        return allowedDomains.includes(domain);
    }

    function maskEmail(email) {
        if (!email) return '';
        const [local, domain] = email.split('@');
        const maskedLocal = local[0] + '*****' + local[local.length - 1];
        const maskedDomain = domain[0] + '***' + domain[domain.length - 1];
        return `${maskedLocal}@${maskedDomain}`;
    }

    function openCropModal(file) {
        cropImageFile = file;
        cropScale = 1;
        cropTranslateX = 0;
        cropTranslateY = 0;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const modal = document.createElement('div');
            modal.className = 'crop-modal';
            modal.innerHTML = `
                <div class="crop-modal-content">
                    <h3 style="margin-bottom:16px;">Adjust Avatar</h3>
                    <div class="crop-container" id="cropContainer">
                        <img class="crop-image" id="cropImage" src="${e.target.result}" style="transform: scale(1) translate(0px, 0px);">
                    </div>
                    <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1">
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button id="cropApply" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Apply</button>
                        <button id="cropCancel" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const cropImg = document.getElementById('cropImage');
            const container = document.getElementById('cropContainer');
            const slider = document.getElementById('zoomSlider');
            
            let startX, startY, startTranslateX, startTranslateY;
            
            const updateTransform = () => {
                cropImg.style.transform = `scale(${cropScale}) translate(${cropTranslateX}px, ${cropTranslateY}px)`;
            };
            
            slider.addEventListener('input', (e) => {
                cropScale = parseFloat(e.target.value);
                updateTransform();
            });
            
            const onMouseDown = (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startTranslateX = cropTranslateX;
                startTranslateY = cropTranslateY;
                container.style.cursor = 'grabbing';
                e.preventDefault();
            };
            
            const onMouseMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                cropTranslateX = startTranslateX + dx / cropScale;
                cropTranslateY = startTranslateY + dy / cropScale;
                updateTransform();
            };
            
            const onMouseUp = () => {
                isDragging = false;
                container.style.cursor = 'grab';
            };
            
            container.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            
            modal.querySelector('#cropApply').onclick = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 400;
                    canvas.width = size;
                    canvas.height = size;
                    
                    const imgWidth = img.width;
                    const imgHeight = img.height;
                    const scaledWidth = imgWidth * cropScale;
                    const scaledHeight = imgHeight * cropScale;
                    const dx = (size - scaledWidth) / 2 + (cropTranslateX * cropScale);
                    const dy = (size - scaledHeight) / 2 + (cropTranslateY * cropScale);
                    
                    ctx.drawImage(img, dx, dy, scaledWidth, scaledHeight);
                    canvas.toBlob((blob) => {
                        updateAvatar(blob);
                        modal.remove();
                    }, 'image/png');
                };
                img.src = URL.createObjectURL(cropImageFile);
            };
            modal.querySelector('#cropCancel').onclick = () => modal.remove();
            
            const clickOutside = (e) => {
                if (!modal.contains(e.target)) {
                    modal.remove();
                    document.removeEventListener('click', clickOutside);
                }
            };
            setTimeout(() => document.addEventListener('click', clickOutside), 100);
        };
        reader.readAsDataURL(file);
    }

    function parseMentionsAndHashtags(text) {
        if (!text) return '';
        let html = escapeHtml(text);
        html = html.replace(/@(\w+)/g, '<span class="mention" data-mention="$1">@$1</span>');
        html = html.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return html;
    }

        feedLoading = true;
        try {
            const res = await api(`/api/feed?offset=${feedOffset}&limit=15`);
            if (reset) {
                feed = res.posts;
            } else {
                feed = [...feed, ...res.posts];
            }
            feedHasMore = res.hasMore;
            feedOffset += 15;
            updateUnreadCount();
        } catch(e) { console.error(e); }
        feedLoading = false;
    }

        closeAllDropdowns();

    window.publishPost = async () => {
        const content = document.getElementById('postContent').value;
        const errorDiv = document.getElementById('postError');
        
        if (content.length < 4) {
            errorDiv.textContent = 'Post must be at least 4 characters';
            errorDiv.style.display = 'block';
            return;
        }
        if (content.length > 500) {
            errorDiv.textContent = 'Post cannot exceed 500 characters';
            errorDiv.style.display = 'block';
            return;
        }
        errorDiv.style.display = 'none';
        
        const formData = new FormData();
        formData.append('content', content);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        document.getElementById('postContent').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        await loadFeed(true);
        renderMain();
    };

    function attachGlobalEvents() {
        document.querySelectorAll('.mention, .hashtag, .post-username, .post-avatar-img, .avatar-placeholder, .avatar-img, .verified-badge, .gold-badge').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (el.classList.contains('verified-badge') || el.classList.contains('gold-badge')) {
                    const username = el.closest('[data-username]')?.dataset?.username || el.closest('.post-user')?.querySelector('.post-username')?.dataset?.username;
                    if (username) {
                        const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now(), is_creator: true };
                        const rect = el.getBoundingClientRect();
                        showVerificationPopup(user, rect.left, rect.bottom + 5, el.classList.contains('gold-badge'));
                    }
                    return;
                }
                const username = el.dataset?.mention || el.dataset?.username || el.closest('[data-username]')?.dataset?.username;
                if (username) {
                    const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() };
                    const rect = el.getBoundingClientRect();
                    showUserPreview(user, rect.left, rect.bottom + 5);
                }
            });
        });
    }

    function attachHomeEvents() {
        const textarea = document.getElementById('postContent');
        const suggestionsContainer = document.getElementById('suggestionsContainer');
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                const value = e.target.value;
                const lastWord = value.split(/[\s\n]/).pop();
                if (lastWord && (lastWord.startsWith('@') || lastWord.startsWith('#'))) {
                    const query = lastWord.substring(1);
                    if (lastWord.startsWith('@')) {
                        const matches = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m.username}" data-type="mention" style="padding:10px 12px; cursor:pointer;">@${escapeHtml(m.username)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    } else {
                        const hashtags = ['trending', 'news', 'viral', 'coding', 'design', 'tech', 'art', 'music'];
                        const matches = hashtags.filter(h => h.includes(query)).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m}" data-type="hashtag" style="padding:10px 12px; cursor:pointer;">#${escapeHtml(m)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    }
                    document.querySelectorAll('.suggestion-item').forEach(el => {
                        el.addEventListener('click', () => {
                            const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'mention' ? '@' : '#') + el.dataset.suggestion + ' ';
                            textarea.value = newValue;
                            suggestionsContainer.innerHTML = '';
                            textarea.focus();
                        });
                    });
                } else suggestionsContainer.innerHTML = '';
            });
        }
        const imageInput = document.getElementById('postImage');
        if (imageInput) {
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { pendingImage = ev.target.result; document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`; };
                    reader.readAsDataURL(file);
                }
            });
        }
    }

    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' });
        else await api(`/api/like/${postId}`, { method: 'POST' });
        await loadFeed(true);
        renderMain();
    };

    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed(true);
        renderMain();
    };

    window.switchTab = (tab) => { 
        currentTab = tab; 
        currentProfileUser = null; 
        currentChatUser = null; 
        closeAllDropdowns();
        closePreviewPopup();
        renderMain(); 
    };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

    (async () => {
        try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); } } catch(e) {}
        render();
    })();
</script>
</body>
</html>
