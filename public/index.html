<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
            --gold: #ffd700;
            --online-green: #23c55e;
            --offline-gray: #6b7280;
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: background 0.2s ease, color 0.2s ease; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes neonPulse {
            0% { text-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 15px #ffaa00, 0 0 20px #ffaa00; }
            50% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px #ffaa00, 0 0 40px #ffaa00; }
            100% { text-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 15px #ffaa00, 0 0 20px #ffaa00; }
        }
        
        .logo-pulse {
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0% { opacity: 1; text-shadow: 0 0 0px var(--accent); }
            50% { opacity: 0.7; text-shadow: 0 0 5px var(--accent); }
            100% { opacity: 1; text-shadow: 0 0 0px var(--accent); }
        }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loading-content { text-align: center; }
        .loading-logo { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border-color); background: var(--bg-primary); overflow-y: auto; transition: background 0.2s ease, border-color 0.2s ease; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; padding: 12px; color: var(--accent); letter-spacing: -1px; cursor: pointer; transition: opacity 0.2s; display: inline-block; }
        .logo:hover { opacity: 0.8; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; font-size: 20px; font-weight: 400; width: fit-content; color: var(--text-secondary); background: transparent; transition: color 0.2s ease; }
        .nav-item:hover { color: var(--text-primary); background: transparent; }
        .nav-item.active { font-weight: 700; color: var(--accent); }
        .nav-item.logout { color: var(--text-secondary); }
        .nav-item.logout:hover { color: #f4212e; background: transparent; }
        .nav-text { font-size: 20px; }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 12px 20px; z-index: 100; justify-content: space-around; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; cursor: pointer; color: var(--text-secondary); transition: color 0.2s ease; font-size: 12px; font-weight: 500; border-radius: 12px; }
        .bottom-nav-item.active { color: var(--accent); background: rgba(29, 155, 240, 0.1); }
        .bottom-nav-item span { font-size: 13px; font-weight: 500; }
        
        .main-content { margin-left: 275px; flex: 1; min-height: 100vh; border-right: 1px solid var(--border-color); transition: border-color 0.2s ease; padding-bottom: 0; }
        .header { position: sticky; top: 0; background: var(--bg-primary); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 800; z-index: 10; color: var(--text-primary); transition: background 0.2s ease, color 0.2s ease; }
        
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin: 16px 0; }
        .stat-item { text-align: center; cursor: pointer; transition: opacity 0.2s ease; }
        .stat-item:hover { opacity: 0.7; }
        .stat-number { font-weight: 700; font-size: 18px; }
        .stat-label { color: var(--text-secondary); font-size: 13px; }
        
        .user-list { max-height: 300px; overflow-y: auto; margin: 16px 0; }
        .user-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 12px; transition: background 0.2s ease; }
        .user-list-item:hover { background: var(--hover-bg); }
        .user-list-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .feed-container { max-width: 600px; margin: 0 auto; }
        .create-post { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-img:hover { opacity: 0.8; }
        .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-placeholder:hover { opacity: 0.8; }
        .post-input-area { flex: 1; }
        .post-input-area textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 18px; resize: vertical; font-family: inherit; outline: none; min-height: 60px; }
        .post-input-area textarea::placeholder { color: var(--text-secondary); }
        .post-actions-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .image-upload { color: var(--accent); cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: opacity 0.2s ease; }
        .image-upload:hover { opacity: 0.8; background: transparent; }
        .publish-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .publish-btn:hover { opacity: 0.9; }
        
        .post-card { border-bottom: 1px solid var(--border-color); padding: 12px 16px; transition: background 0.2s ease; cursor: pointer; position: relative; animation: fadeInUp 0.3s ease; }
        .post-card:hover { background: var(--hover-bg); }
        .post-header { display: flex; gap: 12px; }
        .post-avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .post-avatar-img:hover { opacity: 0.8; }
        .post-body { flex: 1; }
        .post-user { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .post-username { color: var(--text-secondary); font-weight: 400; font-size: 14px; cursor: pointer; transition: color 0.2s ease; }
        .post-username:hover { color: var(--accent); text-decoration: underline; }
        .post-time { color: var(--text-secondary); font-size: 13px; }
        .edited-badge { font-size: 11px; color: var(--text-secondary); font-style: italic; margin-left: 6px; }
        .post-content { font-size: 15px; margin: 8px 0; line-height: 1.4; }
        .mention { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .mention:hover { opacity: 0.8; }
        .hashtag { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .hashtag:hover { opacity: 0.8; }
        .post-image-container { position: relative; display: inline-block; margin-top: 12px; }
        .post-image { border-radius: 16px; max-width: 100%; max-height: 400px; object-fit: cover; border: 1px solid var(--border-color); transition: transform 0.2s ease; }
        .post-image:hover { transform: scale(1.01); }
        .remove-image-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: white; border: none; border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: opacity 0.2s ease; opacity: 0; }
        .post-image-container:hover .remove-image-btn { opacity: 1; }
        .remove-image-btn:hover { background: #f4212e; }
        .post-stats { display: flex; gap: 32px; margin-top: 12px; align-items: center; }
        .stat-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; transition: color 0.2s ease; }
        .stat-btn:hover { color: var(--text-primary); background: transparent; }
        .stat-btn.liked { color: #f91880; }
        .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 6px 12px; border-radius: 9999px; margin-left: auto; transition: color 0.2s ease; }
        .delete-btn:hover { color: #f4212e; background: transparent; }
        .delete-comment-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 9999px; margin-left: 8px; transition: color 0.2s ease; }
        .delete-comment-btn:hover { color: #f4212e; background: transparent; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .comment { font-size: 14px; margin: 8px 0; display: flex; align-items: center; gap: 8px; animation: fadeIn 0.2s ease; flex-wrap: wrap; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .comment strong { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .comment strong:hover { opacity: 0.8; }
        .comment-input { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; padding: 10px 16px; color: var(--text-primary); outline: none; transition: border-color 0.2s ease; }
        .comment-input input:focus { border-color: var(--accent); }
        .comment-send-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 18px; transition: color 0.2s ease; }
        .comment-send-btn:hover { color: var(--text-secondary); }
        .profile-container { max-width: 600px; margin: 0 auto; }
        .profile-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        .profile-avatar-wrapper { position: relative; display: inline-block; margin: 0 auto 16px; width: fit-content; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .profile-avatar:hover { opacity: 0.8; }
        .profile-online-indicator { position: absolute; bottom: 8px; right: 8px; width: 24px; height: 24px; background: var(--online-green); border-radius: 50%; border: 3px solid var(--bg-primary); z-index: 5; }
        .profile-offline-indicator { position: absolute; bottom: 8px; right: 8px; width: 24px; height: 24px; background: var(--offline-gray); border-radius: 50%; border: 3px solid var(--bg-primary); z-index: 5; }
        .follow-btn { background: var(--accent); color: white; border: none; padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.2s ease; }
        .follow-btn:hover { opacity: 0.9; }
        .unfollow-btn { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: background 0.2s ease; }
        .unfollow-btn:hover { background: var(--hover-bg); }
        .search-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .search-input-wrapper { display: flex; gap: 12px; align-items: center; }
        .search-input { flex: 1; padding: 12px 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; color: var(--text-primary); font-size: 16px; outline: none; transition: border-color 0.2s ease; }
        .search-input:focus { border-color: var(--accent); }
        .search-icon { font-size: 28px; cursor: pointer; color: var(--text-primary); transition: color 0.2s ease; user-select: none; }
        .search-icon:hover { color: var(--text-secondary); }
        .search-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; }
        .search-result:hover { background: var(--hover-bg); }
        .search-result-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .search-post-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s ease; }
        .search-post-result:hover { background: var(--hover-bg); }
        
        .static-card { background: transparent; border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; cursor: pointer; }
        .static-card:hover { background: var(--hover-bg); }
        .static-card-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        
        .notification { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; transition: background 0.2s ease; }
        .notification:hover { background: var(--hover-bg); }
        .notification-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        
        .messages-container { display: flex; height: calc(100vh - 70px); background: var(--bg-primary); }
        .conversations-sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .conversations-header { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .conversations-search-wrapper { display: flex; gap: 10px; align-items: center; }
        .conversations-search { flex: 1; padding: 10px 16px; background: var(--hover-bg); border: none; border-radius: 30px; color: var(--text-primary); font-size: 14px; outline: none; }
        .conversations-search-icon { font-size: 24px; cursor: pointer; color: var(--text-primary); transition: color 0.2s ease; user-select: none; }
        .conversations-search-icon:hover { color: var(--text-secondary); }
        .conversations-list { flex: 1; overflow-y: auto; }
        .conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s ease; border-bottom: 1px solid var(--border-color); }
        .conversation-item:hover { background: var(--hover-bg); }
        .conversation-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .conversation-info { flex: 1; min-width: 0; }
        .conversation-name { font-weight: 600; font-size: 15px; }
        .conversation-last-message { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conversation-unread { background: var(--accent); color: white; border-radius: 50%; min-width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; padding: 0 5px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-primary); }
        .chat-back-mobile { display: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .chat-user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-user-name { font-weight: 600; font-size: 16px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message-group { display: flex; flex-direction: column; margin-bottom: 8px; }
        .message-row { display: flex; align-items: flex-end; gap: 8px; }
        .message-row.outgoing { justify-content: flex-end; }
        .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .message-bubble.outgoing { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message-bubble.incoming { background: var(--border-color); border-bottom-left-radius: 4px; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 8px; cursor: pointer; }
        .message-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; margin-left: 8px; }
        .message-reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 16px; transition: background 0.2s ease; }
        .reaction-btn:hover { background: var(--hover-bg); }
        .reaction-badge { background: var(--bg-secondary); border-radius: 16px; padding: 2px 6px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
        .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; background: var(--bg-primary); }
        .chat-input { flex: 1; background: var(--hover-bg); border: none; border-radius: 25px; padding: 10px 16px; color: var(--text-primary); outline: none; font-size: 14px; }
        .chat-image-label { cursor: pointer; font-size: 22px; color: var(--accent); transition: opacity 0.2s ease; }
        .chat-send-btn { background: var(--accent); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.2s ease; color: white; font-size: 18px; }
        .empty-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 20px; }
        
        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
        .custom-modal-content { background: #000000; border-radius: 28px; padding: 28px; width: 400px; text-align: center; border: 1px solid #2f3336; max-height: 80vh; overflow-y: auto; animation: scaleIn 0.2s ease; }
        .custom-modal-content p { margin-bottom: 20px; font-size: 18px; font-weight: 500; color: var(--text-primary); }
        .custom-modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; transition: border-color 0.2s ease; }
        .custom-modal-content input:focus { border-color: var(--accent); }
        .custom-modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; resize: vertical; font-family: inherit; }
        .custom-modal-content textarea:focus { border-color: var(--accent); }
        .custom-modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; cursor: pointer; }
        .custom-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .custom-modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; transition: none; }
        .custom-modal-btn:hover { opacity: 0.9; }
        .custom-modal-btn-yes { background: #f4212e; color: white; }
        .custom-modal-btn-cancel { background: #2f3336; color: white; }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        .error-message { color: #f4212e; font-size: 13px; margin-top: 8px; text-align: center; }
        .success-message { color: #1d9bf0; font-size: 13px; margin-top: 8px; text-align: center; }
        
        .auth-card { background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 40px; width: 420px; max-width: 90%; animation: scaleIn 0.3s ease; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 8px; color: #ffffff; outline: none; transition: border-color 0.2s ease; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
        .auth-card button:hover { transform: scale(1.02); opacity: 0.9; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        .email-masked { color: var(--text-secondary); font-size: 14px; margin-top: 4px; display: inline-block; }
        .edit-link { color: var(--accent); font-size: 12px; cursor: pointer; margin-left: 8px; text-decoration: underline; transition: opacity 0.2s ease; }
        .edit-link:hover { opacity: 0.8; }
        .verified-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent); color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; transition: opacity 0.2s ease; }
        .verified-badge:hover { opacity: 0.8; }
        .gold-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--gold); color: #000000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; animation: neonPulse 1.5s ease-in-out infinite; }
        .gold-badge:hover { opacity: 0.9; }

    // WebSocket connection for real-time updates
    function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onopen = () => {
            console.log('WebSocket connected');
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'new_post') {
                    // Add new post to feed instantly
                    feed.unshift(data.post);
                    if (currentTab === 'feed') {
                        updateFeedPosts();
                    }
                    showToast('New post from ' + data.post.username);
                } else if (data.type === 'new_comment') {
                    // Update comments on the post
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed[postIndex].comments = data.comments;
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                } else if (data.type === 'post_deleted') {
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed.splice(postIndex, 1);
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                } else if (data.type === 'like_update') {
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed[postIndex].likes_count = data.likes_count;
                        feed[postIndex].user_liked = data.user_liked;
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                }
            } catch(e) { console.error('WebSocket message error:', e); }
        };
        
        ws.onclose = () => {
            console.log('WebSocket disconnected, reconnecting...');
            reconnectTimeout = setTimeout(connectWebSocket, 3000);
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };
    }
    
    function sendWebSocketMessage(type, data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type, ...data }));
        }
    }

    function openAdvancedCropModal(file) {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => {
            img.src = e.target.result;
            img.onload = () => {
                cropScale = 1; cropTranslateX = 0; cropTranslateY = 0;
                const modal = document.createElement('div');
                modal.className = 'crop-modal';
                modal.innerHTML = `<div class="crop-modal-content"><h3 style="margin-bottom:16px;">Adjust Avatar</h3><div class="crop-container" id="cropContainer"><img class="crop-image" id="cropImage" src="${img.src}" style="transform: scale(1) translate(0px, 0px);"><div class="crop-grid"><div class="vline"></div><div class="vline"></div></div></div><input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1"><div style="display:flex; gap:12px; margin-top:20px;"><button id="cropApply" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Apply</button><button id="cropCancel" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button></div></div>`;
                document.body.appendChild(modal);
                const cropImg = document.getElementById('cropImage'); const container = document.getElementById('cropContainer'); const slider = document.getElementById('zoomSlider');
                let startX, startY, startTranslateX, startTranslateY, isDraggingCrop = false;
                const updateTransform = () => { cropImg.style.transform = `scale(${cropScale}) translate(${cropTranslateX}px, ${cropTranslateY}px)`; };
                slider.addEventListener('input', (e) => { cropScale = parseFloat(e.target.value); updateTransform(); });
                const onMouseDown = (e) => { isDraggingCrop = true; startX = e.clientX; startY = e.clientY; startTranslateX = cropTranslateX; startTranslateY = cropTranslateY; container.style.cursor = 'grabbing'; e.preventDefault(); };
                const onMouseMove = (e) => { if (!isDraggingCrop) return; const dx = e.clientX - startX; const dy = e.clientY - startY; cropTranslateX = startTranslateX + dx / cropScale; cropTranslateY = startTranslateY + dy / cropScale; updateTransform(); };
                const onMouseUp = () => { isDraggingCrop = false; container.style.cursor = 'grab'; };
                container.addEventListener('mousedown', onMouseDown); window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
                modal.querySelector('#cropApply').onclick = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const size = 400; canvas.width = size; canvas.height = size;
                    const imgWidth = img.width, imgHeight = img.height, scaledWidth = imgWidth * cropScale, scaledHeight = imgHeight * cropScale;
                    const dx = (size - scaledWidth) / 2 + (cropTranslateX * cropScale), dy = (size - scaledHeight) / 2 + (cropTranslateY * cropScale);
                    ctx.drawImage(img, dx, dy, scaledWidth, scaledHeight);
                    canvas.toBlob((blob) => { updateAvatar(blob); modal.remove(); }, 'image/png');
                };
                modal.querySelector('#cropCancel').onclick = () => modal.remove();
                setTimeout(() => document.addEventListener('click', (e) => { if (!modal.contains(e.target)) modal.remove(); }), 100);
            };
        };
        reader.readAsDataURL(file);
    }

        html = html.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return html;
    }

    function showMessage(elementId, message, isError = false) {

            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'error-message' : 'success-message';

    async function loadFeed(reset = false) {

        feedLoading = true;
        try {
            const res = await api(`/api/feed?offset=${feedOffset}&limit=15`);
            if (reset) feed = res.posts; else feed = [...feed, ...res.posts];
            feedHasMore = res.hasMore; feedOffset += 15;
            updateUnreadCountAndTitle();
        } catch(e) { console.error(e); }

    function renderMessages() {
        return `<div class="messages-container"><div class="conversations-sidebar" id="conversationsSidebar"><div class="conversations-header"><div class="conversations-search-wrapper"><input type="text" id="conversationsSearch" class="conversations-search" placeholder="Search conversations..." onkeypress="if(event.key==='Enter') searchConversations()"><span class="conversations-search-icon" onclick="searchConversations()">⌕</span></div></div><div class="conversations-list" id="conversationsList">${conversationsList.map(c => `<div class="conversation-item ${currentChatUser && currentChatUser.id === c.other_id ? 'active' : ''}" onclick="openChat(${c.other_id}, '${escapeHtml(c.username)}', '${c.avatar || ''}')"><img class="conversation-avatar" src="${c.avatar || ''}" onerror="this.style.display='none'; this.after(document.createTextNode(c.username[0].toUpperCase()))"><div class="conversation-info"><div class="conversation-name">${escapeHtml(c.username)}${renderCreatorBadge(c.is_creator, c.is_official)}</div><div class="conversation-last-message">${escapeHtml(c.last_message || '')}</div></div>${c.unread > 0 ? `<div class="conversation-unread">${c.unread}</div>` : ''}</div>`).join('')}${conversationsList.length === 0 ? '<div style="padding:20px; text-align:center; color:var(--text-secondary);">No conversations yet</div>' : ''}</div></div><div class="chat-area">${currentChatUser ? `<div class="chat-header"><span class="chat-back-mobile" onclick="document.getElementById('conversationsSidebar').classList.add('open')">←</span><img class="chat-user-avatar" src="${currentChatUser.avatar || ''}" onerror="this.style.display='none';"><div class="chat-user-name">${escapeHtml(currentChatUser.username)}${renderCreatorBadge(currentChatUser.is_creator, currentChatUser.is_official)}</div></div><div class="chat-messages" id="chatMessages">${currentChatMessages.map(m => `<div class="message-group"><div class="message-row ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}"><div class="message-bubble ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">${escapeHtml(m.content || '')}${m.image ? `<img src="${m.image}" class="message-image" onclick="window.open('${m.image}')">` : ''}</div></div><div class="message-row ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}"><div class="message-time">${formatTime(m.created_at)}</div></div><div class="message-reactions ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">${['❤️', '😂', '😮', '😢', '😡', '👍'].map(r => `<button class="reaction-btn" onclick="addMessageReaction(${m.id}, '${r}')">${r}</button>`).join('')}${(messageReactions[m.id] || []).length > 0 ? `<div class="reaction-badge">${(messageReactions[m.id] || []).map(r => r.reaction).join(' ')}</div>` : ''}</div></div>`).join('')}${currentChatMessages.length === 0 ? '<div class="empty-chat">Send a message to start chatting!</div>' : ''}</div><div class="chat-input-area"><input type="text" id="chatMessageInput" class="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter'){ const val=this.value; this.value=''; sendMessageWithImage(null, val); }"><label class="chat-image-label">🖼️<input type="file" id="chatImageInput" accept="image/*" style="display:none;" onchange="sendMessageWithImage(this.files[0], '')"></label><button class="chat-send-btn" onclick="const input=document.getElementById('chatMessageInput'); const val=input.value; input.value=''; sendMessageWithImage(null, val);">➤</button></div></div>` : `<div class="empty-chat">Select a conversation to start messaging</div>`}</div></div>`;
    }
    
    function renderSearch() {
        return `<div class="search-container"><div class="search-input-wrapper"><input type="text" id="searchInput" class="search-input" placeholder="Search users or posts..." onkeypress="if(event.key==='Enter') performSearch()"><span class="search-icon" onclick="performSearch()">⌕</span></div><div id="searchResults" style="margin-top:20px;">${searchResults.length > 0 ? '<h3 style="margin-bottom:12px;">Users</h3>' : ''}${searchResults.map(u => `<div class="search-result" onclick="viewProfile('${u.username}')"><img class="search-result-avatar" src="${u.avatar || ''}" onerror="this.style.display='none';"><div><strong>${escapeHtml(u.username)}</strong>${renderCreatorBadge(u.is_creator, u.is_official)}<div style="color:var(--text-secondary);">@${escapeHtml(u.username)}</div></div></div>`).join('')}${searchPosts.length > 0 ? '<h3 style="margin-bottom:12px; margin-top:20px;">Posts</h3>' : ''}${searchPosts.map(post => `<div class="search-post-result" onclick="viewProfile('${post.username}')"><div><strong>${escapeHtml(post.username)}</strong><div style="color:var(--text-secondary); font-size:12px;">${new Date(post.created_at).toLocaleString()}</div></div><div style="margin-top:8px;">${escapeHtml(post.content?.substring(0, 100))}${post.content?.length > 100 ? '...' : ''}</div></div>`).join('')}${searchQuery && searchResults.length === 0 && searchPosts.length === 0 ? '<div style="padding:20px; color:var(--text-secondary);">No results found</div>' : ''}</div></div>`;
    }
    
    function renderInteresting() {
        const interestingPosts = feed.filter(p => shouldShowNotification(p)).slice(0,5);
        return `<div class="feed-container">${interestingPosts.map(post => `<div class="static-card"><img class="static-card-avatar" src="${post.avatar || ''}" onerror="this.style.display='none';"><div><strong onclick="viewProfile('${post.username}')" style="cursor:pointer;">@${escapeHtml(post.username)}</strong>${renderCreatorBadge(post.is_creator, post.is_official)}<div>${parseMentionsAndHashtags(post.content || '')}</div><button onclick="followUser(${post.user_id})" style="margin-top:8px; background:var(--accent); border:none; padding:4px 16px; border-radius:20px; color:white; cursor:pointer;">${t('follow')}</button></div></div>`).join('')}</div>`;
    }
    
    function renderNotifications() {
        const notificationPosts = feed.filter(p => shouldShowNotification(p)).slice(0,8);
        return `<div class="feed-container">${notificationPosts.map(post => `<div class="notification"><img class="notification-avatar" src="${post.avatar || ''}" onerror="this.style.display='none';"><div><strong onclick="viewProfile('${post.username}')" style="cursor:pointer;">${escapeHtml(post.username)}</strong>${renderCreatorBadge(post.is_creator, post.is_official)} ${post.user_liked ? 'liked your post' : (post.content ? 'posted: ' + escapeHtml(post.content.substring(0, 50)) : 'interacted with you')}</div></div>`).join('')}</div>`;
    }
    
    function renderFeedback() { return `<div class="feed-container" style="padding:20px;"><div class="static-card" onclick="showFeedbackModal()" style="cursor:pointer;"><div><strong>📝 ${t('feedback')}</strong><div style="color:var(--text-secondary);">Report bugs, suggest features, or report users</div></div></div></div>`; }
    
    function renderMore() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const themeNames = { dark: 'Dark (Black)', 'dark-gray': 'Dark Gray', gray: 'Gray', light: 'Light' };
        
        setTimeout(() => {
            const themeSelect = document.getElementById('themeSelect');
            const langSelect = document.getElementById('languageSelect');
            const notifSelect = document.getElementById('notificationsSelect');
            if (themeSelect) { themeSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('themeDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; themeSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            if (langSelect) { langSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('languageDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; langSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            if (notifSelect) { notifSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('notificationsDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; notifSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            document.addEventListener('click', (e) => { if (!e.target.closest('.custom-select')) closeAllDropdowns(); });
        }, 10);
        
        const languages = [
            { code: 'en', name: 'English' }, { code: 'ru', name: 'Русский' },
            { code: 'es', name: 'Español' }, { code: 'fr', name: 'Français' },
            { code: 'ar', name: 'العربية' }, { code: 'el', name: 'Ελληνικά' },
            { code: 'zh', name: '中文' }, { code: 'pt', name: 'Português' },
            { code: 'de', name: 'Deutsch' }, { code: 'it', name: 'Italiano' }
        ];
        
        return `<div class="feed-container" style="padding:20px;"><div class="profile-header" style="border-bottom: none;"><div style="text-align:left; margin-bottom:20px;"><h3>${t('account')}</h3><div><span class="email-masked">${t('email')}: ${maskEmail(currentUser?.email)}</span><span class="edit-link" onclick="showChangeEmailModal()">${t('edit')}</span></div><div style="margin-top:12px;"><span style="color:var(--text-primary);">${t('username')}: @${escapeHtml(currentUser?.username)}</span><span class="edit-link" onclick="showChangeUsernameModal()">${t('edit')}</span></div></div><div style="text-align:left; margin-bottom:20px;"><h3>${t('security')}</h3><div><span class="edit-link" onclick="showChangePasswordModal()">${t('changePassword')}</span></div></div><h3 style="text-align:left; margin-bottom:20px;">${t('theme')}</h3><div class="custom-select" id="themeSelect"><span id="selectedThemeText">${themeNames[savedTheme]}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="themeDropdown" style="display:none;"><div class="custom-select-option ${savedTheme === 'dark' ? 'selected' : ''}" onclick="setTheme('dark'); document.getElementById('selectedThemeText').innerText='Dark (Black)';">Dark (Black)</div><div class="custom-select-option ${savedTheme === 'dark-gray' ? 'selected' : ''}" onclick="setTheme('dark-gray'); document.getElementById('selectedThemeText').innerText='Dark Gray';">Dark Gray</div><div class="custom-select-option ${savedTheme === 'gray' ? 'selected' : ''}" onclick="setTheme('gray'); document.getElementById('selectedThemeText').innerText='Gray';">Gray</div><div class="custom-select-option ${savedTheme === 'light' ? 'selected' : ''}" onclick="setTheme('light'); document.getElementById('selectedThemeText').innerText='Light';">Light</div></div></div><h3 style="text-align:left; margin-bottom:20px; margin-top:20px;">${t('language')}</h3><div class="custom-select" id="languageSelect"><span id="selectedLanguageText">${languages.find(l => l.code === currentLang)?.name || 'English'}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="languageDropdown" style="display:none;">${languages.map(lang => `<div class="custom-select-option ${currentLang === lang.code ? 'selected' : ''}" onclick="setLanguage('${lang.code}'); document.getElementById('selectedLanguageText').innerText='${lang.name}';">${lang.name}</div>`).join('')}</div></div><div class="notification-settings"><h3>${t('notificationsSettings')}</h3><div class="custom-select" id="notificationsSelect"><span id="selectedNotifText">${notificationSetting === 'all' ? t('allNotifications') : (notificationSetting === 'mentions' ? t('mentionsOnly') : t('none'))}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="notificationsDropdown" style="display:none;"><div class="custom-select-option ${notificationSetting === 'all' ? 'selected' : ''}" onclick="setNotificationSetting('all'); document.getElementById('selectedNotifText').innerText='${t('allNotifications')}';">${t('allNotifications')}</div><div class="custom-select-option ${notificationSetting === 'mentions' ? 'selected' : ''}" onclick="setNotificationSetting('mentions'); document.getElementById('selectedNotifText').innerText='${t('mentionsOnly')}';">${t('mentionsOnly')}</div><div class="custom-select-option ${notificationSetting === 'none' ? 'selected' : ''}" onclick="setNotificationSetting('none'); document.getElementById('selectedNotifText').innerText='${t('none')}';">${t('none')}</div></div></div></div><h3 style="text-align:left; margin-bottom:16px; margin-top:24px;">Features</h3><div class="static-card" onclick="showStatsModal()" style="cursor:pointer; margin-bottom:10px;"><div><strong>${t('stats')}</strong><div style="color:var(--text-secondary);">View your account statistics</div></div></div></div><div class="static-card" onclick="showDeleteAccountModal()" style="cursor:pointer; margin-bottom:10px; border-color:#f4212e;"><div><strong style="color:#f4212e;">${t('deleteAccount')}</strong><div style="color:var(--text-secondary);">${t('deleteAccountWarning')}</div></div></div><div class="footer-note">© 2026 FreedomNet</div></div>`;
    }
    
    function openAvatarUpload() { closeAllDropdowns(); closePreviewPopup(); const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*,image/gif'; input.onchange = (e) => { const file = e.target.files[0]; if (file) openAdvancedCropModal(file); }; input.click(); }
    
    window.publishPost = async () => {
        const content = document.getElementById('postContent').value;
        const errorDiv = document.getElementById('postError');
        const contentWithoutSpaces = content.replace(/\s/g, '');
        if (contentWithoutSpaces.length < 1) { errorDiv.textContent = 'Post must contain at least 1 non-space character'; errorDiv.style.display = 'block'; return; }
        if (content.length > 500) { errorDiv.textContent = 'Post cannot exceed 500 characters'; errorDiv.style.display = 'block'; return; }
        errorDiv.style.display = 'none';
        const formData = new FormData(); formData.append('content', content);
        if (pendingImage) { const blob = await fetch(pendingImage).then(r => r.blob()); formData.append('image', blob, 'photo.jpg'); }
        const newPost = await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null; document.getElementById('postContent').value = ''; document.getElementById('imagePreview').innerHTML = '';
        await loadFeed(true);
        sendWebSocketMessage('new_post', { post: newPost });
        renderMain();
    };
    
    function updateFeedPosts() { const container = document.getElementById('feedPosts'); if (container) container.innerHTML = feed.map(post => renderPostCard(post)).join(''); const loader = document.getElementById('feedLoader'); if (loader && !feedHasMore) loader.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">You\'ve seen all posts</div>'; }
    
    window.searchConversations = () => {
        const query = document.getElementById('conversationsSearch')?.value.toLowerCase() || '';
        const container = document.getElementById('conversationsList');
        if (container) {
            const items = container.querySelectorAll('.conversation-item');
            items.forEach(item => {
                const name = item.querySelector('.conversation-name')?.innerText.toLowerCase() || '';
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }
    };
    
    async function renderMain() {
        await loadFeed(); await loadConversationsList();
        for (const user of allUsers) { const isOnline = await checkUserOnline(user.id); if (isOnline) onlineUsers.add(user.id); else onlineUsers.delete(user.id); }
        setInterval(async () => { for (const user of allUsers) { const isOnline = await checkUserOnline(user.id); if (isOnline) onlineUsers.add(user.id); else onlineUsers.delete(user.id); } if (currentTab === 'profile') renderMain(); }, 10000);
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;
        const root = document.getElementById('root');
        if (currentTab === 'profile') {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map((tab, idx) => `<div class="nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top: 40px;"><span class="nav-text logout-btn">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0, 5).map((tab, idx) => `<div class="bottom-nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div>${renderProfilePage()}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
            attachGlobalEvents(); 
            startLogoPulse();
            return;
        }
        root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map((tab, idx) => `<div class="nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top: 40px;"><span class="nav-text logout-btn">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0, 5).map((tab, idx) => `<div class="bottom-nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${currentTab === 'more' ? t('settings') : t(currentTab)}</div>${currentTab === 'feed' ? renderHome() : ''}${currentTab === 'messages' ? renderMessages() : ''}${currentTab === 'search' ? renderSearch() : ''}${currentTab === 'interesting' ? renderInteresting() : ''}${currentTab === 'notifications' ? renderNotifications() : ''}${currentTab === 'create' ? '<div class="feed-container" style="padding:20px;"><div class="static-card" onclick="showCreateModal()" style="cursor:pointer;"><div><strong>✏️ ' + t('create') + ' ' + t('post') + '</strong><div style="color:var(--text-secondary);">Share what\'s happening</div></div></div></div>' : ''}${currentTab === 'feedback' ? renderFeedback() : ''}${currentTab === 'more' ? renderMore() : ''}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
        if (currentTab === 'feed') { updateFeedPosts(); attachHomeEvents(); const feedContainer = document.getElementById('feedContainer'); if (feedContainer) { const onScroll = () => { if (feedContainer.scrollTop + feedContainer.clientHeight >= feedContainer.scrollHeight - 100) { loadFeed(); updateFeedPosts(); } }; feedContainer.addEventListener('scroll', onScroll); } }
        attachGlobalEvents();
        startLogoPulse();
    }
    
    window.showLogoutConfirm = () => { showConfirmDialog('Are you sure you want to logout?', async () => { await api('/api/logout', { method: 'POST' }); if (ws) ws.close(); currentUser = null; render(); }, true); };
    
    function attachGlobalEvents() {
        document.querySelectorAll('.mention, .hashtag, .post-username, .post-avatar-img, .avatar-placeholder, .avatar-img, .verified-badge, .gold-badge').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (el.classList.contains('verified-badge') || el.classList.contains('gold-badge')) {
                    const username = el.closest('[data-username]')?.dataset?.username || el.closest('.post-user')?.querySelector('.post-username')?.dataset?.username;
                    if (username) { const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now(), is_creator: true }; const rect = el.getBoundingClientRect(); showVerificationPopup(user, rect.left, rect.bottom + 5, el.classList.contains('gold-badge')); }
                    return;
                }
                const username = el.dataset?.mention || el.dataset?.username || el.closest('[data-username]')?.dataset?.username;
                if (username) { const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() }; const rect = el.getBoundingClientRect(); showUserPreview(user, rect.left, rect.bottom + 5); }
            });
        });
    }
    
    function attachHomeEvents() {
        const textarea = document.getElementById('postContent');
        const suggestionsContainer = document.getElementById('suggestionsContainer');
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                const value = e.target.value;
                const lastWord = value.split(/[\s\n]/).pop();
                if (lastWord && (lastWord.startsWith('@') || lastWord.startsWith('#'))) {
                    const query = lastWord.substring(1);
                    if (lastWord.startsWith('@')) {
                        const matches = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m.username}" data-type="mention" style="padding:10px 12px; cursor:pointer;">@${escapeHtml(m.username)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    } else {
                        const hashtags = ['trending', 'news', 'viral', 'coding', 'design', 'tech', 'art', 'music'];
                        const matches = hashtags.filter(h => h.includes(query)).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m}" data-type="hashtag" style="padding:10px 12px; cursor:pointer;">#${escapeHtml(m)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    }
                    document.querySelectorAll('.suggestion-item').forEach(el => {
                        el.addEventListener('click', () => { const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'mention' ? '@' : '#') + el.dataset.suggestion + ' '; textarea.value = newValue; suggestionsContainer.innerHTML = ''; textarea.focus(); });
                    });
                } else suggestionsContainer.innerHTML = '';
            });
        }
        const imageInput = document.getElementById('postImage');
        if (imageInput) { imageInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = (ev) => { pendingImage = ev.target.result; document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`; }; reader.readAsDataURL(file); } }); }
    }
    
    window.toggleLike = async (postId) => { const post = feed.find(p => p.id === postId); if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' }); else await api(`/api/like/${postId}`, { method: 'POST' }); await loadFeed(true); sendWebSocketMessage('like_update', { post_id: postId, likes_count: post.likes_count + (post.user_liked ? -1 : 1), user_liked: !post.user_liked }); renderMain(); };
    window.toggleComments = (postId) => { const el = document.getElementById(`comments-${postId}`); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
    window.addComment = async (postId) => { const input = document.getElementById(`commentInput-${postId}`); const content = input?.value.trim(); if (!content) return; await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } }); await loadFeed(true); sendWebSocketMessage('new_comment', { post_id: postId }); renderMain(); };
    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; currentChatUser = null; closeAllDropdowns(); closePreviewPopup(); renderMain(); };
    window.performSearch = async () => { if (!searchQuery.trim()) { searchResults = []; searchPosts = []; renderMain(); return; } try { const res = await api(`/api/search?q=${encodeURIComponent(searchQuery)}`); searchResults = res.users || []; searchPosts = res.posts || []; renderMain(); } catch(e) { searchResults = []; searchPosts = []; } };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    
    startFakeOnlineCounter();
    
    (async () => { try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); connectWebSocket(); } } catch(e) {} render(); })();
</script>
</body>
</html>
