        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }

        .custom-modal-btn-primary { background: var(--accent); color: white; }

        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 9999px; font-weight: 700; cursor: pointer; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        
        .verified-badge { background: var(--accent); color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; }
        .gold-badge { background: var(--gold); color: #000000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; animation: neonPulse 1.5s ease-in-out infinite; }
        .moderator-badge { background: var(--moderator); color: #000000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; animation: neonPulse 1.5s ease-in-out infinite; }
        .admin-badge { background: var(--admin); color: white; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; animation: neonPulse 1.5s ease-in-out infinite; }
        
        .global-footer { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 40px; }
        .custom-select { position: relative; width: 100%; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 9999px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .custom-select-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 16px; margin-top: 8px; z-index: 100; overflow: hidden; }
        .custom-select-option { padding: 12px 16px; cursor: pointer; }
        .custom-select-option:hover { background: var(--hover-bg); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .conversations-sidebar { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 20; background: var(--bg-primary); transform: translateX(-100%); transition: transform 0.3s ease; }
            .conversations-sidebar.open { transform: translateX(0); }
            .chat-back-mobile { display: inline-block; font-size: 24px; cursor: pointer; }
        }
    </style>
</head>

    function setNsfwSetting(value) { nsfwEnabled = value; localStorage.setItem('nsfwEnabled', value); renderMain(); }
    function setNotificationSetting(setting) { notificationSetting = setting; localStorage.setItem('notificationSetting', setting); renderMain(); }

    function isAdmin() { return currentUser?.role === 'admin' || currentUser?.username === 'DevAlexPlay'; }
    
    function renderCreatorBadge(user) {
        if (user?.role === 'admin') return '<span class="admin-badge">⛔ ADMIN</span>';
        if (user?.role === 'moderator') return '<span class="moderator-badge">✅ MODERATOR</span>';

        return keywords.some(k => (text || '').toLowerCase().includes(k));

    function connectWebSocket() {
        if (ws?.readyState === WebSocket.OPEN) return;
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.onopen = () => { if (reconnectTimeout) clearTimeout(reconnectTimeout); };
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.type === 'new_post') { feed.unshift(data.post); if (currentTab === 'feed') updateFeedPosts(); }
                else if (data.type === 'new_comment') { const idx = feed.findIndex(p => p.id === data.post_id); if (idx !== -1) { feed[idx].comments = data.comments; if (currentTab === 'feed') updateFeedPosts(); } }
                else if (data.type === 'post_deleted') { const idx = feed.findIndex(p => p.id === data.post_id); if (idx !== -1) { feed.splice(idx, 1); if (currentTab === 'feed') updateFeedPosts(); } }
                else if (data.type === 'like_update') { const idx = feed.findIndex(p => p.id === data.post_id); if (idx !== -1) { feed[idx].likes_count = data.likes_count; feed[idx].user_liked = data.user_liked; if (currentTab === 'feed') updateFeedPosts(); } }

                else if (data.type === 'new_report') { if (isModeratorOrAdmin()) showToast(`📋 New report from ${data.reportedBy}: ${data.reason}`); }
                else if (data.type === 'user_role_changed') { if (data.username === currentUser?.username) { currentUser.role = data.newRole; renderMain(); } loadAllUsers(); }
            } catch(e) {}
        };
        ws.onclose = () => { reconnectTimeout = setTimeout(connectWebSocket, 3000); };
    }
    
    function sendWebSocketMessage(type, data) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, ...data })); }
    
    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    
    async function loadAllUsers() { try { allUsers = await api('/api/users'); } catch(e) { allUsers = []; } }
    async function loadFollows() { try { userFollows = await api('/api/follows'); } catch(e) { userFollows = []; } }
    function isFollowing(userId) { return userFollows.some(f => f.followee_id === userId); }
    async function followUser(userId) { await api(`/api/follow/${userId}`, { method: 'POST' }); await loadFollows(); renderMain(); }
    async function unfollowUser(userId) { await api(`/api/follow/${userId}`, { method: 'DELETE' }); await loadFollows(); renderMain(); }

        try {

        if (!q) return;
        const res = await api(`/api/search?q=${encodeURIComponent(q)}`);
        searchResults = res.users || [];
        searchPosts = res.posts || [];
        const c = document.getElementById('searchResults');
        if (c) {
            c.innerHTML = (searchResults.length ? `<h3>Users</h3>${searchResults.map(u => `<div class="search-result" onclick="viewProfile('${u.username}')"><img class="search-result-avatar" src="${u.avatar || ''}"><div><strong>${escapeHtml(u.username)}</strong>${renderCreatorBadge(u)}</div></div>`).join('')}` : '') +
                         (searchPosts.length ? `<h3>Posts</h3>${searchPosts.map(p => `<div class="search-post-result" onclick="viewProfile('${p.username}')"><div><strong>${escapeHtml(p.username)}</strong></div><div>${escapeHtml(p.content?.substring(0,100))}</div></div>`).join('')}` : '');
        }
    }
    
    function showLogoutConfirm() { if (confirm('Logout?')) { api('/api/logout', { method: 'POST' }); currentUser = null; render(); } }
    function switchTab(tab) { currentTab = tab; currentProfileUser = null; currentChatUser = null; renderMain(); }
    
    async function renderMain() {
        await loadFeed(); await loadConversationsList();
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;
        const root = document.getElementById('root');
        const tabs = ['feed', 'profile', 'messages', 'search', 'interesting', 'notifications', 'create', 'feedback', 'more'];
        
        if (currentTab === 'profile') {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map(tab => `<div class="nav-item ${currentTab === tab ? 'active' : ''}" onclick="switchTab('${tab}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0,5).map(tab => `<div class="bottom-nav-item ${currentTab === tab ? 'active' : ''}" onclick="switchTab('${tab}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div>${renderProfilePage()}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
        } else {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map(tab => `<div class="nav-item ${currentTab === tab ? 'active' : ''}" onclick="switchTab('${tab}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0,5).map(tab => `<div class="bottom-nav-item ${currentTab === tab ? 'active' : ''}" onclick="switchTab('${tab}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${currentTab === 'more' ? t('settings') : t(currentTab)}</div>${currentTab === 'feed' ? renderHome() : ''}${currentTab === 'messages' ? renderMessages() : ''}${currentTab === 'search' ? renderSearch() : ''}${currentTab === 'interesting' ? renderInteresting() : ''}${currentTab === 'notifications' ? renderNotifications() : ''}${currentTab === 'create' ? '<div class="feed-container" style="padding:20px;"><div class="static-card" onclick="showCreateModal()"><div><strong>✏️ Create Post</strong></div></div></div>' : ''}${currentTab === 'feedback' ? renderFeedback() : ''}${currentTab === 'more' ? renderMore() : ''}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
        }
        if (currentTab === 'feed') { updateFeedPosts(); attachHomeEvents(); }
    }
    
    async function render() {
        if (!currentUser) { await renderAuth(); return; }
        await loadAllUsers(); await loadFollows(); await renderMain();
    }
    
    startFakeOnlineCounter();
    (async () => {
        try {
            const me = await api('/api/me');
            if (me.user) {
                currentUser = me.user;
                await loadFeed(true);
                await loadConversationsList();
                await loadAllUsers();
                await loadFollows();
                connectWebSocket();
            }
        } catch(e) {}
        render();
    })();
</script>
</body>
</html>
