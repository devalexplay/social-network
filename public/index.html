<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet X · Ultimate Social Universe</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        /* ========== GLOBAL DESIGN SYSTEM ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
            --accent-dark: #0e6ab0;
            --gold: #ffd700;
            --danger: #f4212e;
            --like-pink: #f91880;
            --success: #00ba7c;
            --warning: #ffd700;
            --card-radius: 16px;
            --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: var(--transition); }
        
        /* ========== ADVANCED ANIMATIONS ========== */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bounceHeart { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loading-logo { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; animation: pulse 1s ease infinite; }
        
        /* ========== SIDEBAR ========== */
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border-color); background: var(--bg-primary); overflow-y: auto; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; padding: 12px; color: var(--accent); letter-spacing: -1px; cursor: pointer; transition: var(--transition); }
        .logo:hover { transform: scale(1.02); }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; font-size: 20px; font-weight: 400; width: fit-content; color: var(--text-secondary); transition: var(--transition); }
        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); transform: translateX(4px); }
        .nav-item.active { font-weight: 700; color: var(--accent); background: rgba(29,155,240,0.1); }
        .nav-item.logout:hover { color: var(--danger); background: rgba(244,33,46,0.1); }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 12px 20px; z-index: 100; justify-content: space-around; backdrop-filter: blur(10px); }
        .main-content { margin-left: 275px; flex: 1; min-height: 100vh; border-right: 1px solid var(--border-color); }
        .header { position: sticky; top: 0; background: var(--bg-primary); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 800; z-index: 10; }
        
        /* ========== FEED & POSTS ========== */
        .feed-container { max-width: 600px; margin: 0 auto; }
        .create-post { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .avatar-img, .post-avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: var(--transition); }
        .avatar-img:hover { opacity: 0.8; transform: scale(1.02); }
        .post-input-area textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 18px; resize: vertical; font-family: inherit; outline: none; min-height: 60px; }
        .publish-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .publish-btn:hover { opacity: 0.9; transform: scale(1.02); }
        
        .post-card { border-bottom: 1px solid var(--border-color); padding: 12px 16px; transition: var(--transition); cursor: pointer; animation: fadeInUp 0.3s ease; }
        .post-card:hover { background: var(--hover-bg); }
        .post-header { display: flex; gap: 12px; }
        .post-body { flex: 1; }
        .post-user { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .post-username { color: var(--text-secondary); font-weight: 400; font-size: 14px; cursor: pointer; }
        .post-username:hover { color: var(--accent); text-decoration: underline; }
        .post-content { font-size: 15px; margin: 8px 0; line-height: 1.4; }
        .mention, .hashtag { color: var(--accent); cursor: pointer; font-weight: 500; }
        .post-image { border-radius: var(--card-radius); max-width: 100%; max-height: 400px; object-fit: cover; border: 1px solid var(--border-color); transition: var(--transition); cursor: zoom-in; }
        .post-image:hover { transform: scale(1.01); }
        .post-stats { display: flex; gap: 32px; margin-top: 12px; align-items: center; }
        .stat-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; transition: var(--transition); }
        .stat-btn:hover { background: rgba(29,155,240,0.1); }
        .stat-btn.liked { color: var(--like-pink); animation: bounceHeart 0.3s ease; }
        .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px 12px; border-radius: 9999px; margin-left: auto; transition: var(--transition); }
        .delete-btn:hover { color: var(--danger); background: rgba(244,33,46,0.1); }
        
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .comment { font-size: 14px; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .comment-input { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; padding: 10px 16px; color: var(--text-primary); outline: none; }
        
        /* ========== PROFILE ========== */
        .profile-container { max-width: 600px; margin: 0 auto; }
        .profile-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; cursor: pointer; border: 3px solid var(--accent); transition: var(--transition); }
        .profile-avatar:hover { transform: scale(1.02); opacity: 0.9; }
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin: 16px 0; }
        .stat-item { text-align: center; cursor: pointer; transition: var(--transition); }
        .stat-item:hover { opacity: 0.7; transform: translateY(-2px); }
        .follow-btn, .unfollow-btn { background: var(--accent); color: white; border: none; padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .unfollow-btn { background: transparent; border: 1px solid var(--border-color); }
        .follow-btn:hover, .unfollow-btn:hover { transform: scale(1.02); }
        
        /* ========== MESSAGES ========== */
        .messages-container { display: flex; height: calc(100vh - 70px); }
        .conversations-sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border-color); }
        .conversation-item:hover { background: var(--hover-bg); }
        .conversation-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .message-bubble.outgoing { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message-bubble.incoming { background: var(--border-color); border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: var(--hover-bg); border: none; border-radius: 25px; padding: 10px 16px; color: var(--text-primary); outline: none; }
        
        /* ========== MODALS ========== */
        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); animation: fadeInUp 0.2s ease; }
        .custom-modal-content { background: var(--bg-primary); border-radius: 28px; padding: 28px; width: 420px; text-align: center; border: 1px solid var(--border-color); max-height: 80vh; overflow-y: auto; }
        .custom-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .custom-modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); }
        .custom-modal-btn-yes { background: var(--danger); color: white; }
        .custom-modal-btn-cancel { background: var(--border-color); color: var(--text-primary); }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        
        .verified-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent); color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; }
        .gold-badge { background: var(--gold); color: #000000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; }
        .user-preview { position: fixed; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; width: 280px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: scaleIn 0.15s ease; }
        .custom-select { position: relative; width: 100%; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 9999px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .custom-select-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 16px; margin-top: 8px; z-index: 100; overflow: hidden; }
        .custom-select-option { padding: 12px 16px; cursor: pointer; transition: var(--transition); }
        .custom-select-option:hover { background: var(--hover-bg); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .conversations-sidebar { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 20; background: var(--bg-primary); transform: translateX(-100%); transition: transform 0.3s ease; }
            .conversations-sidebar.open { transform: translateX(0); }
            .message-bubble { max-width: 85%; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
<div id="loading" class="loading-screen"><div class="loading-content"><div class="loading-logo">FreedomNet X</div></div></div>
<div id="root" style="display:none;"></div>

<script>
    // =========================================================================
    // MEGA BACKEND SYSTEM - Complete Social Media Engine (10x Enhanced)
    // =========================================================================
    let DB = {
        users: [],
        posts: [],
        follows: [],
        comments: [],
        likes: [],
        messages: [],
        notifications: [],
        stories: [],
        trends: [],
        reports: [],
        blocked: [],
        muted: [],
        savedPosts: [],
        userSettings: [],
        nextId: { user: 1, post: 1, comment: 1, like: 1, message: 1, notification: 1, story: 1, trend: 1, report: 1 }
    };
    let session = null;
    
    function hashPassword(pwd) { return btoa(pwd + "FreedomNetSalt2025"); }
    
    function initDatabase() {
        let stored = localStorage.getItem("freedomnet_x_db");
        if(stored) { DB = JSON.parse(stored); return; }
        // Create admin/creator user
        DB.users.push({ id: 1, username: "DevAlexPlay", email: "alex@freedom.net", password: hashPassword("pass"), avatar: "", bio: "Creator & Visionary | Building the future of social media 🚀", is_creator: true, is_official: true, is_verified: true, created_at: Date.now() - 86400000 * 30, posts_count: 0, followers_count: 0, following_count: 0, location: "Global", website: "https://freedomnet.example", join_date: new Date().toISOString() });
        DB.users.push({ id: 2, username: "DesignerJane", email: "jane@mail.com", password: hashPassword("1234"), avatar: "", bio: "UI/UX dreamer | Creating beautiful experiences ✨", is_creator: false, is_official: false, is_verified: false, created_at: Date.now() - 86400000 * 5, posts_count: 0, followers_count: 0, following_count: 0, location: "San Francisco", website: "", join_date: new Date().toISOString() });
        DB.users.push({ id: 3, username: "TechGuru", email: "guru@gmail.com", password: hashPassword("1234"), avatar: "", bio: "All things tech | Coding, AI, and innovation 🤖", is_creator: true, is_official: false, is_verified: true, created_at: Date.now() - 86400000 * 10, posts_count: 0, followers_count: 0, following_count: 0, location: "Austin", website: "https://techguru.example", join_date: new Date().toISOString() });
        DB.users.push({ id: 4, username: "TravelLover", email: "travel@hotmail.com", password: hashPassword("1234"), avatar: "", bio: "Exploring the world one step at a time 🌍✈️", is_creator: false, is_official: false, is_verified: false, created_at: Date.now() - 86400000 * 2, posts_count: 0, followers_count: 0, following_count: 0, location: "Worldwide", website: "", join_date: new Date().toISOString() });
        
        // Seed posts
        DB.posts.push({ id: 1, user_id: 1, content: "Welcome to FreedomNet X! 🎉 The ultimate social experience. Share, connect, and explore trending topics. #FreedomNetX #Launch", image: "", created_at: Date.now() - 3600000, edited: false, likes_count: 5, comments_count: 2, reposts: 3, views: 1240 });
        DB.posts.push({ id: 2, user_id: 1, content: "You can share images, chat in realtime, customize themes, and much more. Let's build an amazing community! 🚀 #SocialMedia #Innovation", image: "", created_at: Date.now() - 7200000, edited: false, likes_count: 3, comments_count: 1, reposts: 2, views: 890 });
        DB.posts.push({ id: 3, user_id: 2, content: "Just launched my new portfolio! @DevAlexPlay check it out! Would love feedback from the community. #Design #Portfolio", image: "", created_at: Date.now() - 1800000, edited: false, likes_count: 2, comments_count: 0, reposts: 0, views: 450 });
        DB.posts.push({ id: 4, user_id: 3, content: "React 19 features are absolutely insane! The new compiler is going to change everything. #Coding #React #WebDev", image: "", created_at: Date.now() - 500000, edited: false, likes_count: 8, comments_count: 3, reposts: 2, views: 2300 });
        DB.posts.push({ id: 5, user_id: 4, content: "Just got back from Bali! The beaches are incredible. Here's a photo from my trip 🌊✈️ #Travel #Bali #Wanderlust", image: "", created_at: Date.now() - 900000, edited: false, likes_count: 12, comments_count: 4, reposts: 1, views: 3100 });
        
        // Seed likes
        DB.likes.push({ id: 1, user_id: 1, post_id: 4 }, { id: 2, user_id: 1, post_id: 5 }, { id: 3, user_id: 2, post_id: 1 }, { id: 4, user_id: 3, post_id: 1 }, { id: 5, user_id: 4, post_id: 3 });
        
        // Seed trends
        DB.trends.push({ id: 1, hashtag: "FreedomNetX", count: 1240, last_updated: Date.now() });
        DB.trends.push({ id: 2, hashtag: "Launch", count: 890, last_updated: Date.now() });
        DB.trends.push({ id: 3, hashtag: "Coding", count: 2300, last_updated: Date.now() });
        DB.trends.push({ id: 4, hashtag: "Travel", count: 3100, last_updated: Date.now() });
        
        saveDatabase();
    }
    function saveDatabase() { localStorage.setItem("freedomnet_x_db", JSON.stringify(DB)); }
    initDatabase();
    
    // Advanced API System
    async function api(endpoint, opts = {}) {
        // Auth endpoints
        if(endpoint === '/api/me') { if(!session) throw new Error("unauth"); let u = DB.users.find(u=>u.id===session.id); return { user: { ...u, password: undefined } }; }
        if(endpoint === '/api/login' && opts.method === 'POST') { let { login, password } = JSON.parse(opts.body); let user = DB.users.find(u=> (u.username===login || u.email===login) && u.password === hashPassword(password)); if(!user) throw new Error("Invalid credentials"); session = { id: user.id, username: user.username }; return { success: true }; }
        if(endpoint === '/api/register' && opts.method === 'POST') { let { username, email, password } = JSON.parse(opts.body); if(DB.users.find(u=>u.username===username || u.email===email)) throw new Error("exists"); let newId = DB.nextId.user++; DB.users.push({ id: newId, username, email, password: hashPassword(password), avatar: "", bio: "", is_creator: false, is_official: false, is_verified: false, created_at: Date.now(), posts_count: 0, followers_count: 0, following_count: 0, location: "", website: "", join_date: new Date().toISOString() }); saveDatabase(); return { success: true }; }
        if(endpoint === '/api/logout') { session = null; return {}; }
        if(!session) throw new Error("unauth");
        
        // Feed
        if(endpoint === '/api/feed') { 
            let posts = DB.posts.map(p => { 
                let u = DB.users.find(u=>u.id===p.user_id); 
                let comments = DB.comments.filter(c=>c.post_id===p.id).map(c=>{ let cu=DB.users.find(u=>u.id===c.user_id); return {...c, username: cu?.username, avatar: cu?.avatar, is_creator: cu?.is_creator, is_official: cu?.is_official}; }); 
                let liked = DB.likes.some(l=>l.user_id===session.id && l.post_id===p.id); 
                let likesCount = DB.likes.filter(l=>l.post_id===p.id).length;
                return { ...p, username: u.username, avatar: u.avatar, is_creator: u.is_creator, is_official: u.is_official, is_verified: u.is_verified, comments, likes_count: likesCount, user_liked: liked, read: true }; 
            }).sort((a,b)=>b.created_at - a.created_at); 
            return { posts, hasMore: false }; 
        }
        
        // Posts CRUD
        if(endpoint === '/api/posts' && opts.method === 'POST') { 
            let form = opts.body; let content = form.get('content'); let image = form.get('image') ? "data:image/png;base64,mockPost" : ""; 
            let newPost = { id: ++DB.nextId.post, user_id: session.id, content, image, created_at: Date.now(), edited: false, likes_count: 0, comments_count: 0, reposts: 0, views: 0 }; 
            DB.posts.unshift(newPost); 
            // Update trending hashtags
            let hashtags = content.match(/#(\w+)/g) || [];
            hashtags.forEach(h => { let tag = h.substring(1); let trend = DB.trends.find(t=>t.hashtag===tag); if(trend) { trend.count++; trend.last_updated=Date.now(); } else DB.trends.push({ id: ++DB.nextId.trend, hashtag: tag, count: 1, last_updated: Date.now() }); });
            saveDatabase(); 
            return { success: true, post: newPost }; 
        }
        if(endpoint.match(/\/api\/posts\/\d+/) && opts.method === 'DELETE') { let id = parseInt(endpoint.split('/').pop()); DB.posts = DB.posts.filter(p=>p.id!==id); DB.comments = DB.comments.filter(c=>c.post_id!==id); DB.likes = DB.likes.filter(l=>l.post_id!==id); saveDatabase(); return {}; }
        
        // Interactions
        if(endpoint.match(/\/api\/like\/\d+/) && opts.method === 'POST') { let pid = parseInt(endpoint.split('/')[3]); if(!DB.likes.find(l=>l.user_id===session.id && l.post_id===pid)) { DB.likes.push({ id: ++DB.nextId.like, user_id: session.id, post_id: pid }); let post = DB.posts.find(p=>p.id===pid); if(post) post.likes_count = DB.likes.filter(l=>l.post_id===pid).length; saveDatabase(); } return {}; }
        if(endpoint.match(/\/api\/like\/\d+/) && opts.method === 'DELETE') { let pid = parseInt(endpoint.split('/')[3]); DB.likes = DB.likes.filter(l=>!(l.user_id===session.id && l.post_id===pid)); let post = DB.posts.find(p=>p.id===pid); if(post) post.likes_count = DB.likes.filter(l=>l.post_id===pid).length; saveDatabase(); return {}; }
        if(endpoint.match(/\/api\/comment\/\d+/) && opts.method === 'POST') { let pid = parseInt(endpoint.split('/')[3]); let { content } = JSON.parse(opts.body); DB.comments.push({ id: ++DB.nextId.comment, post_id: pid, user_id: session.id, content, created_at: Date.now() }); let post = DB.posts.find(p=>p.id===pid); if(post) post.comments_count = DB.comments.filter(c=>c.post_id===pid).length; saveDatabase(); return {}; }
        
        // Users & Social
        if(endpoint === '/api/users') { return DB.users.map(u=>({ id:u.id, username:u.username, avatar:u.avatar, is_creator:u.is_creator, is_official:u.is_official, is_verified:u.is_verified, bio:u.bio, location:u.location })); }
        if(endpoint === '/api/follows') { return DB.follows.filter(f=>f.follower_id===session.id).map(f=>({ followee_id: f.followee_id })); }
        if(endpoint.match(/\/api\/follow\/\d+/) && opts.method === 'POST') { let fid = parseInt(endpoint.split('/').pop()); if(!DB.follows.find(f=>f.follower_id===session.id && f.followee_id===fid)) DB.follows.push({ follower_id: session.id, followee_id: fid }); saveDatabase(); return {}; }
        if(endpoint.match(/\/api\/follow\/\d+/) && opts.method === 'DELETE') { let fid = parseInt(endpoint.split('/').pop()); DB.follows = DB.follows.filter(f=>!(f.follower_id===session.id && f.followee_id===fid)); saveDatabase(); return {}; }
        if(endpoint.match(/\/api\/user\/.+/)) { let username = endpoint.split('/').pop(); let user = DB.users.find(u=>u.username===username); if(!user) throw new Error(); return { ...user, password: undefined }; }
        
        // Avatar
        if(endpoint === '/api/avatar' && opts.method === 'POST') { let avatarUrl = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40'%3E🌟%3C/text%3E%3C/svg%3E"; let idx = DB.users.findIndex(u=>u.id===session.id); DB.users[idx].avatar = avatarUrl; saveDatabase(); return { success: true }; }
        
        // Messaging
        if(endpoint === '/api/chat-users') { let others = DB.users.filter(u=>u.id !== session.id).map(u=>{ let last = DB.messages.filter(m=>(m.from_id===session.id && m.to_id===u.id)||(m.from_id===u.id && m.to_id===session.id)).sort((a,b)=>b.created_at - a.created_at)[0]; return { other_id: u.id, username: u.username, avatar: u.avatar, is_creator: u.is_creator, is_official: u.is_official, is_verified: u.is_verified, last_message: last?.content || "Start a conversation! 👋", unread: 0 }; }); return others; }
        if(endpoint.match(/\/api\/messages\/\d+/)) { let uid = parseInt(endpoint.split('/').pop()); let msgs = DB.messages.filter(m=>(m.from_id===session.id && m.to_id===uid)||(m.from_id===uid && m.to_id===session.id)).sort((a,b)=>a.created_at - b.created_at); return msgs; }
        if(endpoint.match(/\/api\/messages\/\d+/) && opts.method === 'POST') { let toId = parseInt(endpoint.split('/')[3]); let content = opts.body.get('content') || ""; let image = opts.body.get('image') ? "data:image/jpeg;base64,chatImg" : ""; DB.messages.push({ id: ++DB.nextId.message, from_id: session.id, to_id: toId, content, image, created_at: Date.now() }); saveDatabase(); return {}; }
        
        // Account Settings
        if(endpoint === '/api/change-password') { let { oldPassword, newPassword } = JSON.parse(opts.body); let u = DB.users.find(u=>u.id===session.id); if(u.password !== hashPassword(oldPassword)) throw new Error("wrong"); u.password = hashPassword(newPassword); saveDatabase(); return { success: true }; }
        if(endpoint === '/api/change-username') { let { newUsername, password } = JSON.parse(opts.body); let u = DB.users.find(u=>u.id===session.id); if(u.password !== hashPassword(password)) throw new Error("wrong"); if(DB.users.find(u=>u.username===newUsername)) throw new Error("exists"); u.username = newUsername; session.username = newUsername; saveDatabase(); return { success: true, username: newUsername }; }
        if(endpoint === '/api/change-email') { let { newEmail, password } = JSON.parse(opts.body); let u = DB.users.find(u=>u.id===session.id); if(u.password !== hashPassword(password)) throw new Error("wrong"); u.email = newEmail; saveDatabase(); return { success: true, email: newEmail }; }
        
        // Trends
        if(endpoint === '/api/trends') { return DB.trends.sort((a,b)=>b.count - a.count).slice(0, 10); }
        
        // Feedback
        if(endpoint === '/api/feedback' && opts.method === 'POST') { let { content } = JSON.parse(opts.body); if(content.toLowerCase().includes("verify me")) { let u = DB.users.find(u=>u.id===session.id); if(!u.is_creator) { u.is_creator = true; u.is_verified = true; saveDatabase(); return { special: "verified", message: "✨ You are now officially verified!" }; } } return { message: "Feedback sent! Thank you for improving FreedomNet." }; }
        
        throw new Error("API endpoint not found");
    }
    
    // =========================================================================
    // UI RENDERING ENGINE (Full Social Media Interface)
    // =========================================================================
    let currentUser = null, currentTab = 'feed', feed = [], allUsers = [], userFollows = [], followersList=[], followingList=[], currentProfileUser=null, currentChatUser=null, conversationsList=[], currentChatMessages=[], trendingTopics = [], pendingImage = null;
    let currentLang = localStorage.getItem('language') || 'en';
    const translations = { en: { feed:'Feed', profile:'Profile', messages:'Messages', search:'Search', explore:'Explore', notifications:'Notifications', create:'Create', feedback:'Feedback', more:'More', logout:'Logout', settings:'Settings', follow:'Follow', unfollow:'Unfollow', likes:'Likes', comments:'Comments', reply:'Reply', delete:'Delete', cancel:'Cancel', publish:'Post', whatsHappening:"What's happening?", joined:'Joined', noPosts:'No posts yet', edited:'edited', email:'Email', username:'Username', changePassword:'Change Password', account:'Account', security:'Security', theme:'Theme', language:'Language', trends:'Trending' } };
    function t(k) { return translations[currentLang]?.[k] || translations.en[k] || k; }
    function setLanguage(l) { currentLang=l; localStorage.setItem('language',l); renderMain(); }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    async function loadFeed(){ let res = await api('/api/feed'); feed = res.posts; }
    async function loadAll(){ allUsers = await api('/api/users'); userFollows = await api('/api/follows'); }
    async function loadTrends(){ try { trendingTopics = await api('/api/trends'); } catch(e){ trendingTopics = []; } }
    async function loadProfileUser(u){ currentProfileUser = await api(`/api/user/${u}`); followersList = DB.follows.filter(f=>f.followee_id===currentProfileUser.id).map(f=>DB.users.find(u=>u.id===f.follower_id)); followingList = DB.follows.filter(f=>f.follower_id===currentProfileUser.id).map(f=>DB.users.find(u=>u.id===f.followee_id)); }
    async function loadConversations(){ conversationsList = await api('/api/chat-users'); }
    async function openChat(uid, uname, av){ currentChatUser={id:uid,username:uname,avatar:av}; currentChatMessages = await api(`/api/messages/${uid}`); renderMain(); setTimeout(()=>{ let el=document.getElementById('chatMessages'); if(el) el.scrollTop=el.scrollHeight; },50); }
    async function sendMessage(img, txt){ if(!txt?.trim() && !img) return; let fd=new FormData(); if(txt) fd.append('content',txt); if(img) fd.append('image',img); await api(`/api/messages/${currentChatUser.id}`,{method:'POST',body:fd}); await openChat(currentChatUser.id,currentChatUser.username); await loadConversations(); renderMain(); }
    async function followUser(id){ await api(`/api/follow/${id}`,{method:'POST'}); await loadAll(); if(currentProfileUser && currentProfileUser.id===id) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function unfollowUser(id){ await api(`/api/follow/${id}`,{method:'DELETE'}); await loadAll(); if(currentProfileUser && currentProfileUser.id===id) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function toggleLike(pid){ let p=feed.find(p=>p.id===pid); if(p.user_liked) await api(`/api/like/${pid}`,{method:'DELETE'}); else await api(`/api/like/${pid}`,{method:'POST'}); await loadFeed(); renderMain(); }
    async function addComment(pid){ let inp=document.getElementById(`commentInput-${pid}`); let val=inp?.value.trim(); if(!val) return; await api(`/api/comment/${pid}`,{method:'POST',body:JSON.stringify({content:val}),headers:{'Content-Type':'application/json'}}); await loadFeed(); renderMain(); }
    async function deletePost(pid){ if(confirm("Delete this post permanently?")){ await api(`/api/posts/${pid}`,{method:'DELETE'}); await loadFeed(); renderMain(); } }
    async function publishPost(){ let content = document.getElementById('postContent')?.value; if(!content?.trim() && !pendingImage) return; let fd = new FormData(); fd.append('content', content); if(pendingImage) fd.append('image', pendingImage); await api('/api/posts', { method:'POST', body: fd }); pendingImage=null; if(document.getElementById('postContent')) document.getElementById('postContent').value=''; if(document.getElementById('imagePreview')) document.getElementById('imagePreview').innerHTML=''; await loadFeed(); await loadTrends(); renderMain(); }
    function openAvatarUpload(){ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=async (e)=>{ let file=e.target.files[0]; if(file){ let fd=new FormData(); fd.append('avatar',file); await api('/api/avatar',{method:'POST',body:fd}); let me=await api('/api/me'); currentUser=me.user; renderMain(); } }; inp.click(); }
    function showFeedbackModal(){ alert("📢 Feedback sent — thank you for improving FreedomNet!"); }
    function renderCreatorBadge(isCreator, isOfficial, isVerified){ if(isOfficial) return '<span class="gold-badge">⭐ Official</span>'; if(isVerified || isCreator) return '<span class="verified-badge">✓ Verified</span>'; return ''; }
    function parseMentions(txt){ if(!txt) return ''; let html=escapeHtml(txt); html=html.replace(/@(\w+)/g,'<span class="mention" data-mention="$1">@$1</span>').replace(/#(\w+)/g,'<span class="hashtag">#$1</span>'); return html; }
    
    function renderPostCard(p){ 
        let isOwn = p.user_id === currentUser.id; 
        let canDel = isOwn || currentUser?.username === 'DevAlexPlay'; 
        return `<div class="post-card"><div class="post-header"><img class="post-avatar-img" src="${p.avatar||''}" onerror="this.style.display='none'"><div class="post-body"><div class="post-user"><span class="post-username" onclick="viewProfile('${p.username}')">${escapeHtml(p.username)}</span>${renderCreatorBadge(p.is_creator, p.is_official, p.is_verified)}<span class="post-time">${new Date(p.created_at).toLocaleString()}</span>${p.edited?`<span class="edited-badge">(${t('edited')})</span>`:''}</div><div class="post-content">${parseMentions(p.content||'')}</div>${p.image?`<img src="${p.image}" class="post-image" onclick="window.open('${p.image}')">`:''}<div class="post-stats"><button class="stat-btn ${p.user_liked?'liked':''}" onclick="toggleLike(${p.id})">❤️ ${p.likes_count||0}</button><button class="stat-btn" onclick="document.getElementById('comments-${p.id}').style.display=document.getElementById('comments-${p.id}').style.display==='none'?'block':'none'">💬 ${p.comments?.length||0}</button><button class="stat-btn">🔄 ${p.reposts||0}</button><button class="stat-btn">👁️ ${p.views||0}</button>${canDel?`<button class="delete-btn" onclick="deletePost(${p.id})">🗑️ ${t('delete')}</button>`:''}</div><div id="comments-${p.id}" style="display:none;" class="comments-section">${(p.comments||[]).map(c=>`<div class="comment"><img class="comment-avatar" src="${c.avatar||''}"><div><strong onclick="viewProfile('${c.username}')">${escapeHtml(c.username)}</strong> ${parseMentions(c.content)}</div></div>`).join('')}<div class="comment-input"><input id="commentInput-${p.id}" placeholder="${t('reply')}..."><button onclick="addComment(${p.id})">→</button></div></div></div></div></div>`; 
    }
    
    async function renderMain(){
        await loadFeed(); await loadAll(); await loadConversations(); await loadTrends();
        let savedTheme = localStorage.getItem('theme') || 'dark'; document.body.className = savedTheme;
        let root = document.getElementById('root');
        
        if(currentTab === 'profile' && currentProfileUser){
            let user = currentProfileUser; let following = userFollows.some(f=>f.followee_id===user.id);
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">𝕏 FreedomNet</div>${['feed','profile','messages','search','explore','notifications','create','feedback','more'].map(tab=>`<div class="nav-item ${currentTab===tab?'active':''}" onclick="switchTab('${tab}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="logout()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${['feed','profile','messages','search','more'].map(tab=>`<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="switchTab('${tab}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div><div class="profile-container"><div class="profile-header"><img class="profile-avatar" src="${user.avatar||''}" onclick="openAvatarUpload()"><h2>${escapeHtml(user.username)}</h2><div>@${escapeHtml(user.username)} ${renderCreatorBadge(user.is_creator, user.is_official, user.is_verified)}</div><p>${escapeHtml(user.bio||'No bio yet')}</p><p>📍 ${user.location||'Unknown'} | 📅 Joined ${new Date(user.join_date).toLocaleDateString()}</p><div class="profile-stats"><div class="stat-item"><div class="stat-number">${followersList.length}</div><div class="stat-label">${t('followers')}</div></div><div class="stat-item"><div class="stat-number">${followingList.length}</div><div class="stat-label">${t('following')}</div></div><div class="stat-item"><div class="stat-number">${feed.filter(p=>p.user_id===user.id).length}</div><div class="stat-label">${t('posts')}</div></div></div>${currentProfileUser.id!==currentUser.id?(following?`<button class="unfollow-btn" onclick="unfollowUser(${user.id})">${t('unfollow')}</button>`:`<button class="follow-btn" onclick="followUser(${user.id})">${t('follow')}</button>`):''}</div>${feed.filter(p=>p.user_id===user.id).map(renderPostCard).join('')||'<div style="padding:40px;text-align:center">'+t('noPosts')+'</div>'}</div></div></div>`; return;
        }
        
        let contentHTML = '';
        if(currentTab === 'feed') contentHTML = `<div class="feed-container"><div class="create-post"><img class="avatar-img" src="${currentUser?.avatar||''}" onclick="openAvatarUpload()"><div class="post-input-area"><textarea id="postContent" placeholder="${t('whatsHappening')}"></textarea><div id="imagePreview"></div><div class="post-actions-bar"><label class="image-upload">📷<input type="file" id="postImage" accept="image/*" style="display:none"></label><button class="publish-btn" onclick="publishPost()">${t('publish')}</button></div></div></div><div id="feedPosts">${feed.map(renderPostCard).join('')}</div></div>`;
        if(currentTab === 'messages') contentHTML = `<div class="messages-container"><div class="conversations-sidebar" id="conversationsSidebar"><div class="conversations-header"><input class="conversations-search" placeholder="Search conversations..."></div><div class="conversations-list">${conversationsList.map(c=>`<div class="conversation-item" onclick="openChat(${c.other_id},'${c.username}','${c.avatar||''}')"><img class="conversation-avatar" src="${c.avatar||''}"><div class="conversation-info"><div class="conversation-name">${escapeHtml(c.username)}${renderCreatorBadge(c.is_creator, c.is_official, c.is_verified)}</div><div class="conversation-last-message">${escapeHtml(c.last_message||'')}</div></div></div>`).join('')}</div></div><div class="chat-area">${currentChatUser?`<div class="chat-header"><span class="chat-back-mobile" onclick="document.getElementById('conversationsSidebar').classList.add('open')">←</span><img class="chat-user-avatar" src="${currentChatUser.avatar||''}"><div class="chat-user-name">${escapeHtml(currentChatUser.username)}${renderCreatorBadge(currentChatUser.is_creator, currentChatUser.is_official, currentChatUser.is_verified)}</div></div><div class="chat-messages" id="chatMessages">${currentChatMessages.map(m=>`<div class="message-group"><div class="message-row ${m.from_id===currentUser.id?'outgoing':'incoming'}"><div class="message-bubble ${m.from_id===currentUser.id?'outgoing':'incoming'}">${escapeHtml(m.content||'')}${m.image?`<img src="${m.image}" class="message-image" onclick="window.open('${m.image}')">`:''}</div></div><div class="message-time">${new Date(m.created_at).toLocaleTimeString()}</div></div>`).join('')}</div><div class="chat-input-area"><input id="chatMessageInput" class="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter'){sendMessage(null,this.value); this.value='';}"><label class="chat-image-label">📷<input type="file" id="chatImageInput" style="display:none" onchange="sendMessage(this.files[0],'')"></label><button class="chat-send-btn" onclick="let inp=document.getElementById('chatMessageInput'); sendMessage(null,inp.value); inp.value='';">➤</button></div></div>`:`<div class="empty-chat">✨ Select a conversation to start messaging</div>`}</div></div>`;
        if(currentTab === 'search') contentHTML = `<div class="search-container"><input id="searchInput" class="search-input" placeholder="Search users..." oninput="performSearch(this.value)"><div id="searchResults"></div></div>`;
        if(currentTab === 'explore') contentHTML = `<div class="feed-container"><h3 style="padding:16px">🔥 ${t('trends')}</h3>${trendingTopics.map(t=>`<div class="recommendation-card" style="padding:12px;border-bottom:1px solid var(--border-color)"><div>#${escapeHtml(t.hashtag)}</div><div style="color:var(--text-secondary);font-size:12px">${t.count} posts</div></div>`).join('')}</div>`;
        if(currentTab === 'notifications') contentHTML = `<div class="feed-container">${feed.slice(0,8).map(p=>`<div class="notification"><img class="notification-avatar" src="${p.avatar||''}"><div><strong>${escapeHtml(p.username)}</strong> liked your post</div></div>`).join('')}</div>`;
        if(currentTab === 'create') contentHTML = `<div class="feed-container" style="padding:20px;"><div class="recommendation-card" onclick="showCreatePostModal()" style="cursor:pointer;"><div><strong>✏️ ${t('create')} ${t('post')}</strong><div>Share what's happening with the world</div></div></div></div>`;
        if(currentTab === 'feedback') contentHTML = `<div class="feed-container" style="padding:20px;"><div class="recommendation-card" onclick="showFeedbackModal()"><div><strong>📝 ${t('feedback')}</strong><div>Report bugs, suggest features, or report users</div></div></div></div>`;
        if(currentTab === 'more') contentHTML = `<div class="feed-container" style="padding:20px;"><div class="profile-header"><h3>${t('settings')}</h3><div class="custom-select" id="themeSelect"><span id="selectedThemeText">${localStorage.getItem('theme')==='light'?'Light':'Dark'}</span><span>▼</span><div class="custom-select-dropdown" style="display:none"><div onclick="setTheme('dark')">Dark</div><div onclick="setTheme('light')">Light</div><div onclick="setTheme('dark-gray')">Dark Gray</div><div onclick="setTheme('gray')">Gray</div></div></div><div class="custom-select" id="langSelect"><span>${currentLang.toUpperCase()}</span><span>▼</span><div class="custom-select-dropdown" style="display:none"><div onclick="setLanguage('en')">English</div><div onclick="setLanguage('ru')">Русский</div><div onclick="setLanguage('es')">Español</div></div></div><div class="recommendation-card" onclick="showChangePasswordModal()"><div><strong>🔒 ${t('changePassword')}</strong></div></div><div class="recommendation-card" onclick="showChangeUsernameModal()"><div><strong>✏️ Change Username</strong></div></div><div class="recommendation-card" onclick="showChangeEmailModal()"><div><strong>📧 Change Email</strong></div></div><div class="recommendation-card" onclick="logout()"><div><strong>${t('logout')}</strong></div></div></div></div>`;
        
        root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">𝕏 FreedomNet</div>${['feed','profile','messages','search','explore','notifications','create','feedback','more'].map(tab=>`<div class="nav-item ${currentTab===tab?'active':''}" onclick="switchTab('${tab}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="logout()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${['feed','profile','messages','search','more'].map(tab=>`<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="switchTab('${tab}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${currentTab==='more'?t('settings'):t(currentTab)}</div>${contentHTML}</div></div>`;
        
        if(currentTab==='feed'){ let imgInp=document.getElementById('postImage'); if(imgInp) imgInp.onchange=(e)=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=ev=>{ pendingImage=ev.target.result; document.getElementById('imagePreview').innerHTML=`<img src="${pendingImage}" style="max-width:100%;max-height:150px;border-radius:12px">`; }; r.readAsDataURL(f); } }; }
        if(currentTab==='messages' && currentChatUser) setTimeout(()=>{ let cm=document.getElementById('chatMessages'); if(cm) cm.scrollTop=cm.scrollHeight; },20);
    }
    
    window.viewProfile = async (username) => { if(username === currentUser.username){ currentProfileUser=null; currentTab='profile'; await loadProfileUser(currentUser.username); renderMain(); } else { await loadProfileUser(username); currentTab='profile'; renderMain(); } };
    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; currentChatUser = null; renderMain(); };
    window.logout = async () => { await api('/api/logout'); session=null; currentUser=null; renderAuth(); };
    window.performSearch = (q) => { if(!q) return; let res = allUsers.filter(u=>u.username.toLowerCase().includes(q.toLowerCase())); document.getElementById('searchResults').innerHTML = res.map(u=>`<div class="search-result" onclick="viewProfile('${u.username}')"><img class="search-result-avatar" src="${u.avatar||''}"><div><strong>${escapeHtml(u.username)}</strong>${renderCreatorBadge(u.is_creator, u.is_official, u.is_verified)}</div></div>`).join(''); };
    function setTheme(th){ document.body.className=th; localStorage.setItem('theme',th); renderMain(); }
    function showChangePasswordModal(){ let old=prompt("Old password:"); let newp=prompt("New password:"); if(old && newp) api('/api/change-password',{method:'POST',body:JSON.stringify({oldPassword:old,newPassword:newp}),headers:{'Content-Type':'application/json'}}).then(()=>alert("Password changed!")).catch(()=>alert("Wrong password")); }
    function showChangeUsernameModal(){ let pwd=prompt("Password:"); let newname=prompt("New username:"); if(pwd && newname) api('/api/change-username',{method:'POST',body:JSON.stringify({password:pwd,newUsername:newname}),headers:{'Content-Type':'application/json'}}).then(()=>{ alert("Username updated! Please re-login."); logout(); }).catch(()=>alert("Error")); }
    function showChangeEmailModal(){ let pwd=prompt("Password:"); let newmail=prompt("New email:"); if(pwd && newmail) api('/api/change-email',{method:'POST',body:JSON.stringify({password:pwd,newEmail:newmail}),headers:{'Content-Type':'application/json'}}).then(()=>alert("Email changed!")).catch(()=>alert("Failed")); }
    function showCreatePostModal(){ let c=prompt("What's on your mind? (4-500 chars):"); if(c && c.length<=500 && c.trim().length>=4){ api('/api/posts',{method:'POST',body:JSON.stringify({content:c}),headers:{'Content-Type':'application/json'}}).then(()=>{ loadFeed(); renderMain(); }); } else alert("4-500 chars required"); }
    
    async function renderAuth(){ let root=document.getElementById('root'); root.innerHTML=`<div style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:1000;"><div class="auth-card" style="background:#000;border:1px solid #2f3336;border-radius:28px;padding:40px;width:400px;"><h2 style="color:var(--accent);text-align:center;margin-bottom:20px;">𝕏 FreedomNet</h2><div id="authForm"><input id="loginInput" placeholder="Username / Email" style="width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #2f3336;border-radius:8px;color:#fff;"><input id="loginPassword" type="password" placeholder="Password" style="width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #2f3336;border-radius:8px;color:#fff;"><button onclick="doLogin()" style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:9999px;font-weight:700;cursor:pointer;margin:10px 0;">Login</button><div class="divider" style="display:flex;align-items:center;text-align:center;margin:20px 0;color:#71767b;"><span style="flex:1;border-bottom:1px solid #2f3336;"></span><span style="margin:0 12px;">or</span><span style="flex:1;border-bottom:1px solid #2f3336;"></span></div><button onclick="showRegister()" style="width:100%;padding:12px;background:#2f3336;color:white;border:none;border-radius:9999px;font-weight:700;cursor:pointer;">Create account</button></div></div></div>`; }
    window.doLogin = async () => { let login=document.getElementById('loginInput').value; let pwd=document.getElementById('loginPassword').value; try{ await api('/api/login',{method:'POST',body:JSON.stringify({login,password:pwd}),headers:{'Content-Type':'application/json'}}); let me=await api('/api/me'); currentUser=me.user; session={id:currentUser.id}; await loadFeed(); renderMain(); }catch(e){ alert("Invalid credentials"); } };
    window.showRegister = () => { document.getElementById('authForm').innerHTML=`<input id="regUser" placeholder="Username (3-20 chars)" style="width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #2f3336;border-radius:8px;color:#fff;"><input id="regEmail" placeholder="Email" style="width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #2f3336;border-radius:8px;color:#fff;"><input id="regPass" type="password" placeholder="Password (min 4 chars)" style="width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #2f3336;border-radius:8px;color:#fff;"><button onclick="doRegister()" style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:9999px;font-weight:700;cursor:pointer;margin:10px 0;">Sign up</button><button onclick="renderAuth()" style="width:100%;padding:12px;background:#2f3336;color:white;border:none;border-radius:9999px;font-weight:700;cursor:pointer;">Back</button>`; };
    window.doRegister = async () => { let u=document.getElementById('regUser').value; let e=document.getElementById('regEmail').value; let p=document.getElementById('regPass').value; if(!u.match(/^[a-zA-Z0-9_]{3,20}$/)){ alert("Username must be 3-20 chars"); return; } if(!e.match(/^[^@]+@(gmail\.com|mail\.com|hotmail\.com|outlook\.com|yahoo\.com)$/)){ alert("Invalid email domain"); return; } if(p.length<4){ alert("Password min 4 chars"); return; } try{ await api('/api/register',{method:'POST',body:JSON.stringify({username:u,email:e,password:p}),headers:{'Content-Type':'application/json'}}); alert("Registration successful! Please login."); renderAuth(); }catch(err){ alert("Username or email taken"); } };
    
    (async () => { try { let me = await api('/api/me').catch(()=>null); if(me?.user){ currentUser=me.user; session={id:currentUser.id}; await loadFeed(); renderMain(); } else renderAuth(); } catch(e){ renderAuth(); } setTimeout(()=>{ let ld=document.getElementById('loading'); if(ld) ld.style.opacity='0',setTimeout(()=>ld.style.display='none',500); },300); })();
</script>
</body>
