<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app {
            display: flex;
            min-height: 100vh;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
        }

        .sidebar {
            width: 275px;
            position: fixed;
            height: 100vh;
            padding: 20px 12px;
            border-right: 1px solid var(--border-color);
            background: var(--bg-primary);
            overflow-y: auto;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            padding: 12px;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            margin: 4px 0;
            border-radius: 0;
            cursor: pointer;
            transition: color 0.15s ease;
            font-size: 20px;
            font-weight: 400;
            width: fit-content;
            color: var(--text-secondary);
            background: transparent;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: transparent;
        }

        .nav-item.active {
            font-weight: 700;
            color: var(--accent);
        }

        .nav-text {
            font-size: 20px;
        }

        .main-content {
            margin-left: 275px;
            flex: 1;
            min-height: 100vh;
            border-right: 1px solid var(--border-color);
            transition: border-color 0.2s ease;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 20px;
            font-weight: 800;
            z-index: 10;
        }

        .feed-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .create-post {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .avatar-img:hover {
            opacity: 0.8;
        }

        .avatar-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .avatar-placeholder:hover {
            opacity: 0.8;
        }

        .post-input-area {
            flex: 1;
        }

        .post-input-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            resize: vertical;
            font-family: inherit;
            outline: none;
            min-height: 60px;
        }

        .post-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .image-upload {
            color: var(--accent);
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: opacity 0.15s ease;
        }

        .image-upload:hover {
            opacity: 0.8;
            background: transparent;
        }

        .publish-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .publish-btn:hover {
            opacity: 0.9;
        }

        .post-card {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            transition: background 0.15s ease;
            cursor: pointer;
        }

        .post-card:hover {
            background: var(--hover-bg);
        }

        .post-header {
            display: flex;
            gap: 12px;
        }

        .post-avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .post-avatar-img:hover {
            opacity: 0.8;
        }

        .post-body {
            flex: 1;
        }

        .post-user {
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .post-username {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .post-username:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .post-time {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .post-content {
            font-size: 15px;
            margin: 8px 0;
            line-height: 1.4;
        }

        .mention {
            color: var(--accent);
            cursor: pointer;
        }

        .hashtag {
            color: var(--accent);
            cursor: pointer;
        }

        .post-image {
            margin-top: 12px;
            border-radius: 16px;
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .post-stats {
            display: flex;
            gap: 32px;
            margin-top: 12px;
            align-items: center;
        }

        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            transition: color 0.15s ease;
        }

        .stat-btn:hover {
            color: var(--text-primary);
            background: transparent;
        }

        .stat-btn.liked {
            color: #f91880;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 9999px;
            margin-left: auto;
            transition: color 0.15s ease;
        }

        .delete-btn:hover {
            color: #f4212e;
            background: transparent;
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .comment {
            font-size: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .comment strong {
            color: var(--accent);
            cursor: pointer;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 10px 16px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s ease;
        }

        .comment-input input:focus {
            border-color: var(--accent);
        }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 16px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .profile-avatar:hover {
            opacity: 0.8;
        }

        .follow-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.15s ease;
        }

        .unfollow-btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 24px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.15s ease;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.15s ease;
            color: var(--text-primary);
            font-size: 20px;
        }

        .search-btn:hover {
            opacity: 0.7;
        }

        .search-result {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s ease;
        }

        .search-result:hover {
            background: var(--hover-bg);
        }

        .search-result-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .recommendation-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s ease;
        }

        .recommendation-card:hover {
            background: var(--hover-bg);
        }

        .recommendation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .notification {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
            transition: background 0.15s ease;
        }

        .notification:hover {
            background: var(--hover-bg);
        }

        .notification-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .messages-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .conversations-list {
            width: 350px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .conversation {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s ease;
        }

        .conversation:hover {
            background: var(--hover-bg);
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }

        .message.outgoing {
            background: var(--accent);
            color: white;
            align-self: flex-end;
        }

        .message.incoming {
            background: var(--border-color);
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 12px 16px;
            color: var(--text-primary);
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: var(--accent);
        }

        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .custom-modal-content {
            background: #000000;
            border-radius: 28px;
            padding: 28px;
            width: 320px;
            text-align: center;
            border: 1px solid #2f3336;
        }

        .custom-modal-content p {
            margin-bottom: 24px;
            font-size: 18px;
            font-weight: 500;
        }

        .custom-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .custom-modal-btn {
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s ease;
        }

        .custom-modal-btn-yes {
            background: #f4212e;
            color: white;
        }

        .custom-modal-btn-cancel {
            background: #2f3336;
            color: white;
        }

        .custom-modal-btn:hover {
            opacity: 0.85;
        }

        .crop-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        .crop-modal-content {
            background: #000000;
            border-radius: 28px;
            padding: 24px;
            width: 450px;
            max-width: 90%;
            text-align: center;
            border: 1px solid #2f3336;
        }

        .crop-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 16px auto;
            overflow: hidden;
            border-radius: 50%;
            border: 2px solid var(--accent);
            cursor: grab;
        }

        .crop-container:active {
            cursor: grabbing;
        }

        .crop-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: none;
            transform-origin: center;
        }

        .zoom-slider {
            width: 100%;
            margin: 16px 0;
            accent-color: var(--accent);
        }

        .custom-select {
            position: relative;
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.15s ease;
        }

        .custom-select:hover {
            border-color: var(--accent);
        }

        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-top: 8px;
            z-index: 100;
            overflow: hidden;
        }

        .custom-select-option {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .custom-select-option:hover {
            background: var(--hover-bg);
        }

        .custom-select-option.selected {
            color: var(--accent);
        }

        /* Puzzle CAPTCHA */
        .puzzle-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }

        .puzzle-question {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .puzzle-options {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .puzzle-option {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .puzzle-option:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }

        .puzzle-option.correct {
            background: #00a86b;
            border-color: #00a86b;
            color: white;
        }

        .puzzle-option.wrong {
            background: #f4212e;
            border-color: #f4212e;
            color: white;
        }

        .post-privacy {
            margin-top: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .privacy-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 9999px;
            transition: background 0.15s ease;
        }

        .privacy-option:hover {
            background: var(--hover-bg);
        }

        .privacy-option.active {
            color: var(--accent);
        }

        .user-preview {
            position: fixed;
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            width: 280px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .suggestions-dropdown {
            position: absolute;
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 150;
            width: 300px;
        }

        .suggestion-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .suggestion-item:hover {
            background: var(--hover-bg);
        }

        @media (max-width: 1000px) {
            .sidebar { width: 88px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 88px; }
        }

        @media (max-width: 640px) {
            .conversations-list { width: 100%; }
            .messages-container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    let currentUser = null;
    let currentTab = 'home';
    let feed = [];
    let conversations = [];
    let currentChatUser = null;
    let pendingImage = null;
    let searchQuery = '';
    let searchResults = [];
    let allUsers = [];
    let currentProfileUser = null;
    let userFollows = [];
    let cropImageFile = null;
    let cropScale = 1;
    let cropTranslateX = 0;
    let cropTranslateY = 0;
    let isDragging = false;
    let pendingPostPrivacy = 'public';
    let puzzleVerified = false;
    let currentPuzzle = null;

    const tabs = ['Home', 'Profile', 'Messages', 'Search', 'Interesting', 'Notifications', 'Create', 'More'];
    const tabKeys = ['home', 'profile', 'messages', 'search', 'interesting', 'notifications', 'create', 'more'];

    const puzzles = [
        { question: "What is 5 + 3?", answer: "8" },
        { question: "What is 12 - 7?", answer: "5" },
        { question: "What is 4 x 3?", answer: "12" },
        { question: "What is 15 ÷ 3?", answer: "5" },
        { question: "What is 9 + 6?", answer: "15" },
        { question: "What is 20 - 8?", answer: "12" },
        { question: "Select the color of the sky on a clear day", answer: "Blue" },
        { question: "What is 7 x 2?", answer: "14" },
        { question: "What is 18 ÷ 2?", answer: "9" },
        { question: "Select the shape with 4 equal sides", answer: "Square" }
    ];

    const puzzleOptions = {
        "Select the color of the sky on a clear day": ["Red", "Blue", "Green", "Yellow"],
        "Select the shape with 4 equal sides": ["Circle", "Triangle", "Square", "Rectangle"]
    };

    function generatePuzzle() {
        const randomIndex = Math.floor(Math.random() * puzzles.length);
        currentPuzzle = { ...puzzles[randomIndex] };
        if (puzzleOptions[currentPuzzle.question]) {
            currentPuzzle.options = puzzleOptions[currentPuzzle.question];
        } else {
            const fakeOptions = [
                String(parseInt(currentPuzzle.answer) + 1),
                String(parseInt(currentPuzzle.answer) - 1),
                currentPuzzle.answer,
                String(parseInt(currentPuzzle.answer) + 2)
            ];
            currentPuzzle.options = fakeOptions.sort(() => Math.random() - 0.5);
        }
        puzzleVerified = false;
        return currentPuzzle;
    }

    function showConfirmDialog(message, onYes) {
        const existing = document.querySelector('.custom-modal');
        if (existing) existing.remove();
        
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `
            <div class="custom-modal-content">
                <p>${message}</p>
                <div class="custom-modal-buttons">
                    <button class="custom-modal-btn custom-modal-btn-yes" id="confirmYes">Yes</button>
                    <button class="custom-modal-btn custom-modal-btn-cancel" id="confirmCancel">Cancel</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('confirmYes').onclick = () => {
            modal.remove();
            onYes();
        };
        document.getElementById('confirmCancel').onclick = () => modal.remove();
    }

    function openCropModal(file) {
        cropImageFile = file;
        cropScale = 1;
        cropTranslateX = 0;
        cropTranslateY = 0;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const modal = document.createElement('div');
            modal.className = 'crop-modal';
            modal.innerHTML = `
                <div class="crop-modal-content">
                    <h3 style="margin-bottom:16px;">Adjust Avatar</h3>
                    <div class="crop-container" id="cropContainer">
                        <img class="crop-image" id="cropImage" src="${e.target.result}" style="transform: scale(1) translate(0px, 0px);">
                    </div>
                    <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1">
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button id="cropApply" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Apply</button>
                        <button id="cropCancel" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const cropImg = document.getElementById('cropImage');
            const container = document.getElementById('cropContainer');
            const slider = document.getElementById('zoomSlider');
            
            let startX, startY, startTranslateX, startTranslateY;
            
            const updateTransform = () => {
                cropImg.style.transform = `scale(${cropScale}) translate(${cropTranslateX}px, ${cropTranslateY}px)`;
            };
            
            slider.addEventListener('input', (e) => {
                cropScale = parseFloat(e.target.value);
                updateTransform();
            });
            
            const onMouseDown = (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startTranslateX = cropTranslateX;
                startTranslateY = cropTranslateY;
                container.style.cursor = 'grabbing';
                e.preventDefault();
            };
            
            const onMouseMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                cropTranslateX = startTranslateX + dx / cropScale;
                cropTranslateY = startTranslateY + dy / cropScale;
                updateTransform();
            };
            
            const onMouseUp = () => {
                isDragging = false;
                container.style.cursor = 'grab';
            };
            
            container.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            
            modal.querySelector('#cropApply').onclick = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 400;
                    canvas.width = size;
                    canvas.height = size;
                    
                    const imgWidth = img.width;
                    const imgHeight = img.height;
                    const scaledWidth = imgWidth * cropScale;
                    const scaledHeight = imgHeight * cropScale;
                    const dx = (size - scaledWidth) / 2 + (cropTranslateX * cropScale);
                    const dy = (size - scaledHeight) / 2 + (cropTranslateY * cropScale);
                    
                    ctx.drawImage(img, dx, dy, scaledWidth, scaledHeight);
                    canvas.toBlob((blob) => {
                        updateAvatar(blob);
                        modal.remove();
                    }, 'image/png');
                };
                img.src = URL.createObjectURL(cropImageFile);
            };
            modal.querySelector('#cropCancel').onclick = () => modal.remove();
        };
        reader.readAsDataURL(file);
    }

    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });

    function parseMentionsAndHashtags(text) {
        if (!text) return '';
        let html = escapeHtml(text);
        html = html.replace(/@(\w+)/g, '<span class="mention" data-mention="$1">@$1</span>');
        html = html.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return html;
    }

    window.showRegister = () => {
        const puzzle = generatePuzzle();
        document.getElementById('authForm').innerHTML = `

            <div class="puzzle-container" id="puzzleContainer">
                <div class="puzzle-question">🔒 Verify you're human: ${puzzle.question}</div>
                <div class="puzzle-options" id="puzzleOptions">
                    ${puzzle.options.map(opt => `<div class="puzzle-option" data-value="${opt}">${opt}</div>`).join('')}
                </div>
                <div id="puzzleMessage" style="margin-top:12px; font-size:12px;"></div>
            </div>

            <div id="registerMessage"></div>
        `;
        
        document.querySelectorAll('.puzzle-option').forEach(el => {
            el.addEventListener('click', () => {
                const selected = el.dataset.value;
                if (selected === puzzle.answer) {
                    document.querySelectorAll('.puzzle-option').forEach(opt => opt.classList.remove('correct', 'wrong'));
                    el.classList.add('correct');
                    document.getElementById('puzzleMessage').innerHTML = '<span style="color:#00a86b;">✓ Verified! You can now register.</span>';
                    puzzleVerified = true;
                    const btn = document.getElementById('registerBtn');
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.background = 'var(--accent)';
                    btn.innerText = 'Register';
                    btn.onclick = () => register();
                } else {
                    document.querySelectorAll('.puzzle-option').forEach(opt => opt.classList.remove('correct', 'wrong'));
                    el.classList.add('wrong');
                    document.getElementById('puzzleMessage').innerHTML = '<span style="color:#f4212e;">✗ Wrong answer. Try again.</span>';

                    }, 1000);

            });
        });

    window.register = async () => {
        if (!puzzleVerified) {
            showMessage('registerMessage', 'Please complete the verification first', true);
            return;
        }
        
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) {
            showMessage('registerMessage', 'Username must be 3-20 characters (letters, numbers, underscore)', true);
            return;
        }
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            showMessage('registerMessage', 'Invalid email format', true);
            return;
        }
        if (password.length < 4) {
            showMessage('registerMessage', 'Password must be at least 4 characters', true);
            return;
        }
        
        try {
            await api('/api/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password }),
                headers: { 'Content-Type': 'application/json' }
            });
            showMessage('registerMessage', 'Registration successful! Please login.', false);
            setTimeout(() => renderAuth(), 1500);
        } catch(e) {
            showMessage('registerMessage', 'Username or email already taken', true);
        }
    };

        const password = document.getElementById('loginPassword').value;
        try {

    function showMessage(elementId, message, isError = false) {
        const container = document.getElementById(elementId);
        if (container) {

            if (existing) existing.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'error-message' : 'success-message';

            msgDiv.textContent = message;
            container.appendChild(msgDiv);
            setTimeout(() => { if (msgDiv.parentNode) msgDiv.remove(); }, 4000);
        }
    }

        }, 10);
        return `
            <div id="createModal" class="modal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:1000;">
                <div class="modal-content" style="background:#000000; border:1px solid #2f3336; border-radius:28px; padding:24px; width:500px; max-width:90%;">
                    <h3 style="margin-bottom:16px;">Create post</h3>
                    <textarea id="modalPostContent" rows="3" style="width:100%; background:#000000; border:1px solid #2f3336; border-radius:12px; padding:12px; color:white;"></textarea>
                    <div class="post-privacy" style="margin:12px 0;">
                        <div class="privacy-option ${pendingPostPrivacy === 'public' ? 'active' : ''}" onclick="setPrivacy('public')">🌍 Public</div>
                        <div class="privacy-option ${pendingPostPrivacy === 'followers' ? 'active' : ''}" onclick="setPrivacy('followers')">🔒 Followers only</div>
                    </div>
                    <input type="file" id="modalPostImage" accept="image/*" style="margin:12px 0;">
                    <div id="modalImagePreview"></div>
                    <div style="display:flex; gap:12px;">
                        <button onclick="publishModalPost()" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Post</button>
                        <button onclick="switchTab('home')" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMore() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const themeNames = { dark: 'Dark (Black)', 'dark-gray': 'Dark Gray', gray: 'Gray', light: 'Light' };
        let dropdownOpen = false;
        
        setTimeout(() => {
            const select = document.getElementById('themeSelect');
            if (select) {
                select.onclick = (e) => {
                    e.stopPropagation();
                    const dropdown = document.getElementById('themeDropdown');
                    if (dropdown) {
                        const isOpen = dropdown.style.display === 'block';
                        dropdown.style.display = isOpen ? 'none' : 'block';
                        select.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲';
                    }
                };
                document.addEventListener('click', () => {
                    const dropdown = document.getElementById('themeDropdown');
                    if (dropdown) dropdown.style.display = 'none';
                    if (select) select.querySelector('.arrow').innerHTML = '▼';
                });
            }
        }, 10);
        
        return `
            <div class="feed-container" style="padding:20px;">
                <div class="profile-header" style="border-bottom: none;">
                    <h3 style="text-align:left; margin-bottom:20px;">Theme</h3>
                    <div class="custom-select" id="themeSelect">
                        <span id="selectedThemeText">${themeNames[savedTheme]}</span>
                        <span class="arrow">▼</span>
                        <div class="custom-select-dropdown" id="themeDropdown" style="display:none;">
                            <div class="custom-select-option ${savedTheme === 'dark' ? 'selected' : ''}" onclick="setTheme('dark'); document.getElementById('selectedThemeText').innerText='Dark (Black)';">Dark (Black)</div>
                            <div class="custom-select-option ${savedTheme === 'dark-gray' ? 'selected' : ''}" onclick="setTheme('dark-gray'); document.getElementById('selectedThemeText').innerText='Dark Gray';">Dark Gray</div>
                            <div class="custom-select-option ${savedTheme === 'gray' ? 'selected' : ''}" onclick="setTheme('gray'); document.getElementById('selectedThemeText').innerText='Gray';">Gray</div>
                            <div class="custom-select-option ${savedTheme === 'light' ? 'selected' : ''}" onclick="setTheme('light'); document.getElementById('selectedThemeText').innerText='Light';">Light</div>
                        </div>
                    </div>
                </div>
                <div style="border-top:1px solid var(--border-color); margin-top:20px; padding-top:20px;">
                    <div class="recommendation-card" onclick="logout()" style="cursor:pointer;">
                        <div><strong>Logout</strong><div style="color:var(--text-secondary);">Sign out of your account</div></div>
                    </div>
                </div>
            </div>
        `;
    }

    window.publishModalPost = async () => {
        const content = document.getElementById('modalPostContent')?.value || '';
        const file = document.getElementById('modalPostImage')?.files[0];
        const formData = new FormData();
        formData.append('content', content);
        formData.append('privacy', pendingPostPrivacy);
        if (file) formData.append('image', file);
        await api('/api/posts', { method: 'POST', body: formData });
        switchTab('home');
        await loadFeed();
        renderMain();
    };

    function openAvatarUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,image/gif';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                openCropModal(file);
            }
        };
        input.click();
    }

    async function renderMain() {
        await loadFeed();
        await loadConversations();
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;
        
        const root = document.getElementById('root');
        
        if (currentTab === 'profile') {
            root.innerHTML = `
                <div class="app">
                    <div class="sidebar">
                        <div class="logo">FreedomNet</div>
                        ${tabs.map((tab, idx) => `
                            <div class="nav-item ${currentTab === tabKeys[idx] ? 'active' : ''}" onclick="switchTab('${tabKeys[idx]}')">
                                <span class="nav-text">${tab}</span>
                            </div>
                        `).join('')}
                        <div class="nav-item" onclick="logout()" style="margin-top: 40px;">
                            <span class="nav-text">Logout</span>
                        </div>
                    </div>
                    <div class="main-content">
                        <div class="header">Profile</div>
                        ${renderProfilePage()}
                    </div>
                </div>
            `;
            attachGlobalEvents();
            return;
        }
        
        root.innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">FreedomNet</div>
                    ${tabs.map((tab, idx) => `
                        <div class="nav-item ${currentTab === tabKeys[idx] ? 'active' : ''}" onclick="switchTab('${tabKeys[idx]}')">
                            <span class="nav-text">${tab}</span>
                        </div>
                    `).join('')}
                    <div class="nav-item" onclick="logout()" style="margin-top: 40px;">
                        <span class="nav-text">Logout</span>
                    </div>
                </div>
                <div class="main-content">
                    <div class="header">${currentTab === 'more' ? 'Settings' : (currentTab.charAt(0).toUpperCase() + currentTab.slice(1))}</div>
                    ${currentTab === 'home' ? renderHome() : ''}
                    ${currentTab === 'messages' ? renderMessages() : ''}
                    ${currentTab === 'search' ? renderSearch() : ''}
                    ${currentTab === 'interesting' ? renderInteresting() : ''}
                    ${currentTab === 'notifications' ? renderNotifications() : ''}
                    ${currentTab === 'create' ? renderCreateModal() : ''}
                    ${currentTab === 'more' ? renderMore() : ''}
                </div>
            </div>
        `;
        
        attachGlobalEvents();
        if (currentTab === 'home') attachHomeEvents();
    }

    function attachGlobalEvents() {
        document.querySelectorAll('.mention, .hashtag, .post-username, .post-avatar-img, .avatar-placeholder, .avatar-img').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const username = el.dataset?.mention || el.dataset?.username || el.closest('[data-username]')?.dataset?.username;
                if (username) {
                    const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() };
                    const rect = el.getBoundingClientRect();
                    showUserPreview(user, rect.left, rect.bottom + 5);
                }
            });
        });
    }

    function attachHomeEvents() {
        const textarea = document.getElementById('postContent');
        const suggestionsContainer = document.getElementById('suggestionsContainer');
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                const value = e.target.value;
                const lastWord = value.split(/[\s\n]/).pop();
                if (lastWord && (lastWord.startsWith('@') || lastWord.startsWith('#'))) {
                    const query = lastWord.substring(1);
                    if (lastWord.startsWith('@')) {
                        const matches = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m.username}" data-type="mention" style="padding:10px 12px; cursor:pointer;">@${escapeHtml(m.username)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    } else {
                        const hashtags = ['trending', 'news', 'viral', 'coding', 'design', 'tech', 'art', 'music'];
                        const matches = hashtags.filter(h => h.includes(query)).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000000; border:1px solid #2f3336; border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m}" data-type="hashtag" style="padding:10px 12px; cursor:pointer;">#${escapeHtml(m)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    }
                    document.querySelectorAll('.suggestion-item').forEach(el => {
                        el.addEventListener('click', () => {
                            const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'mention' ? '@' : '#') + el.dataset.suggestion + ' ';
                            textarea.value = newValue;
                            suggestionsContainer.innerHTML = '';
                            textarea.focus();
                        });
                    });
                } else suggestionsContainer.innerHTML = '';
            });
        }
        const imageInput = document.getElementById('postImage');
        if (imageInput) {
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { pendingImage = ev.target.result; document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`; };
                    reader.readAsDataURL(file);
                }
            });
        }
    }

    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value || '';
        const formData = new FormData();
        formData.append('content', content);
        formData.append('privacy', pendingPostPrivacy);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        document.getElementById('postContent').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        await loadFeed();
        renderMain();
    };

    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' });
        else await api(`/api/like/${postId}`, { method: 'POST' });
        await loadFeed();
        renderMain();
    };

    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed();
        renderMain();
    };

    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; renderMain(); };
    window.openChat = async (userId, username) => {
        currentChatUser = { id: userId, username };
        const messages = await api(`/api/messages/${userId}`);
        document.getElementById('conversationsList').style.display = 'none';
        document.getElementById('chatArea').style.display = 'flex';
        const container = document.getElementById('chatMessages');
        container.innerHTML = messages.map(m => `<div class="message ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">${escapeHtml(m.content)}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    };
    window.sendChatMessage = async () => {
        const input = document.getElementById('chatInput');
        const content = input?.value.trim();
        if (!content || !currentChatUser) return;
        await api(`/api/messages/${currentChatUser.id}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        input.value = '';
        await openChat(currentChatUser.id, currentChatUser.username);
    };
    window.logout = async () => { await api('/api/logout', { method: 'POST' }); currentUser = null; render(); };
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

    (async () => {
        try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(); } } catch(e) {}
        render();
    })();
</script>
</body>
</html>
