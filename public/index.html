<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet — Glass UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Абстрактные световые линии на фоне */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 20% 30%, rgba(29, 155, 240, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* iPhone-подобный контейнер */
        .iphone-container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            background: #0A0A0A;
            border-radius: 50px;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Основной контент с прокруткой */
        .screen-content {
            padding: 20px 16px;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .screen-content::-webkit-scrollbar {
            width: 4px;
        }

        .screen-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .screen-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* СТАТУС БАР */
        .status-bar {
            padding: 14px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 590;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.2px;
            background: transparent;
        }

        .time {
            font-weight: 590;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            opacity: 0.8;
        }

        /* СТЕКЛЯННЫЕ КАРТОЧКИ */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.25s ease-out;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Сетка 2 колонки для маленьких карточек */
        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .mini-card {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mini-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .mini-info h4 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .mini-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
        }

        /* БОЛЬШАЯ КАРТОЧКА ПРОГРЕССА */
        .progress-card {
            padding: 20px;
            margin-bottom: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .progress-title h3 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .progress-title p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .progress-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
        }

        .progress-value {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 100px;
            height: 100%;
            width: 67%;
            transition: width 0.3s ease;
        }

        /* STREAK КАРТОЧКА */
        .streak-card {
            padding: 20px;
            margin-bottom: 16px;
        }

        .streak-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .streak-title h3 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .streak-title p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .streak-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 8px rgba(255, 100, 0, 0.3));
        }

        /* Кружки дней */
        .days-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .day-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .day-circle.completed {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
            position: relative;
        }

        .day-circle.completed::after {
            content: '✓';
            font-size: 12px;
            margin-left: 2px;
        }

        .day-circle.current {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* ПАГИНАЦИЯ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .dot.active {
            width: 24px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.6);
        }

        /* DOCK (нижняя панель) */
        .dock {
            background: rgba(20, 22, 32, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            margin: 8px 12px 20px 12px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .dock-icon {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .dock-icon:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
            color: white;
        }

        /* Адаптация под мобильные */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .iphone-container {
                border-radius: 40px;
            }
            .screen-content {
                padding: 16px 14px;
            }
            .day-circle {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .dock-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="iphone-container">
        <!-- Статус бар -->
        <div class="status-bar">
            <span class="time">8:30</span>
            <div class="status-icons">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="screen-content">
            <!-- Сетка маленьких карточек -->
            <div class="mini-grid">
                <div class="glass-card mini-card">
                    <div class="mini-icon">📱</div>
                    <div class="mini-info">
                        <h4>Daily dual phones</h4>
                        <p>Day 2</p>
                    </div>
                </div>
                <div class="glass-card mini-card">
                    <div class="mini-icon">🍎</div>
                    <div class="mini-info">
                        <h4>Eat last meal earlier</h4>
                        <p>Day 1</p>
                    </div>
                </div>
            </div>

            <!-- Большая карточка прогресса -->
            <div class="glass-card progress-card">
                <div class="progress-header">
                    <div class="progress-title">
                        <h3>100 days of UI/UX design</h3>
                        <p>29 days left</p>
                    </div>
                </div>
                <div class="progress-stats">
                    <span class="progress-label">Progress</span>
                    <span class="progress-value">67/100 days</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 67%"></div>
                </div>
            </div>

            <!-- Streak карточка -->
            <div class="glass-card streak-card">
                <div class="streak-header">
                    <div class="streak-title">
                        <h3>2 days of Streak</h3>
                        <p>100 Days of UI/UX Design</p>
                    </div>
                    <div class="streak-icon">🔥</div>
                </div>
                <div class="days-row">
                    <div class="day-circle completed">1</div>
                    <div class="day-circle current">2</div>
                    <div class="day-circle">3</div>
                    <div class="day-circle">4</div>
                    <div class="day-circle">5</div>
                    <div class="day-circle">6</div>
                    <div class="day-circle">7</div>
                </div>
            </div>

            <!-- Пагинация -->
            <div class="pagination">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Нижняя панель (Dock) -->
        <div class="dock">
            <div class="dock-icon">🌐</div>
            <div class="dock-icon">💬</div>
            <div class="dock-icon">📱</div>
            <div class="dock-icon">🎵</div>
        </div>
    </div>

    <script>
        // Добавляем лёгкие анимации при загрузке
        const cards = document.querySelectorAll('.glass-card');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, index * 50);
        });

        // Эффект свечения при наведении на точки пагинации
        const dots = document.querySelectorAll('.dot');
        dots.forEach(dot => {
            dot.addEventListener('mouseenter', function() {
                if (!this.classList.contains('active')) {
                    this.style.transform = 'scale(1.5)';
                }
            });
            dot.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });

        // Ripple-эффект на иконки док-панели
        const dockIcons = document.querySelectorAll('.dock-icon');
        dockIcons.forEach(icon => {
            icon.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '100%';
                ripple.style.height = '100%';
                ripple.style.borderRadius = '28px';
                ripple.style.background = 'rgba(255,255,255,0.2)';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.3s ease-out';
                ripple.style.pointerEvents = 'none';
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => { ripple.style.transform = 'scale(3)'; }, 10);
                setTimeout(() => { ripple.remove(); }, 300);
            });
        });

        // Живое время
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const timeEl = document.querySelector('.time');
            if (timeEl) timeEl.textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 60000);
    </script>
</body>
</html>
