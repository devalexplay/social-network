<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FreedomNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* App wrapper */
        .app {
            display: flex;
            min-height: 100vh;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
        }

        /* Sidebar navigation - text only, no emojis */
        .sidebar {
            width: 275px;
            position: fixed;
            height: 100vh;
            padding: 20px 12px;
            border-right: 1px solid #2f3336;
            background: #000000;
            overflow-y: auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            padding: 12px;
            color: #1d9bf0;
            letter-spacing: -1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            margin: 4px 0;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 20px;
            font-weight: 400;
            width: fit-content;
        }

        .nav-item:hover {
            background: #181818;
            transform: translateX(4px);
        }

        .nav-item.active {
            font-weight: 700;
            color: #1d9bf0;
        }

        .nav-text {
            font-size: 20px;
        }

        /* Main content */
        .main-content {
            margin-left: 275px;
            flex: 1;
            min-height: 100vh;
            border-right: 1px solid #2f3336;
        }

        /* Header with fade-in animation */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-bottom: 1px solid #2f3336;
            font-size: 20px;
            font-weight: 800;
            z-index: 10;
            animation: slideDown 0.25s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Feed container */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Create post area */
        .create-post {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .post-input-area {
            flex: 1;
        }

        .post-input-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 18px;
            resize: vertical;
            font-family: inherit;
            outline: none;
            min-height: 60px;
        }

        .post-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .image-upload {
            color: #1d9bf0;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .image-upload:hover {
            background: #181818;
            transform: scale(1.05);
        }

        .publish-btn {
            background: #1d9bf0;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .publish-btn:hover {
            background: #1a8cd8;
            transform: scale(1.02);
        }

        /* Post card with fade-in animation */
        .post-card {
            border-bottom: 1px solid #2f3336;
            padding: 12px 16px;
            transition: background 0.2s ease, transform 0.2s ease;
            cursor: pointer;
            animation: fadeInUp 0.3s ease;
        }

        .post-card:hover {
            background: #080808;
            transform: translateX(2px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .post-header {
            display: flex;
            gap: 12px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .post-body {
            flex: 1;
        }

        .post-user {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .post-username {
            color: #71767b;
            font-weight: 400;
            margin-left: 6px;
            font-size: 14px;
        }

        .post-time {
            color: #71767b;
            font-size: 13px;
            margin-left: 6px;
        }

        .post-content {
            font-size: 15px;
            margin: 8px 0;
            line-height: 1.4;
        }

        .post-image {
            margin-top: 12px;
            border-radius: 16px;
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid #2f3336;
            transition: transform 0.2s ease;
        }

        .post-image:hover {
            transform: scale(1.01);
        }

        .post-stats {
            display: flex;
            gap: 32px;
            margin-top: 12px;
        }

        .stat-btn {
            background: none;
            border: none;
            color: #71767b;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            transition: all 0.2s ease;
        }

        .stat-btn:hover {
            background: #181818;
            color: #1d9bf0;
            transform: scale(1.05);
        }

        .stat-btn.liked {
            color: #f91880;
        }

        /* Comments */
        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2f3336;
            animation: fadeIn 0.2s ease;
        }

        .comment {
            font-size: 14px;
            margin: 8px 0;
        }

        .comment strong {
            color: #1d9bf0;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 10px 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        .comment-input input:focus {
            border-color: #1d9bf0;
            transform: scale(1.01);
        }

        /* Search */
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #1d9bf0;
            transform: scale(1.01);
        }

        .search-result {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: fadeInUp 0.2s ease;
        }

        .search-result:hover {
            background: #080808;
            transform: translateX(4px);
        }

        /* Reels */
        .reels-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .reel {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: fadeInUp 0.3s ease;
            transition: transform 0.2s ease;
        }

        .reel:hover {
            transform: translateY(-2px);
        }

        .reel-video {
            width: 100%;
            aspect-ratio: 9/16;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        /* Interesting / Recommendations */
        .recommendation-card {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            animation: fadeInUp 0.25s ease;
        }

        .recommendation-card:hover {
            transform: translateX(4px);
            border-color: #1d9bf0;
        }

        /* Notifications */
        .notification {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 12px;
            transition: all 0.2s ease;
            animation: fadeInUp 0.2s ease;
        }

        .notification:hover {
            background: #080808;
            transform: translateX(2px);
        }

        /* Messages */
        .messages-container {
            display: flex;
            height: calc(100vh - 70px);
            animation: fadeIn 0.3s ease;
        }

        .conversations-list {
            width: 350px;
            border-right: 1px solid #2f3336;
            overflow-y: auto;
        }

        .conversation {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .conversation:hover {
            background: #080808;
            transform: translateX(2px);
        }

        .conversation.active {
            background: #181818;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            animation: fadeInUp 0.2s ease;
        }

        .message.outgoing {
            background: #1d9bf0;
            color: white;
            align-self: flex-end;
        }

        .message.incoming {
            background: #2f3336;
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #2f3336;
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 12px 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        .chat-input-area input:focus {
            border-color: #1d9bf0;
        }

        /* Modal for Create */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 24px;
            width: 500px;
            max-width: 90%;
            animation: scaleIn 0.2s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Auth */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            animation: scaleIn 0.25s ease;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        .auth-card input:focus {
            border-color: #1d9bf0;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-card button:hover {
            background: #1a8cd8;
            transform: scale(1.02);
        }

        /* Error message styling - inline red text */
        .error-message {
            color: #f4212e;
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 4px;
            text-align: center;
            animation: fadeIn 0.2s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f3336;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1d9bf0;
        }

        @media (max-width: 1000px) {
            .sidebar { width: 88px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 88px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // API helper
    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    let currentUser = null;
    let currentTab = 'home';
    let feed = [];
    let conversations = [];
    let currentChatUser = null;
    let pendingImage = null;
    let searchQuery = '';
    let searchResults = [];

    // Navigation tabs - text only
    const tabs = ['Home', 'Reels', 'Messages', 'Search', 'Interesting', 'Notifications', 'Create', 'More'];
    const tabKeys = ['home', 'reels', 'messages', 'search', 'interesting', 'notifications', 'create', 'more'];

    function showError(elementId, message) {
        const container = document.getElementById(elementId);
        if (container) {
            const existingError = container.querySelector('.error-message');
            if (existingError) existingError.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            container.appendChild(errorDiv);
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 4000);
        }
    }

    async function render() {
        if (!currentUser) {
            await renderAuth();
            return;
        }
        await renderMain();
    }

    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="margin-bottom:20px; text-align:center;">FreedomNet</h2>
                    <div id="authForm">
                        <input type="text" id="loginInput" placeholder="Username / Email">
                        <input type="password" id="loginPassword" placeholder="Password">
                        <button onclick="login()">Login</button>
                        <p style="margin:15px 0; text-align:center; color:#71767b;">or</p>
                        <button onclick="showRegister()" style="background:#2f3336;">Register</button>
                    </div>
                </div>
            </div>
        `;
    }

    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `
            <input type="text" id="regUsername" placeholder="Username" maxlength="20">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">
            <button onclick="register()">Register</button>
            <button onclick="renderAuth()" style="background:#2f3336; margin-top:10px;">Back</button>
            <div id="registerError"></div>
        `;
    };

    window.register = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) {
            showError('registerError', 'Username must be 3-20 characters (letters, numbers, underscore)');
            return;
        }
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            showError('registerError', 'Invalid email format');
            return;
        }
        if (password.length < 4) {
            showError('registerError', 'Password must be at least 4 characters');
            return;
        }
        
        try {
            await api('/api/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password }),
                headers: { 'Content-Type': 'application/json' }
            });
            alert('Registration successful! Please login.');
            renderAuth();
        } catch(e) {
            showError('registerError', 'Username or email already taken');
        }
    };

    window.login = async () => {
        const login = document.getElementById('loginInput').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', {
                method: 'POST',
                body: JSON.stringify({ login, password }),
                headers: { 'Content-Type': 'application/json' }
            });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed();
            await loadConversations();
            render();
        } catch(e) {
            showError('authForm', 'Invalid username/email or password');
        }
    };

    async function loadFeed() {
        try { feed = await api('/api/feed'); } catch(e) { feed = []; }
    }

    async function loadConversations() {
        try { conversations = await api('/api/conversations'); } catch(e) { conversations = []; }
    }

    async function searchUsers() {
        if (!searchQuery.trim()) { searchResults = []; renderMain(); return; }
        try {
            const users = await api('/api/users');
            searchResults = users.filter(u => u.username.toLowerCase().includes(searchQuery.toLowerCase()));
            renderMain();
        } catch(e) { searchResults = []; }
    }

    async function renderMain() {
        await loadFeed();
        await loadConversations();
        
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">FreedomNet</div>
                    ${tabs.map((tab, idx) => `
                        <div class="nav-item ${currentTab === tabKeys[idx] ? 'active' : ''}" onclick="switchTab('${tabKeys[idx]}')">
                            <span class="nav-text">${tab}</span>
                        </div>
                    `).join('')}
                    <div class="nav-item" onclick="logout()" style="margin-top: 40px;">
                        <span class="nav-text">Logout</span>
                    </div>
                </div>
                <div class="main-content">
                    <div class="header">${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}</div>
                    ${currentTab === 'home' ? renderHome() : ''}
                    ${currentTab === 'reels' ? renderReels() : ''}
                    ${currentTab === 'messages' ? renderMessages() : ''}
                    ${currentTab === 'search' ? renderSearch() : ''}
                    ${currentTab === 'interesting' ? renderInteresting() : ''}
                    ${currentTab === 'notifications' ? renderNotifications() : ''}
                    ${currentTab === 'create' ? renderCreateModal() : ''}
                    ${currentTab === 'more' ? renderMore() : ''}
                </div>
            </div>
        `;
        
        if (currentTab === 'home') attachFeedEvents();
        if (currentTab === 'search') {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; searchUsers(); });
            }
        }
    }

    function renderHome() {
        return `
            <div class="feed-container">
                <div class="create-post">
                    <div class="avatar">${currentUser?.username?.[0]?.toUpperCase() || 'U'}</div>
                    <div class="post-input-area">
                        <textarea id="postContent" rows="2" placeholder="What's happening?"></textarea>
                        <div id="imagePreview" style="margin-top:8px;"></div>
                        <div class="post-actions-bar">
                            <label class="image-upload">📷 <input type="file" id="postImage" accept="image/*" style="display:none;"></label>
                            <button class="publish-btn" onclick="publishPost()">Post</button>
                        </div>
                    </div>
                </div>
                ${feed.map(post => `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${(post.username || 'U')[0].toUpperCase()}</div>
                            <div class="post-body">
                                <div class="post-user">
                                    ${escapeHtml(post.username)}
                                    <span class="post-username">@${escapeHtml(post.username)}</span>
                                    <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div class="post-content">${escapeHtml(post.content || '')}</div>
                                ${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open('${post.image}')">` : ''}
                                <div class="post-stats">
                                    <button class="stat-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                        ♥ ${post.likes_count || 0}
                                    </button>
                                    <button class="stat-btn" onclick="toggleComments(${post.id})">
                                        💬 ${post.comments?.length || 0}
                                    </button>
                                </div>
                                <div id="comments-${post.id}" style="display:none;" class="comments-section">
                                    ${(post.comments || []).map(c => `<div class="comment"><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.content)}</div>`).join('')}
                                    <div class="comment-input">
                                        <input type="text" id="commentInput-${post.id}" placeholder="Add a comment...">
                                        <button onclick="addComment(${post.id})">→</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderReels() {
        return `
            <div class="reels-container">
                ${[1,2,3,4,5].map(i => `
                    <div class="reel">
                        <div class="reel-video">▶ Reel ${i}</div>
                        <div style="padding:12px;"><strong>creator_${i}</strong><div style="color:#71767b; font-size:12px;">1.2M views</div></div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderMessages() {
        return `
            <div class="messages-container">
                <div class="conversations-list" id="conversationsList">
                    ${conversations.map(c => `
                        <div class="conversation" onclick="openChat(${c.other_id}, '${escapeHtml(c.username)}')">
                            <strong>${escapeHtml(c.username)}</strong>
                            <div style="font-size:12px; color:#71767b;">${escapeHtml(c.last_message || 'No messages yet')}</div>
                        </div>
                    `).join('')}
                    ${conversations.length === 0 ? '<div style="padding:20px; color:#71767b;">No conversations yet</div>' : ''}
                </div>
                <div class="chat-area" id="chatArea" style="display:none;">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Message...">
                        <button onclick="sendChatMessage()" style="background:#1d9bf0; border:none; border-radius:9999px; padding:8px 20px; color:white;">Send</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderSearch() {
        return `
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search users...">
                <div id="searchResults" style="margin-top:20px;">
                    ${searchResults.map(u => `
                        <div class="search-result" onclick="openChat(${u.id}, '${escapeHtml(u.username)}'); switchTab('messages');">
                            <strong>${escapeHtml(u.username)}</strong>
                        </div>
                    `).join('')}
                    ${searchQuery && searchResults.length === 0 ? '<div style="padding:20px; color:#71767b;">No users found</div>' : ''}
                </div>
            </div>
        `;
    }

    function renderInteresting() {
        return `
            <div class="feed-container">
                ${feed.slice(0,5).map(post => `
                    <div class="recommendation-card">
                        <strong>@${escapeHtml(post.username)}</strong>
                        <div style="margin-top:8px;">${escapeHtml(post.content || '')}</div>
                        <button onclick="switchTab('home')" style="margin-top:12px; background:#1d9bf0; border:none; padding:6px 16px; border-radius:20px; color:white; cursor:pointer;">Follow</button>
                    </div>
                `).join('')}
                ${feed.length === 0 ? '<div style="padding:20px; color:#71767b;">No recommendations yet</div>' : ''}
            </div>
        `;
    }

    function renderNotifications() {
        return `
            <div class="feed-container">
                ${feed.slice(0,8).map(post => `
                    <div class="notification">
                        <div class="avatar" style="width:40px;height:40px;">♥</div>
                        <div><strong>${escapeHtml(post.username)}</strong> liked your post</div>
                    </div>
                `).join('')}
                ${feed.length === 0 ? '<div style="padding:20px; color:#71767b;">No notifications yet</div>' : ''}
            </div>
        `;
    }

    function renderCreateModal() {
        setTimeout(() => {
            const modal = document.getElementById('createModal');
            if (modal) {
                modal.style.display = 'flex';
                document.getElementById('modalPostContent')?.focus();
            }
        }, 10);
        return `
            <div id="createModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3 style="margin-bottom:16px;">Create new post</h3>
                    <textarea id="modalPostContent" rows="3" style="width:100%; background:#000; border:1px solid #2f3336; border-radius:12px; padding:12px; color:white;" placeholder="What's happening?"></textarea>
                    <input type="file" id="modalPostImage" accept="image/*" style="margin:12px 0;">
                    <div id="modalImagePreview"></div>
                    <div style="display:flex; gap:12px; margin-top:16px;">
                        <button onclick="publishModalPost()" style="flex:1; background:#1d9bf0; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Post</button>
                        <button onclick="switchTab('home')" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMore() {
        return `
            <div class="feed-container" style="padding:20px;">
                <div class="recommendation-card" onclick="logout()" style="cursor:pointer;">
                    <strong>Logout</strong>
                    <div style="color:#71767b;">Sign out of your account</div>
                </div>
                <div class="recommendation-card">
                    <strong>Profile</strong>
                    <div style="color:#71767b;">@${escapeHtml(currentUser?.username)}</div>
                </div>
                <div class="recommendation-card">
                    <strong>Settings</strong>
                    <div style="color:#71767b;">Appearance, language, privacy</div>
                </div>
            </div>
        `;
    }

    window.publishModalPost = async () => {
        const content = document.getElementById('modalPostContent')?.value || '';
        const file = document.getElementById('modalPostImage')?.files[0];
        const formData = new FormData();
        formData.append('content', content);
        if (file) formData.append('image', file);
        await api('/api/posts', { method: 'POST', body: formData });
        switchTab('home');
        await loadFeed();
        renderMain();
    };

    function attachFeedEvents() {
        const imageInput = document.getElementById('postImage');
        if (imageInput) {
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingImage = ev.target.result;
                        const preview = document.getElementById('imagePreview');
                        if (preview) {
                            preview.innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`;
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    }

    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value || '';
        const formData = new FormData();
        formData.append('content', content);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        const postContent = document.getElementById('postContent');
        if (postContent) postContent.value = '';
        const preview = document.getElementById('imagePreview');
        if (preview) preview.innerHTML = '';
        await loadFeed();
        renderMain();
    };

    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) {
            await api(`/api/like/${postId}`, { method: 'DELETE' });
        } else {
            await api(`/api/like/${postId}`, { method: 'POST' });
        }
        await loadFeed();
        renderMain();
    };

    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed();
        renderMain();
    };

    window.switchTab = (tab) => {
        currentTab = tab;
        if (tab === 'home') renderMain();
        else renderMain();
    };

    window.openChat = async (userId, username) => {
        currentChatUser = { id: userId, username };
        const messages = await api(`/api/messages/${userId}`);
        const conversationsDiv = document.getElementById('conversationsList');
        const chatArea = document.getElementById('chatArea');
        if (conversationsDiv) conversationsDiv.style.display = 'none';
        if (chatArea) chatArea.style.display = 'flex';
        const container = document.getElementById('chatMessages');
        if (container) {
            container.innerHTML = messages.map(m => `
                <div class="message ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">
                    ${escapeHtml(m.content)}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
    };

    window.sendChatMessage = async () => {
        const input = document.getElementById('chatInput');
        const content = input?.value.trim();
        if (!content || !currentChatUser) return;
        await api(`/api/messages/${currentChatUser.id}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        if (input) input.value = '';
        await openChat(currentChatUser.id, currentChatUser.username);
    };

    window.logout = async () => {
        await api('/api/logout', { method: 'POST' });
        currentUser = null;
        render();
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    (async () => {
        try {
            const me = await api('/api/me');
            if (me.user) {
                currentUser = me.user;
                await loadFeed();
            }
        } catch(e) {}
        render();
    })();
</script>
</body>
</html>
