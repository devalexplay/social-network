<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet — iOS 26 Glass</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(20, 22, 32, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --accent: #1d9bf0;
            --accent-glow: rgba(29, 155, 240, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 28, 38, 0.7);
            --gold: #ffd700;
            --moderator: #23c55e;
            --admin: #f4212e;
            --online-green: #23c55e;
            --offline-gray: #6b7280;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        .loading-logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -2px;
            animation: pulse 1s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
        
        .sidebar {
            width: 280px;
            position: fixed;
            height: 100vh;
            padding: 24px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            transition: var(--transition);
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 40px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #6c5ce7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            display: inline-block;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .nav-item:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            transform: translateX(4px);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .nav-item.logout:hover {
            background: rgba(244, 33, 46, 0.15);
            color: var(--admin);
        }
        
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 10px 20px;
            z-index: 100;
            justify-content: space-around;
        }
        
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-secondary);
            border-radius: 16px;
            font-size: 11px;
        }
        
        .bottom-nav-item.active {
            color: var(--accent);
            background: rgba(29, 155, 240, 0.12);
        }
        
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            padding: 24px;
            transition: var(--transition);
        }
        
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px 28px;
            margin-bottom: 28px;
            border: 1px solid var(--glass-border);
            font-size: 28px;
            font-weight: 700;
        }
        
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .create-post {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .create-post textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }
        
        .create-post textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .post-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        
        .image-upload {
            color: var(--accent);
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }
        
        .publish-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .publish-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            transition: var(--transition);
            cursor: pointer;
            animation: fadeInUp 0.4s ease;
        }
        
        .post-card:hover {
            transform: translateY(-2px);
            background: rgba(35, 38, 50, 0.8);
            border-color: var(--glass-border);
        }
        
        .post-header {
            display: flex;
            gap: 12px;
        }
        
        .post-avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        
        .avatar-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
        }
        
        .post-body {
            flex: 1;
        }
        
        .post-user {
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .post-username {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 14px;
            cursor: pointer;
        }
        
        .post-username:hover {
            color: var(--accent);
        }
        
        .post-time {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .post-content {
            font-size: 15px;
            margin: 8px 0;
            line-height: 1.4;
        }
        
        .post-image-container {
            position: relative;
            display: inline-block;
            margin-top: 12px;
        }
        
        .post-image {
            border-radius: 20px;
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }
        
        .post-stats {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            align-items: center;
        }
        
        .stat-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 40px;
            transition: var(--transition);
        }
        
        .stat-btn:hover {
            color: var(--text-primary);
            background: var(--hover-bg);
        }
        
        .stat-btn.liked {
            color: #f91880;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 40px;
            margin-left: auto;
            transition: var(--transition);
        }
        
        .delete-btn:hover {
            color: var(--admin);
            background: rgba(244, 33, 46, 0.1);
        }
        
        .comments-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
        }
        
        .comment {
            font-size: 14px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        
        .comment-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--text-primary);
            outline: none;
        }
        
        .comment-input input:focus {
            border-color: var(--accent);
        }
        
        .comment-send-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .comment-send-btn:hover {
            color: var(--accent);
            background: var(--hover-bg);
        }
        
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .profile-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }
        
        .stat-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 16px;
        }
        
        .stat-item:hover {
            background: var(--hover-bg);
        }
        
        .stat-number {
            font-weight: 700;
            font-size: 22px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .gold-badge, .verified-badge, .moderator-badge, .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        
        .gold-badge {
            background: linear-gradient(135deg, var(--gold) 0%, #ffaa00 100%);
            color: #000;
        }
        
        .verified-badge {
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            color: white;
        }
        
        .moderator-badge {
            background: linear-gradient(135deg, var(--moderator) 0%, #1a9e4a 100%);
            color: #000;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, var(--admin) 0%, #c41e2a 100%);
            color: white;
        }
        
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .custom-modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px;
            width: 420px;
            max-width: 90%;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }
        
        .custom-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .custom-modal-btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }
        
        .custom-modal-btn-yes {
            background: linear-gradient(135deg, var(--admin) 0%, #c41e2a 100%);
            color: white;
        }
        
        .custom-modal-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .messages-container {
            display: flex;
            height: calc(100vh - 120px);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .conversations-sidebar {
            width: 320px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        
        .conversations-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .conversations-search {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            outline: none;
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-color);
        }
        
        .conversation-item:hover {
            background: var(--hover-bg);
        }
        
        .conversation-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        
        .message-row.outgoing {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .message-bubble.outgoing {
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-bubble.incoming {
            background: rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
        }
        
        .chat-input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 16px;
            color: var(--text-primary);
            outline: none;
        }
        
        .chat-send-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }
        
        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .search-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            color: var(--text-primary);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--accent);
        }
        
        .search-icon {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .search-result, .search-post-result {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            border-radius: 20px;
        }
        
        .search-result:hover, .search-post-result:hover {
            background: var(--hover-bg);
        }
        
        .global-footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }
        
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            width: 420px;
            max-width: 90%;
        }
        
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            outline: none;
        }
        
        .auth-card input:focus {
            border-color: var(--accent);
        }
        
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #0e7ac9 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-secondary);
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .divider::before {
            margin-right: 16px;
        }
        
        .divider::after {
            margin-left: 16px;
        }
        
        .mention, .hashtag {
            color: var(--accent);
            cursor: pointer;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 16px; padding-bottom: 80px; }
            .bottom-nav { display: flex; }
            .header { font-size: 22px; padding: 16px 20px; }
            .conversations-sidebar { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 20; transform: translateX(-100%); transition: transform 0.3s; }
            .conversations-sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div id="loading" class="loading-screen" style="display:flex;">
    <div class="loading-logo">FreedomNet</div>
</div>
<div id="root" style="display:none;"></div>

<script>
    let currentUser = null;
    let currentTab = 'feed';
    let feed = [];
    let conversationsList = [];
    let currentChatUser = null;
    let pendingImage = null;
    let searchQuery = '';
    let searchResults = [];
    let searchPosts = [];
    let allUsers = [];
    let currentProfileUser = null;
    let userFollows = [];
    let followersList = [];
    let followingList = [];
    let unreadCount = 0;
    let currentChatMessages = [];
    let feedOffset = 0;
    let feedHasMore = true;
    let feedLoading = false;
    let onlineUsers = new Set();
    let ws = null;
    let reconnectTimeout = null;
    let nsfwEnabled = localStorage.getItem('nsfwEnabled') === 'true' ? true : false;
    let notificationSetting = localStorage.getItem('notificationSetting') || 'all';
    let fakeOnlineCount = 15;
    
    let currentLang = localStorage.getItem('language') || 'en';
    const translations = {

        if (currentTab === 'feed') {
            updateFeedPosts();
            const imgInput = document.getElementById('postImage');
            if (imgInput) imgInput.onchange = (e) => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = (ev) => { pendingImage = ev.target.result; document.getElementById('imagePreview').innerHTML = `<div style="position:relative; display:inline-block;"><img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;"><button style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:20px; padding:6px 12px; cursor:pointer;" onclick="pendingImage=null; document.getElementById('imagePreview').innerHTML='';">Remove</button></div>`; }; r.readAsDataURL(f); } };
        }
    }
    
    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; currentChatUser = null; renderMain(); };
    window.showLogoutConfirm = () => { if (confirm('Logout?')) { api('/api/logout', { method: 'POST' }); currentUser = null; render(); } };
    window.performSearch = async () => { const q = document.getElementById('searchInput')?.value; if (!q) return; const res = await api(`/api/search?q=${encodeURIComponent(q)}`); const c = document.getElementById('searchResults'); if (c) c.innerHTML = (res.users?.length ? `<h3>Users</h3>${res.users.map(u => `<div class="search-result" onclick="viewProfile('${u.username}')"><img class="search-result-avatar" src="${u.avatar || ''}"><div><strong>${escapeHtml(u.username)}</strong>${renderCreatorBadge(u)}</div></div>`).join('')}</div>` : '') + (res.posts?.length ? `<h3>Posts</h3>${res.posts.map(p => `<div class="search-post-result" onclick="viewProfile('${p.username}')"><div><strong>${escapeHtml(p.username)}</strong></div><div>${escapeHtml(p.content?.substring(0,100))}</div></div>`).join('')}` : ''); };
    window.filterConversations = () => { const q = document.getElementById('conversationsSearch')?.value.toLowerCase() || ''; document.querySelectorAll('.conversation-item').forEach(i => { i.style.display = i.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); };
    window.openAvatarUpload = () => { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = async (e) => { const f = e.target.files[0]; if (f) { const fd = new FormData(); fd.append('avatar', f); await api('/api/avatar', { method: 'POST', body: fd }); const me = await api('/api/me'); currentUser = me.user; renderMain(); } }; input.click(); };
    window.showFollowers = () => { showUserList('Followers', followersList); };
    window.showFollowing = () => { showUserList('Following', followingList); };
    function showUserList(title, users) { const modal = document.createElement('div'); modal.className = 'custom-modal'; modal.innerHTML = `<div class="custom-modal-content"><p>${title}</p><div>${users.map(u => `<div onclick="viewProfile('${u.username}'); modal.remove();" style="padding:12px; cursor:pointer; border-bottom:1px solid var(--border-color);"><strong>${escapeHtml(u.username)}</strong></div>`).join('')}${users.length === 0 ? '<div style="padding:20px;">No users</div>' : ''}</div><div class="custom-modal-buttons"><button class="custom-modal-btn custom-modal-btn-cancel" onclick="modal.remove()">Close</button></div></div>`; document.body.appendChild(modal); }
    function showChangePasswordModal() { const pwd = prompt('Enter new password:'); if (pwd && pwd.length >= 4) { api('/api/change-password', { method: 'POST', body: JSON.stringify({ newPassword: pwd, confirmPassword: pwd }), headers: { 'Content-Type': 'application/json' } }).then(() => showToast('Password changed!')); } }
    function showStatsModal() { alert(`Posts: ${feed.filter(p => p.user_id === currentUser.id).length}\nLikes: ${feed.reduce((a,p) => a + (p.likes_count || 0), 0)}\nFollowers: ${followersList.length}\nFollowing: ${followingList.length}`); }
    function showDeleteAccountModal() { if (confirm('Delete account? This cannot be undone!')) { api('/api/delete-account', { method: 'POST', body: JSON.stringify({ password: prompt('Enter password:') }), headers: { 'Content-Type': 'application/json' } }).then(() => { api('/api/logout', { method: 'POST' }); currentUser = null; render(); }); } }
    
    async function render() { if (!currentUser) { await renderAuth(); return; } await loadAllUsers(); await loadFollows(); await renderMain(); }
    
    (async () => { try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadConversationsList(); await loadAllUsers(); await loadFollows(); connectWebSocket(); } } catch(e) {} render(); })();
</script>
</body>
</html>
