<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FreedomNet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-secondary: #71767b;
            --border: #2f3336;
            --hover: #080808;
            --accent: #1d9bf0;
            --gold: #ffd700;
            --moderator: #23c55e;
            --admin: #f4212e;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
        
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border); }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 30px; cursor: pointer; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; color: var(--text-secondary); }
        .nav-item:hover { color: var(--text); }
        .nav-item.active { color: var(--accent); font-weight: 700; }
        .main-content { margin-left: 275px; min-height: 100vh; border-right: 1px solid var(--border); }
        .header { position: sticky; top: 0; background: var(--bg); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 20px; font-weight: 800; }
        .feed-container { max-width: 600px; margin: 0 auto; }
        
        .create-post { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .post-input { flex: 1; }
        .post-input textarea { width: 100%; background: transparent; border: none; color: var(--text); font-size: 18px; resize: vertical; font-family: inherit; outline: none; min-height: 60px; }
        .post-actions { display: flex; justify-content: space-between; margin-top: 12px; }
        .publish-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; cursor: pointer; }
        
        .post-card { border-bottom: 1px solid var(--border); padding: 12px 16px; cursor: pointer; }
        .post-card:hover { background: var(--hover); }
        .post-header { display: flex; gap: 12px; }
        .post-username { font-weight: 700; }
        .post-handle { color: var(--text-secondary); font-size: 14px; }
        .post-time { color: var(--text-secondary); font-size: 13px; }
        .post-content { margin: 8px 0; line-height: 1.4; }
        .post-image { max-width: 100%; max-height: 300px; border-radius: 16px; margin-top: 8px; }
        .post-stats { display: flex; gap: 24px; margin-top: 12px; }
        .stat-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 12px; border-radius: 9999px; }
        .stat-btn.liked { color: #f91880; }
        
        .moderator-badge { background: var(--moderator); color: black; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .admin-badge { background: var(--admin); color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .gold-badge { background: var(--gold); color: black; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #000; border-radius: 28px; padding: 28px; width: 400px; max-width: 90%; border: 1px solid var(--border); }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); border-radius: 12px; color: white; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn-primary { background: var(--accent); color: white; }
        .modal-btn-cancel { background: #2f3336; color: white; }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 12px; justify-content: space-around; z-index: 100; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding-bottom: 70px; } .bottom-nav { display: flex; } }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 9999px; z-index: 10002; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============ DATA ============
    let currentUser = null;
    let currentTab = 'feed';
    let feed = [];
    let allUsers = [];
    let userFollows = [];
    let pendingImage = null;
    
    // ============ STORAGE KEYS ============
    const STORAGE_KEYS = {
        USERS: 'freedomnet_users',
        POSTS: 'freedomnet_posts',
        FOLLOWS: 'freedomnet_follows',
        CURRENT_USER: 'freedomnet_current_user'
    };
    
    // ============ INITIAL DATA ============
    function loadData() {
        if (!localStorage.getItem(STORAGE_KEYS.USERS)) {
            // Create admin account
            const admin = {
                id: 1,
                username: 'DevAlexPlay',
                email: 'admin@freedomnet.com',
                password: btoa('admin123'),
                avatar: null,
                role: 'admin',
                is_creator: true,
                is_official: true,
                created_at: Date.now()
            };
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([admin]));
            localStorage.setItem(STORAGE_KEYS.POSTS, JSON.stringify([]));
            localStorage.setItem(STORAGE_KEYS.FOLLOWS, JSON.stringify([]));
        }
        
        allUsers = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
        feed = JSON.parse(localStorage.getItem(STORAGE_KEYS.POSTS) || '[]');
        userFollows = JSON.parse(localStorage.getItem(STORAGE_KEYS.FOLLOWS) || '[]');
        
        // Sort feed by date
        feed.sort((a, b) => b.created_at - a.created_at);
    }
    
    function saveUsers() { localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(allUsers)); }
    function savePosts() { localStorage.setItem(STORAGE_KEYS.POSTS, JSON.stringify(feed)); }
    function saveFollows() { localStorage.setItem(STORAGE_KEYS.FOLLOWS, JSON.stringify(userFollows)); }
    
    // ============ HELPERS ============
    function getUserById(id) { return allUsers.find(u => u.id === id); }
    function getUserByUsername(username) { return allUsers.find(u => u.username.toLowerCase() === username.toLowerCase()); }
    function getUserByEmail(email) { return allUsers.find(u => u.email.toLowerCase() === email.toLowerCase()); }
    
    function isFollowing(followeeId) { return userFollows.some(f => f.follower_id === currentUser?.id && f.followee_id === followeeId); }
    
    function getFeedForUser(userId) {
        const followingIds = userFollows.filter(f => f.follower_id === userId).map(f => f.followee_id);
        followingIds.push(userId);
        return feed.filter(p => followingIds.includes(p.user_id));
    }
    
    function renderBadge(user) {
        if (user?.role === 'admin') return '<span class="admin-badge">⛔ ADMIN</span>';
        if (user?.role === 'moderator') return '<span class="moderator-badge">✅ MODERATOR</span>';
        if (user?.is_official) return '<span class="gold-badge">⭐ Official</span>';
        return '';
    }
    
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#f4212e' : '#1d9bf0';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function formatDate(timestamp) {
        const d = new Date(timestamp);
        return `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
    }
    
    // ============ AUTH ============
    function login(username, password) {
        const user = getUserByUsername(username) || getUserByEmail(username);
        if (!user || atob(user.password) !== password) {
            showToast('Invalid credentials', true);
            return false;
        }
        currentUser = { ...user, password: undefined };
        localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(currentUser));
        loadFollows();
        render();
        return true;
    }
    
    function register(username, email, password) {
        if (getUserByUsername(username)) { showToast('Username taken', true); return false; }
        if (getUserByEmail(email)) { showToast('Email taken', true); return false; }
        if (username.length < 3) { showToast('Username too short', true); return false; }
        if (password.length < 4) { showToast('Password too short', true); return false; }
        
        const newUser = {
            id: Date.now(),
            username,
            email,
            password: btoa(password),
            avatar: null,
            role: null,
            is_creator: false,
            is_official: false,
            created_at: Date.now()
        };
        allUsers.push(newUser);
        saveUsers();
        showToast('Registration successful! Please login.');
        return true;
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
        render();
    }
    
    function loadFollows() {
        userFollows = JSON.parse(localStorage.getItem(STORAGE_KEYS.FOLLOWS) || '[]');
    }
    
    // ============ POSTS ============
    function createPost(content, imageData = null) {
        if (!content.trim()) { showToast('Post cannot be empty', true); return false; }
        if (content.length > 500) { showToast('Post too long (max 500 chars)', true); return false; }
        
        const newPost = {
            id: Date.now(),
            user_id: currentUser.id,
            content: content.trim(),
            image: imageData,
            likes: [],
            comments: [],
            created_at: Date.now(),
            edited: false
        };
        feed.unshift(newPost);
        savePosts();
        render();
        return true;
    }
    
    function deletePost(postId) {
        const post = feed.find(p => p.id === postId);
        if (post && (post.user_id === currentUser.id || currentUser.role === 'admin')) {
            feed = feed.filter(p => p.id !== postId);
            savePosts();
            render();
        }
    }
    
    function toggleLike(postId) {
        const post = feed.find(p => p.id === postId);
        if (!post) return;
        if (post.likes.includes(currentUser.id)) {
            post.likes = post.likes.filter(id => id !== currentUser.id);
        } else {
            post.likes.push(currentUser.id);
        }
        savePosts();
        render();
    }
    
    function addComment(postId, content) {
        if (!content.trim()) return;
        const post = feed.find(p => p.id === postId);
        if (!post) return;
        if (!post.comments) post.comments = [];
        post.comments.push({
            id: Date.now(),
            user_id: currentUser.id,
            username: currentUser.username,
            avatar: currentUser.avatar,
            content: content.trim(),
            created_at: Date.now()
        });
        savePosts();
        render();
    }
    
    function deleteComment(postId, commentId) {
        const post = feed.find(p => p.id === postId);
        if (!post) return;
        const comment = post.comments?.find(c => c.id === commentId);
        if (comment && (comment.user_id === currentUser.id || post.user_id === currentUser.id || currentUser.role === 'admin')) {
            post.comments = post.comments.filter(c => c.id !== commentId);
            savePosts();
            render();
        }
    }
    
    // ============ FOLLOW ============
    function followUser(userId) {
        if (userId === currentUser.id) return;
        if (!isFollowing(userId)) {
            userFollows.push({ follower_id: currentUser.id, followee_id: userId, created_at: Date.now() });
            saveFollows();
            render();
        }
    }
    
    function unfollowUser(userId) {
        userFollows = userFollows.filter(f => !(f.follower_id === currentUser.id && f.followee_id === userId));
        saveFollows();
        render();
    }
    
    // ============ ADMIN COMMANDS ============
    function processCommand(content) {
        // MODERATOR command
        const modMatch = content.match(/^ModGivemyselfByPromo690217453671\s+@?(\w+)$/i);
        if (modMatch && (currentUser.role === 'admin' || currentUser.username === 'DevAlexPlay')) {
            const target = getUserByUsername(modMatch[1]);
            if (target) {
                target.role = 'moderator';
                saveUsers();
                showToast(`✅ ${target.username} is now MODERATOR!`);
                render();
                return true;
            }
            showToast('User not found', true);
            return true;
        }
        
        // ADMIN command
        const adminMatch = content.match(/^AdminGivemyselfByPromo904208751262982457432673\s+@?(\w+)$/i);
        if (adminMatch && (currentUser.role === 'admin' || currentUser.username === 'DevAlexPlay')) {
            const target = getUserByUsername(adminMatch[1]);
            if (target) {
                target.role = 'admin';
                saveUsers();
                showToast(`⛔ ${target.username} is now ADMIN!`);
                render();
                return true;
            }
            showToast('User not found', true);
            return true;
        }
        
        return false;
    }
    
    // ============ UI RENDERING ============
    function renderPostCard(post) {
        const user = getUserById(post.user_id);
        const isLiked = post.likes?.includes(currentUser?.id);
        const canDelete = post.user_id === currentUser?.id || currentUser?.role === 'admin';
        
        return `
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar" onclick="viewProfile('${user?.username}')" style="background: #1d9bf0; width: 48px; height: 48px; font-size: 18px;">${(user?.username?.[0] || 'U').toUpperCase()}</div>
                    <div style="flex:1">
                        <div>
                            <span class="post-username" onclick="viewProfile('${user?.username}')">${escapeHtml(user?.username)}</span>
                            ${renderBadge(user)}
                            <span class="post-handle">@${escapeHtml(user?.username)}</span>
                            <span class="post-time">${formatDate(post.created_at)}</span>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open('${post.image}')">` : ''}
                        <div class="post-stats">
                            <button class="stat-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">♥ ${post.likes?.length || 0}</button>
                            <button class="stat-btn" onclick="toggleComments(${post.id})">💬 ${post.comments?.length || 0}</button>
                            ${canDelete ? `<button class="stat-btn" onclick="deletePost(${post.id})">🗑 Delete</button>` : ''}
                        </div>
                        <div id="comments-${post.id}" style="display:none; margin-top:12px;">
                            ${(post.comments || []).map(c => `
                                <div style="padding:8px 0; border-top:1px solid var(--border); display:flex; justify-content:space-between;">
                                    <div>
                                        <strong onclick="viewProfile('${c.username}')">${escapeHtml(c.username)}</strong> ${escapeHtml(c.content)}
                                    </div>
                                    ${(c.user_id === currentUser?.id || post.user_id === currentUser?.id || currentUser?.role === 'admin') ? 
                                        `<button onclick="deleteComment(${post.id}, ${c.id})" style="background:none; border:none; color:red; cursor:pointer;">✕</button>` : ''}
                                </div>
                            `).join('')}
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <input type="text" id="comment-input-${post.id}" placeholder="Write a comment..." style="flex:1; background:transparent; border:1px solid var(--border); border-radius:20px; padding:8px 12px; color:white;">
                                <button onclick="addComment(${post.id}, document.getElementById('comment-input-${post.id}').value)" style="background:var(--accent); border:none; border-radius:20px; padding:8px 16px; color:white; cursor:pointer;">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderFeed() {
        const userFeed = getFeedForUser(currentUser.id);
        return `
            <div class="feed-container">
                <div class="create-post">
                    <div class="avatar" onclick="openAvatarUpload()" style="background: #1d9bf0;">${currentUser.username[0].toUpperCase()}</div>
                    <div class="post-input">
                        <textarea id="postContent" placeholder="What's happening?"></textarea>
                        <div id="imagePreview" style="margin-top:8px;"></div>
                        <div class="post-actions">
                            <label style="color:var(--accent); cursor:pointer;">📷 <input type="file" id="postImage" accept="image/*" style="display:none;"></label>
                            <button class="publish-btn" onclick="publishPost()">Post</button>
                        </div>
                    </div>
                </div>
                <div id="postsContainer">
                    ${userFeed.map(p => renderPostCard(p)).join('')}
                    ${userFeed.length === 0 ? '<div style="padding:40px; text-align:center; color:var(--text-secondary);">No posts yet. Follow someone or create your first post!</div>' : ''}
                </div>
            </div>
        `;
    }
    
    function renderProfile(profileUser) {
        const isOwn = profileUser.id === currentUser.id;
        const following = isFollowing(profileUser.id);
        const userPosts = feed.filter(p => p.user_id === profileUser.id);
        const followers = userFollows.filter(f => f.followee_id === profileUser.id).length;
        const followingCount = userFollows.filter(f => f.follower_id === profileUser.id).length;
        
        return `
            <div class="feed-container">
                <div style="text-align:center; padding:20px; border-bottom:1px solid var(--border);">
                    <div class="avatar" style="width:100px; height:100px; font-size:40px; margin:0 auto 16px; background:#1d9bf0;">${profileUser.username[0].toUpperCase()}</div>
                    <h2>${escapeHtml(profileUser.username)}</h2>
                    ${renderBadge(profileUser)}
                    <div style="display:flex; justify-content:center; gap:32px; margin:16px 0;">
                        <div><strong>${userPosts.length}</strong> posts</div>
                        <div><strong>${followers}</strong> followers</div>
                        <div><strong>${followingCount}</strong> following</div>
                    </div>
                    ${!isOwn ? (following ? 
                        `<button onclick="unfollowUser(${profileUser.id})" style="background:transparent; border:1px solid var(--border); color:white; padding:8px 24px; border-radius:9999px; cursor:pointer;">Unfollow</button>` :
                        `<button onclick="followUser(${profileUser.id})" style="background:var(--accent); border:none; color:white; padding:8px 24px; border-radius:9999px; cursor:pointer;">Follow</button>`) : ''}
                </div>
                ${userPosts.map(p => renderPostCard(p)).join('')}
            </div>
        `;
    }
    
    function renderMessages() {
        return `
            <div class="feed-container" style="padding:20px; text-align:center;">
                <div style="background:var(--hover); padding:40px; border-radius:20px;">
                    <h3>💬 Messages</h3>
                    <p style="color:var(--text-secondary); margin-top:8px;">Coming soon in the next update!</p>
                </div>
            </div>
        `;
    }
    
    function renderSearch() {
        return `
            <div class="feed-container" style="padding:20px;">
                <div style="display:flex; gap:12px; margin-bottom:20px;">
                    <input type="text" id="searchInput" placeholder="Search users..." style="flex:1; padding:12px 20px; background:transparent; border:1px solid var(--border); border-radius:9999px; color:white;">
                    <button onclick="searchUsers()" style="background:var(--accent); border:none; padding:12px 24px; border-radius:9999px; color:white; cursor:pointer;">Search</button>
                </div>
                <div id="searchResults"></div>
            </div>
        `;
    }
    
    function renderFeedback() {
        return `
            <div class="feed-container" style="padding:20px;">
                <div style="background:var(--hover); padding:20px; border-radius:20px; text-align:center;">
                    <h3>📝 Feedback & Commands</h3>
                    <p style="color:var(--text-secondary); margin:12px 0;">Send feedback or use admin commands:</p>
                    <textarea id="feedbackContent" rows="4" style="width:100%; background:#000; border:1px solid var(--border); border-radius:12px; padding:12px; color:white;"></textarea>
                    <button onclick="sendFeedback()" style="margin-top:12px; background:var(--accent); border:none; padding:10px 24px; border-radius:9999px; color:white; cursor:pointer;">Send</button>
                    ${currentUser?.role === 'admin' || currentUser?.username === 'DevAlexPlay' ? `
                        <div style="margin-top:20px; padding:12px; background:#1a1a1a; border-radius:12px;">
                            <p style="color:var(--moderator);">Mod command: <code>ModGivemyselfByPromo690217453671 @username</code></p>
                            <p style="color:var(--admin);">Admin command: <code>AdminGivemyselfByPromo904208751262982457432673 @username</code></p>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }
    
    function renderSettings() {
        return `
            <div class="feed-container" style="padding:20px;">
                <div style="background:var(--hover); padding:20px; border-radius:20px;">
                    <h3>⚙️ Settings</h3>
                    <div style="margin:16px 0;">
                        <p><strong>Username:</strong> @${escapeHtml(currentUser.username)}</p>
                        <p><strong>Email:</strong> ${escapeHtml(currentUser.email)}</p>
                        <p><strong>Role:</strong> ${currentUser.role || 'User'}</p>
                    </div>
                    <button onclick="logout()" style="background:#f4212e; border:none; padding:10px 24px; border-radius:9999px; color:white; cursor:pointer;">Logout</button>
                </div>
            </div>
        `;
    }
    
    // ============ MAIN RENDER ============
    function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            // Auth screen
            app.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#000;">
                    <div style="background:#000; border:1px solid #2f3336; border-radius:20px; padding:40px; width:400px; max-width:90%;">
                        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">FreedomNet</h2>
                        <div id="authForm">
                            <input type="text" id="loginInput" placeholder="Username or Email" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #2f3336; border-radius:8px; color:white;">
                            <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #2f3336; border-radius:8px; color:white;">
                            <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:9999px; color:white; font-weight:700; cursor:pointer;">Login</button>
                            <div style="text-align:center; margin:20px 0; color:var(--text-secondary);">or</div>
                            <button onclick="showRegister()" style="width:100%; padding:12px; background:#2f3336; border:none; border-radius:9999px; color:white; cursor:pointer;">Register</button>
                        </div>
                    </div>
                </div>
            `;
            return;
        }
        
        const tabs = [
            { id: 'feed', name: 'Feed', icon: '🏠' },
            { id: 'profile', name: 'Profile', icon: '👤' },
            { id: 'messages', name: 'Messages', icon: '💬' },
            { id: 'search', name: 'Search', icon: '🔍' },
            { id: 'feedback', name: 'Feedback', icon: '📝' },
            { id: 'settings', name: 'Settings', icon: '⚙️' }
        ];
        
        let content = '';
        if (currentTab === 'feed') content = renderFeed();
        else if (currentTab === 'profile') content = renderProfile(currentUser);
        else if (currentTab === 'messages') content = renderMessages();
        else if (currentTab === 'search') content = renderSearch();
        else if (currentTab === 'feedback') content = renderFeedback();
        else if (currentTab === 'settings') content = renderSettings();
        
        app.innerHTML = `
            <div style="display:flex;">
                <div class="sidebar">
                    <div class="logo" onclick="switchTab('feed')">FreedomNet</div>
                    ${tabs.map(tab => `
                        <div class="nav-item ${currentTab === tab.id ? 'active' : ''}" onclick="switchTab('${tab.id}')">
                            <span>${tab.icon}</span>
                            <span class="nav-text">${tab.name}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="bottom-nav">
                    ${tabs.map(tab => `
                        <div class="nav-item ${currentTab === tab.id ? 'active' : ''}" onclick="switchTab('${tab.id}')" style="flex-direction:column; gap:4px; padding:8px;">
                            <span>${tab.icon}</span>
                            <span style="font-size:12px;">${tab.name}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="main-content">
                    <div class="header">${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}</div>
                    ${content}
                </div>
            </div>
        `;
        
        // Attach image upload handler
        const imageInput = document.getElementById('postImage');
        if (imageInput) {
            imageInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingImage = ev.target.result;
                        document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;"><button onclick="pendingImage=null; document.getElementById('imagePreview').innerHTML='';">Remove</button>`;
                    };
                    reader.readAsDataURL(file);
                }
            };
        }
    }
    
    // ============ GLOBAL FUNCTIONS ============
    window.doLogin = () => {
        const login = document.getElementById('loginInput').value;
        const password = document.getElementById('loginPassword').value;
        login(login, password);
    };
    
    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `
            <input type="text" id="regUsername" placeholder="Username" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #2f3336; border-radius:8px; color:white;">
            <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #2f3336; border-radius:8px; color:white;">
            <input type="password" id="regPassword" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #2f3336; border-radius:8px; color:white;">
            <button onclick="doRegister()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:9999px; color:white; font-weight:700; cursor:pointer;">Register</button>
            <button onclick="render()" style="width:100%; margin-top:10px; padding:12px; background:#2f3336; border:none; border-radius:9999px; color:white; cursor:pointer;">Back</button>
        `;
    };
    
    window.doRegister = () => {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        if (register(username, email, password)) render();
    };
    
    window.switchTab = (tab) => {
        currentTab = tab;
        render();
    };
    
    window.publishPost = () => {
        const content = document.getElementById('postContent').value;
        createPost(content, pendingImage);
        document.getElementById('postContent').value = '';
        pendingImage = null;
        document.getElementById('imagePreview').innerHTML = '';
    };
    
    window.toggleLike = toggleLike;
    window.deletePost = deletePost;
    window.addComment = addComment;
    window.deleteComment = deleteComment;
    window.followUser = followUser;
    window.unfollowUser = unfollowUser;
    window.viewProfile = (username) => {
        const user = getUserByUsername(username);
        if (user) {
            currentTab = 'profile';
            renderProfile(user);
            render();
        }
    };
    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };
    window.openAvatarUpload = () => {
        showToast('Avatar upload coming soon!');
    };
    
    window.searchUsers = () => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const results = allUsers.filter(u => u.username.toLowerCase().includes(query) && u.id !== currentUser.id);
        document.getElementById('searchResults').innerHTML = results.map(u => `
            <div onclick="viewProfile('${u.username}')" style="padding:12px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:12px;">
                <div class="avatar" style="width:40px; height:40px; background:#1d9bf0;">${u.username[0].toUpperCase()}</div>
                <div><strong>${escapeHtml(u.username)}</strong>${renderBadge(u)}</div>
            </div>
        `).join('');
        if (results.length === 0) document.getElementById('searchResults').innerHTML = '<div style="padding:20px; text-align:center;">No users found</div>';
    };
    
    window.sendFeedback = async () => {
        const content = document.getElementById('feedbackContent').value;
        if (!content.trim()) { showToast('Enter feedback', true); return; }
        
        if (processCommand(content)) {
            document.getElementById('feedbackContent').value = '';
            return;
        }
        
        showToast('Feedback sent! Thank you.');
        document.getElementById('feedbackContent').value = '';
    };
    
    // ============ INIT ============
    loadData();
    
    const savedUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        loadFollows();
    }
    
    render();
</script>
</body>
</html>
