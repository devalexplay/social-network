<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreedomNet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; }
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #1d9bf0; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        /* остальные стили как в предыдущей версии */
    </style>
</head>
<body>
<div id="root"></div>
<script>
    // Language translations
    const translations = {
        en: {
            appName: 'FreedomNet',
            feed: 'Feed',
            profile: 'Profile',
            logout: 'Logout',
            whatsHappening: 'What\'s happening?',
            post: 'Post',
            login: 'Login',
            register: 'Register',
            username: 'Username',
            password: 'Password',
            or: 'or',
            back: 'Back',
            messages: 'Messages',
            main: 'Main',
            joined: 'Joined',
            publish: 'Publish',
            comment: 'Comment',
            likes: 'Likes',
            comments: 'Comments',
            loginSuccess: 'Login successful!',
            registerSuccess: 'Registration successful! Please login.',
            error: 'Error'
        },
        ru: {
            appName: 'FreedomNet',
            feed: 'Лента',
            profile: 'Профиль',
            logout: 'Выйти',
            whatsHappening: 'Что происходит?',
            post: 'Опубликовать',
            login: 'Войти',
            register: 'Зарегистрироваться',
            username: 'Имя пользователя',
            password: 'Пароль',
            or: 'или',
            back: 'Назад',
            messages: 'Сообщения',
            main: 'Главная',
            joined: 'Присоединился',
            publish: 'Опубликовать',
            comment: 'Комментарий',
            likes: 'Нравится',
            comments: 'Комментарии',
            loginSuccess: 'Вход выполнен!',
            registerSuccess: 'Регистрация успешна! Войдите.',
            error: 'Ошибка'
        }
    };
    
    let currentLang = localStorage.getItem('language') || 'en';
    
    function t(key) {
        return translations[currentLang][key] || key;
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        render(); // перерисовываем интерфейс
    }
    
    // Добавляем переключатель в интерфейс
    function renderLangSwitcher() {
        return `<div class="lang-switcher" onclick="setLanguage(currentLang === 'en' ? 'ru' : 'en')">${currentLang === 'en' ? '🇬🇧 EN' : '🇷🇺 RU'}</div>`;
    }
    
    // Обёртка для api
    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    
    let currentUser = null;
    let currentView = 'feed';
    let feed = [];
    let conversations = [];
    let currentChatUser = null;
    let pendingImage = null;
    
    async function render() {
        if (!currentUser) {
            await renderAuth();
            return;
        }
        await renderMain();
    }
    
    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `
            ${renderLangSwitcher()}
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="margin-bottom:20px;">${t('appName')}</h2>
                    <div id="authForm">
                        <input type="text" id="loginUsername" placeholder="${t('username')}">
                        <input type="password" id="loginPassword" placeholder="${t('password')}">
                        <button onclick="login()">${t('login')}</button>
                        <p style="margin:15px 0; text-align:center;">${t('or')}</p>
                        <button onclick="showRegister()">${t('register')}</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    window.login = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }), headers: { 'Content-Type': 'application/json' } });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed();
            render();
        } catch(e) { alert(t('error')); }
    };
    
    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `
            <input type="text" id="regUsername" placeholder="${t('username')}">
            <input type="password" id="regPassword" placeholder="${t('password')}">
            <button onclick="register()">${t('register')}</button>
            <button onclick="renderAuth()" style="background:#2f3336; margin-top:10px;">${t('back')}</button>
        `;
    };
    
    window.register = async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        try {
            await api('/api/register', { method: 'POST', body: JSON.stringify({ username, password }), headers: { 'Content-Type': 'application/json' } });
            alert(t('registerSuccess'));
            renderAuth();
        } catch(e) { alert(t('error')); }
    };
    
    async function loadFeed() {
        try { feed = await api('/api/feed'); } catch(e) { feed = []; }
    }
    
    async function loadConversations() {
        try { conversations = await api('/api/conversations'); } catch(e) { conversations = []; }
    }
    
    async function renderMain() {
        await loadFeed();
        await loadConversations();
        const root = document.getElementById('root');
        root.innerHTML = `
            ${renderLangSwitcher()}
            <div class="app">
                <div class="sidebar">
                    <div class="logo">${t('appName')}</div>
                    <div class="nav-item ${currentView === 'feed' ? 'active' : ''}" onclick="setView('feed')">
                        <span>🏠</span> <span class="nav-text">${t('feed')}</span>
                    </div>
                    <div class="nav-item ${currentView === 'profile' ? 'active' : ''}" onclick="setView('profile')">
                        <span>👤</span> <span class="nav-text">${t('profile')}</span>
                    </div>
                    <div class="nav-item" onclick="logout()">
                        <span>🚪</span> <span class="nav-text">${t('logout')}</span>
                    </div>
                </div>
                <div class="main-content">
                    <div class="header">${currentView === 'feed' ? t('main') : t('profile')}</div>
                    ${currentView === 'feed' ? renderFeed() : renderProfile()}
                </div>
                <div class="chat-toggle" onclick="toggleChat()">💬</div>
                <div class="chat-panel" id="chatPanel">
                    <div class="chat-header">
                        <span>${t('messages')}</span>
                        <span onclick="toggleChat()" style="cursor:pointer;">✕</span>
                    </div>
                    <div id="chatUsersList" style="padding:16px; overflow-y:auto;">
                        ${conversations.map(c => `
                            <div style="padding:12px; cursor:pointer; border-bottom:1px solid #2f3336;" onclick="openChat(${c.other_id})">
                                <strong>${escapeHtml(c.username)}</strong>
                                <div style="font-size:12px; color:#71767b;">${escapeHtml(c.last_message || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div id="chatMessagesArea" style="display:none; flex-direction:column; height:100%;">
                        <div class="chat-header" id="chatHeader"></div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="${t('message') || 'Message...'}">
                            <button onclick="sendChatMessage()" style="background:#1d9bf0; border:none; border-radius:9999px; padding:8px 16px;">→</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        if (currentView === 'feed') attachFeedEvents();
    }
    
    function renderFeed() {
        return `
            <div class="feed-container">
                <div class="create-post">
                    <div class="avatar"></div>
                    <div class="post-input-area">
                        <textarea id="postContent" placeholder="${t('whatsHappening')}"></textarea>
                        <div id="imagePreview" style="margin-top:8px;"></div>
                        <div class="post-actions-bar">
                            <label class="image-upload">🖼️ <input type="file" id="postImage" accept="image/*" style="display:none;"></label>
                            <button class="publish-btn" onclick="publishPost()">${t('publish')}</button>
                        </div>
                    </div>
                </div>
                ${feed.map(post => `
                    <div class="post" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${(post.username || 'U')[0].toUpperCase()}</div>
                            <div class="post-body">
                                <div class="post-user">
                                    ${escapeHtml(post.username)}
                                    <span class="post-username">@${escapeHtml(post.username)}</span>
                                    <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div class="post-content">${escapeHtml(post.content || '')}</div>
                                ${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open('${post.image}')">` : ''}
                                <div class="post-stats">
                                    <button class="stat-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                        ❤️ ${post.likes_count || 0}
                                    </button>
                                    <button class="stat-btn" onclick="toggleComments(${post.id})">
                                        💬 ${post.comments?.length || 0}
                                    </button>
                                </div>
                                <div id="comments-${post.id}" style="display:none;" class="comments-section">
                                    ${(post.comments || []).map(c => `<div class="comment"><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.content)}</div>`).join('')}
                                    <div class="comment-input">
                                        <input type="text" id="commentInput-${post.id}" placeholder="${t('comment')}...">
                                        <button onclick="addComment(${post.id})">→</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function renderProfile() {
        return `<div style="max-width:600px; margin:0 auto; padding:20px; text-align:center;">
            <div class="avatar" style="margin:0 auto 20px;"></div>
            <h2>${escapeHtml(currentUser?.username)}</h2>
            <p style="color:#71767b;">${t('joined')}: ${new Date().toLocaleDateString()}</p>
        </div>`;
    }
    
    function attachFeedEvents() {
        document.getElementById('postImage')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImage = ev.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`;
                };
                reader.readAsDataURL(file);
            }
        });
    }
    
    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value || '';
        const formData = new FormData();
        formData.append('content', content);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        document.getElementById('postContent').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        await loadFeed();
        render();
    };
    
    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) {
            await api(`/api/like/${postId}`, { method: 'DELETE' });
        } else {
            await api(`/api/like/${postId}`, { method: 'POST' });
        }
        await loadFeed();
        render();
    };
    
    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };
    
    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed();
        render();
    };
    
    window.setView = (view) => {
        currentView = view;
        render();
    };
    
    window.toggleChat = () => {
        const panel = document.getElementById('chatPanel');
        panel.classList.toggle('open');
    };
    
    window.openChat = async (userId) => {
        currentChatUser = userId;
        const messages = await api(`/api/messages/${userId}`);
        document.getElementById('chatUsersList').style.display = 'none';
        document.getElementById('chatMessagesArea').style.display = 'flex';
        document.getElementById('chatHeader').innerHTML = `<span>${t('messages')}</span><span onclick="closeChat()" style="cursor:pointer;">✕</span>`;
        const container = document.getElementById('chatMessages');
        container.innerHTML = messages.map(m => `
            <div class="message ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">
                ${escapeHtml(m.content)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    };
    
    window.closeChat = () => {
        currentChatUser = null;
        document.getElementById('chatUsersList').style.display = 'block';
        document.getElementById('chatMessagesArea').style.display = 'none';
    };
    
    window.sendChatMessage = async () => {
        const input = document.getElementById('chatInput');
        const content = input?.value.trim();
        if (!content || !currentChatUser) return;
        await api(`/api/messages/${currentChatUser}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        input.value = '';
        await openChat(currentChatUser);
    };
    
    window.logout = async () => {
        await api('/api/logout', { method: 'POST' });
        currentUser = null;
        render();
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    // Init
    (async () => {
        const me = await api('/api/me');
        if (me.user) {
            currentUser = me.user;
            await loadFeed();
        }
        render();
    })();
</script>
</body>
</html>
