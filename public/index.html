<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FreedomNet — социальная сеть</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #e7e9ea;
            height: 100vh;
            overflow: hidden;
        }

        /* App layout */
        .app {
            display: flex;
            height: 100vh;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
        }

        /* Sidebar (X style) */
        .sidebar {
            width: 275px;
            padding: 20px 12px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid #2f3336;
            background: #000000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            padding: 12px;
            background: linear-gradient(135deg, #1d9bf0, #1d9bf0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            margin: 4px 0;
            border-radius: 9999px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
            font-weight: 400;
            width: fit-content;
        }

        .nav-item:hover {
            background: #181818;
        }

        .nav-item.active {
            font-weight: 700;
        }

        .nav-text {
            font-size: 20px;
        }

        /* Main content */
        .main-content {
            margin-left: 275px;
            flex: 1;
            overflow-y: auto;
            height: 100vh;
            border-right: 1px solid #2f3336;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-bottom: 1px solid #2f3336;
            font-size: 20px;
            font-weight: 800;
            z-index: 10;
        }

        /* Feed */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Create post */
        .create-post {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d9bf0, #1d9bf0);
            flex-shrink: 0;
        }

        .post-input-area {
            flex: 1;
        }

        .post-input-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e7e9ea;
            font-size: 18px;
            resize: vertical;
            font-family: inherit;
            outline: none;
            min-height: 60px;
        }

        .post-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .image-upload {
            color: #1d9bf0;
            cursor: pointer;
            font-size: 20px;
        }

        .publish-btn {
            background: #1d9bf0;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .publish-btn:hover {
            background: #1a8cd8;
        }

        /* Post card */
        .post {
            border-bottom: 1px solid #2f3336;
            padding: 12px 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .post:hover {
            background: #080808;
        }

        .post-header {
            display: flex;
            gap: 12px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .post-body {
            flex: 1;
        }

        .post-user {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .post-username {
            color: #71767b;
            font-weight: 400;
            margin-left: 6px;
        }

        .post-time {
            color: #71767b;
            font-size: 13px;
            margin-left: 6px;
        }

        .post-content {
            font-size: 15px;
            margin: 8px 0;
            line-height: 1.4;
        }

        .post-image {
            margin-top: 12px;
            border-radius: 16px;
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid #2f3336;
        }

        .post-stats {
            display: flex;
            gap: 32px;
            margin-top: 12px;
        }

        .stat-btn {
            background: none;
            border: none;
            color: #71767b;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            padding: 6px;
            border-radius: 9999px;
        }

        .stat-btn:hover {
            background: #181818;
        }

        .stat-btn.liked {
            color: #f91880;
        }

        /* Comments */
        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2f3336;
        }

        .comment {
            font-size: 14px;
            margin: 8px 0;
            color: #e7e9ea;
        }

        .comment strong {
            color: #1d9bf0;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 10px 16px;
            color: #e7e9ea;
            outline: none;
        }

        /* Chat panel */
        .chat-panel {
            width: 350px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            background: #000000;
            border-left: 1px solid #2f3336;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: 0.3s;
            z-index: 20;
        }

        .chat-panel.open {
            transform: translateX(0);
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-input {
            padding: 16px;
            border-top: 1px solid #2f3336;
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 10px;
            color: #e7e9ea;
        }

        .message {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 16px;
            max-width: 80%;
        }

        .message.outgoing {
            background: #1d9bf0;
            margin-left: auto;
        }

        .message.incoming {
            background: #2f3336;
        }

        /* Auth overlay */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #e7e9ea;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
        }

        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1d9bf0;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            font-size: 24px;
        }

        @media (max-width: 1000px) {
            .sidebar { width: 88px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 88px; }
            .chat-panel { width: 100%; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // API helper
    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    let currentUser = null;
    let currentView = 'feed';
    let feed = [];
    let conversations = [];
    let currentChatUser = null;
    let pendingImage = null;

    // Render
    async function render() {
        if (!currentUser) {
            await renderAuth();
            return;
        }
        await renderMain();
    }

    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="margin-bottom:20px;">FreedomNet</h2>
                    <div id="authForm">
                        <input type="text" id="loginUsername" placeholder="Имя пользователя">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button onclick="login()">Войти</button>
                        <p style="margin:15px 0; text-align:center;">или</p>
                        <button onclick="showRegister()">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
    }

    window.login = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }), headers: { 'Content-Type': 'application/json' } });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed();
            render();
        } catch(e) { alert('Ошибка входа'); }
    };

    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <button onclick="renderAuth()" style="background:#2f3336; margin-top:10px;">Назад</button>
        `;
    };

    window.register = async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        try {
            await api('/api/register', { method: 'POST', body: JSON.stringify({ username, password }), headers: { 'Content-Type': 'application/json' } });
            alert('Регистрация успешна! Теперь войдите.');
            renderAuth();
        } catch(e) { alert('Ошибка'); }
    };

    async function loadFeed() {
        try {
            feed = await api('/api/feed');
        } catch(e) { feed = []; }
    }

    async function loadConversations() {
        try {
            conversations = await api('/api/conversations');
        } catch(e) { conversations = []; }
    }

    async function renderMain() {
        await loadFeed();
        await loadConversations();
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">FreedomNet</div>
                    <div class="nav-item ${currentView === 'feed' ? 'active' : ''}" onclick="setView('feed')">
                        <span>🏠</span> <span class="nav-text">Лента</span>
                    </div>
                    <div class="nav-item ${currentView === 'profile' ? 'active' : ''}" onclick="setView('profile')">
                        <span>👤</span> <span class="nav-text">Профиль</span>
                    </div>
                    <div class="nav-item" onclick="logout()">
                        <span>🚪</span> <span class="nav-text">Выйти</span>
                    </div>
                </div>
                <div class="main-content">
                    <div class="header">${currentView === 'feed' ? 'Главная' : 'Профиль'}</div>
                    ${currentView === 'feed' ? renderFeed() : renderProfile()}
                </div>
                <div class="chat-toggle" onclick="toggleChat()">💬</div>
                <div class="chat-panel" id="chatPanel">
                    <div class="chat-header">
                        <span>Сообщения</span>
                        <span onclick="toggleChat()" style="cursor:pointer;">✕</span>
                    </div>
                    <div id="chatUsersList" style="padding:16px; overflow-y:auto;">
                        ${conversations.map(c => `
                            <div style="padding:12px; cursor:pointer; border-bottom:1px solid #2f3336;" onclick="openChat(${c.other_id})">
                                <strong>${escapeHtml(c.username)}</strong>
                                <div style="font-size:12px; color:#71767b;">${escapeHtml(c.last_message || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div id="chatMessagesArea" style="display:none; flex-direction:column; height:100%;">
                        <div class="chat-header" id="chatHeader"></div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="Сообщение...">
                            <button onclick="sendChatMessage()" style="background:#1d9bf0; border:none; border-radius:9999px; padding:8px 16px;">→</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        if (currentView === 'feed') attachFeedEvents();
    }

    function renderFeed() {
        return `
            <div class="feed-container">
                <div class="create-post">
                    <div class="avatar"></div>
                    <div class="post-input-area">
                        <textarea id="postContent" placeholder="Что происходит?"></textarea>
                        <div id="imagePreview" style="margin-top:8px;"></div>
                        <div class="post-actions-bar">
                            <label class="image-upload">🖼️ <input type="file" id="postImage" accept="image/*" style="display:none;"></label>
                            <button class="publish-btn" onclick="publishPost()">Опубликовать</button>
                        </div>
                    </div>
                </div>
                ${feed.map(post => `
                    <div class="post" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${(post.username || 'U')[0].toUpperCase()}</div>
                            <div class="post-body">
                                <div class="post-user">
                                    ${escapeHtml(post.username)}
                                    <span class="post-username">@${escapeHtml(post.username)}</span>
                                    <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div class="post-content">${escapeHtml(post.content || '')}</div>
                                ${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open('${post.image}')">` : ''}
                                <div class="post-stats">
                                    <button class="stat-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                        ❤️ ${post.likes_count || 0}
                                    </button>
                                    <button class="stat-btn" onclick="toggleComments(${post.id})">
                                        💬 ${post.comments?.length || 0}
                                    </button>
                                </div>
                                <div id="comments-${post.id}" style="display:none;" class="comments-section">
                                    ${(post.comments || []).map(c => `<div class="comment"><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.content)}</div>`).join('')}
                                    <div class="comment-input">
                                        <input type="text" id="commentInput-${post.id}" placeholder="Написать комментарий...">
                                        <button onclick="addComment(${post.id})">→</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderProfile() {
        return `<div style="max-width:600px; margin:0 auto; padding:20px; text-align:center;">
            <div class="avatar" style="margin:0 auto 20px;"></div>
            <h2>${escapeHtml(currentUser?.username)}</h2>
            <p style="color:#71767b;">Присоединился: ${new Date().toLocaleDateString()}</p>
        </div>`;
    }

    function attachFeedEvents() {
        document.getElementById('postImage')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImage = ev.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`;
                };
                reader.readAsDataURL(file);
            }
        });
    }

    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value || '';
        const formData = new FormData();
        formData.append('content', content);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        document.getElementById('postContent').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        await loadFeed();
        render();
    };

    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) {
            await api(`/api/like/${postId}`, { method: 'DELETE' });
        } else {
            await api(`/api/like/${postId}`, { method: 'POST' });
        }
        await loadFeed();
        render();
    };

    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed();
        render();
    };

    window.setView = (view) => {
        currentView = view;
        render();
    };

    window.toggleChat = () => {
        const panel = document.getElementById('chatPanel');
        panel.classList.toggle('open');
    };

    window.openChat = async (userId) => {
        currentChatUser = userId;
        const messages = await api(`/api/messages/${userId}`);
        document.getElementById('chatUsersList').style.display = 'none';
        document.getElementById('chatMessagesArea').style.display = 'flex';
        document.getElementById('chatHeader').innerHTML = `<span>Чат</span><span onclick="closeChat()" style="cursor:pointer;">✕</span>`;
        const container = document.getElementById('chatMessages');
        container.innerHTML = messages.map(m => `
            <div class="message ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">
                ${escapeHtml(m.content)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    };

    window.closeChat = () => {
        currentChatUser = null;
        document.getElementById('chatUsersList').style.display = 'block';
        document.getElementById('chatMessagesArea').style.display = 'none';
    };

    window.sendChatMessage = async () => {
        const input = document.getElementById('chatInput');
        const content = input?.value.trim();
        if (!content || !currentChatUser) return;
        await api(`/api/messages/${currentChatUser}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        input.value = '';
        await openChat(currentChatUser);
    };

    window.logout = async () => {
        await api('/api/logout', { method: 'POST' });
        currentUser = null;
        render();
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    // Init
    (async () => {
        const me = await api('/api/me');
        if (me.user) {
            currentUser = me.user;
            await loadFeed();
        }
        render();
    })();
</script>
</body>
</html>
