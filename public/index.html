<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
            --gold: #ffd700;
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: background 0.2s ease, color 0.2s ease; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loading-content { text-align: center; }
        .loading-logo { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border-color); background: var(--bg-primary); overflow-y: auto; transition: background 0.2s ease, border-color 0.2s ease; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; padding: 12px; color: var(--accent); letter-spacing: -1px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; font-size: 20px; font-weight: 400; width: fit-content; color: var(--text-secondary); background: transparent; transition: color 0.2s ease; }
        .nav-item:hover { color: var(--text-primary); background: transparent; }
        .nav-item.active { font-weight: 700; color: var(--accent); }
        .nav-item.logout:hover { color: #f4212e; }
        .nav-text { font-size: 20px; }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 12px 20px; z-index: 100; justify-content: space-around; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; cursor: pointer; color: var(--text-secondary); transition: color 0.2s ease; font-size: 12px; font-weight: 500; border-radius: 12px; }
        .bottom-nav-item.active { color: var(--accent); background: rgba(29, 155, 240, 0.1); }
        .bottom-nav-item span { font-size: 13px; font-weight: 500; }
        
        .main-content { margin-left: 275px; flex: 1; min-height: 100vh; border-right: 1px solid var(--border-color); transition: border-color 0.2s ease; padding-bottom: 0; }
        .header { position: sticky; top: 0; background: var(--bg-primary); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 800; z-index: 10; color: var(--text-primary); transition: background 0.2s ease, color 0.2s ease; }
        
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin: 16px 0; }
        .stat-item { text-align: center; cursor: pointer; transition: opacity 0.2s ease; }
        .stat-item:hover { opacity: 0.7; }
        .stat-number { font-weight: 700; font-size: 18px; }
        .stat-label { color: var(--text-secondary); font-size: 13px; }
        
        .user-list { max-height: 300px; overflow-y: auto; margin: 16px 0; }
        .user-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 12px; transition: background 0.2s ease; }
        .user-list-item:hover { background: var(--hover-bg); }
        .user-list-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .feed-container { max-width: 600px; margin: 0 auto; }
        .create-post { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-img:hover { opacity: 0.8; }
        .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; cursor: pointer; transition: opacity 0.2s ease; }
        .avatar-placeholder:hover { opacity: 0.8; }
        .post-input-area { flex: 1; }
        .post-input-area textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 18px; resize: vertical; font-family: inherit; outline: none; min-height: 60px; }
        .post-actions-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .image-upload { color: var(--accent); cursor: pointer; font-size: 20px; padding: 8px; border-radius: 50%; transition: opacity 0.2s ease; }
        .image-upload:hover { opacity: 0.8; background: transparent; }
        .publish-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .publish-btn:hover { opacity: 0.9; }
        
        .post-card { border-bottom: 1px solid var(--border-color); padding: 12px 16px; transition: background 0.2s ease; cursor: pointer; position: relative; }
        .post-card:hover { background: var(--hover-bg); }
        .post-header { display: flex; gap: 12px; }
        .post-avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: opacity 0.2s ease; }
        .post-avatar-img:hover { opacity: 0.8; }
        .post-body { flex: 1; }
        .post-user { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .post-username { color: var(--text-secondary); font-weight: 400; font-size: 14px; cursor: pointer; transition: color 0.2s ease; }
        .post-username:hover { color: var(--accent); text-decoration: underline; }
        .post-time { color: var(--text-secondary); font-size: 13px; }
        .edited-badge { font-size: 11px; color: var(--text-secondary); font-style: italic; margin-left: 6px; }
        .post-content { font-size: 15px; margin: 8px 0; line-height: 1.4; }
        .mention { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .mention:hover { opacity: 0.8; }
        .hashtag { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .hashtag:hover { opacity: 0.8; }
        .post-image-container { position: relative; display: inline-block; margin-top: 12px; }
        .post-image { border-radius: 16px; max-width: 100%; max-height: 400px; object-fit: cover; border: 1px solid var(--border-color); transition: transform 0.2s ease; }
        .post-image:hover { transform: scale(1.01); }
        .remove-image-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: white; border: none; border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: opacity 0.2s ease; opacity: 0; }
        .post-image-container:hover .remove-image-btn { opacity: 1; }
        .remove-image-btn:hover { background: #f4212e; }
        .post-stats { display: flex; gap: 32px; margin-top: 12px; align-items: center; }
        .stat-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; transition: color 0.2s ease; }
        .stat-btn:hover { color: var(--text-primary); background: transparent; }
        .stat-btn.liked { color: #f91880; }
        .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 6px 12px; border-radius: 9999px; margin-left: auto; transition: color 0.2s ease; }
        .delete-btn:hover { color: #f4212e; background: transparent; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .comment { font-size: 14px; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .comment strong { color: var(--accent); cursor: pointer; transition: opacity 0.2s ease; }
        .comment strong:hover { opacity: 0.8; }
        .comment-input { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input input { flex: 1; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; padding: 10px 16px; color: var(--text-primary); outline: none; transition: border-color 0.2s ease; }
        .comment-input input:focus { border-color: var(--accent); }
        .profile-container { max-width: 600px; margin: 0 auto; }
        .profile-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; cursor: pointer; transition: opacity 0.2s ease; }
        .profile-avatar:hover { opacity: 0.8; }
        .follow-btn { background: var(--accent); color: white; border: none; padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.2s ease; }
        .follow-btn:hover { opacity: 0.9; }
        .unfollow-btn { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 24px; border-radius: 9999px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: background 0.2s ease; }
        .unfollow-btn:hover { background: var(--hover-bg); }
        .search-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .search-input { width: 100%; padding: 12px 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 9999px; color: var(--text-primary); font-size: 16px; outline: none; transition: border-color 0.2s ease; }
        .search-input:focus { border-color: var(--accent); }
        .search-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; }
        .search-result:hover { background: var(--hover-bg); }
        .search-result-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .search-post-result { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s ease; }
        .search-post-result:hover { background: var(--hover-bg); }
        .recommendation-card { background: transparent; border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease; }
        .recommendation-card:hover { background: var(--hover-bg); }
        .recommendation-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .notification { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; transition: background 0.2s ease; }
        .notification:hover { background: var(--hover-bg); }
        .notification-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        
        .messages-container { display: flex; height: calc(100vh - 70px); background: var(--bg-primary); }
        .conversations-sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .conversations-header { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .conversations-search { width: 100%; padding: 10px 16px; background: var(--hover-bg); border: none; border-radius: 30px; color: var(--text-primary); font-size: 14px; outline: none; }
        .conversations-list { flex: 1; overflow-y: auto; }
        .conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s ease; border-bottom: 1px solid var(--border-color); }
        .conversation-item:hover { background: var(--hover-bg); }
        .conversation-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .conversation-info { flex: 1; min-width: 0; }
        .conversation-name { font-weight: 600; font-size: 15px; }
        .conversation-last-message { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conversation-unread { background: var(--accent); color: white; border-radius: 50%; min-width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; padding: 0 5px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-primary); }
        .chat-back-mobile { display: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .chat-user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-user-name { font-weight: 600; font-size: 16px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message-group { display: flex; flex-direction: column; margin-bottom: 8px; }
        .message-row { display: flex; align-items: flex-end; gap: 8px; }
        .message-row.outgoing { justify-content: flex-end; }
        .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .message-bubble.outgoing { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message-bubble.incoming { background: var(--border-color); border-bottom-left-radius: 4px; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 8px; cursor: pointer; }
        .message-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; margin-left: 8px; }
        .message-reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 16px; transition: background 0.2s ease; }
        .reaction-btn:hover { background: var(--hover-bg); }
        .reaction-badge { background: var(--bg-secondary); border-radius: 16px; padding: 2px 6px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
        .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; background: var(--bg-primary); }
        .chat-input { flex: 1; background: var(--hover-bg); border: none; border-radius: 25px; padding: 10px 16px; color: var(--text-primary); outline: none; font-size: 14px; }
        .chat-image-label { cursor: pointer; font-size: 22px; color: var(--accent); transition: opacity 0.2s ease; }
        .chat-send-btn { background: var(--accent); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.2s ease; color: white; font-size: 18px; }
        .empty-chat { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 20px; }
        
        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .custom-modal-content { background: #000000; border-radius: 28px; padding: 28px; width: 400px; text-align: center; border: 1px solid #2f3336; max-height: 80vh; overflow-y: auto; }
        .custom-modal-content p { margin-bottom: 20px; font-size: 18px; font-weight: 500; color: var(--text-primary); }
        .custom-modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 12px; color: white; outline: none; }
        .custom-modal-content input:focus { border-color: var(--accent); }
        .custom-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .custom-modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s ease; }
        .custom-modal-btn-yes { background: #f4212e; color: white; }
        .custom-modal-btn-cancel { background: #2f3336; color: white; }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        .error-message { color: #f4212e; font-size: 13px; margin-top: 8px; text-align: center; }
        .success-message { color: #1d9bf0; font-size: 13px; margin-top: 8px; text-align: center; }
        
        .auth-card { background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 40px; width: 400px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 8px; color: #ffffff; outline: none; transition: border-color 0.2s ease; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .auth-card button:hover { opacity: 0.9; }
        .guest-btn { background: #2f3336; margin-top: 12px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; border-right: none; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .auth-card { width: 90%; padding: 24px; }
        }
    </style>
</head>
<body>
<div id="loading" class="loading-screen" style="display:flex;">
    <div class="loading-content">
        <div class="loading-logo">FreedomNet</div>
    </div>
</div>
<div id="root" style="display:none;"></div>

<script>
    let currentUser = null;
    let currentTab = 'feed';
    let feed = [];
    let conversationsList = [];
    let allUsers = [];
    let userFollows = [];
    let followersList = [];
    let followingList = [];
    let currentProfileUser = null;
    let currentChatUser = null;
    let currentChatMessages = [];
    let messageReactions = {};
    let feedOffset = 0;
    let feedHasMore = true;
    let feedLoading = false;
    let pendingImage = null;
    let searchResults = [];
    let searchPosts = [];
    let unreadCount = 0;
    let currentLang = 'en';
    
    function hideLoadingScreen() {
        const loading = document.getElementById('loading');
        const root = document.getElementById('root');
        if (loading) {
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
                if (root) root.style.display = 'block';
            }, 500);
        }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hideLoadingScreen);
    else hideLoadingScreen();

    const translations = { en: { feed: 'Feed', profile: 'Profile', messages: 'Messages', search: 'Search', interesting: 'Interesting', notifications: 'Notifications', create: 'Create', feedback: 'Feedback', more: 'More', logout: 'Logout', settings: 'Settings', followers: 'Followers', following: 'Following', posts: 'Posts', noPosts: 'No posts yet', whatsHappening: "What's happening?", publish: 'Post', delete: 'Delete', reply: 'Reply', follow: 'Follow', unfollow: 'Unfollow', joined: 'Joined', verified: 'Verified', official: 'Official', viewProfile: 'View Profile', edited: 'edited', enterUsername: 'Enter username', continueAsGuest: 'Continue without account' } };
    function t(key) { return translations[currentLang]?.[key] || translations.en[key] || key; }

    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    function parseMentionsAndHashtags(text) { if (!text) return ''; let html = escapeHtml(text); html = html.replace(/@(\w+)/g, '<span class="mention">@$1</span>'); html = html.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>'); return html; }
    function renderCreatorBadge(isCreator, isOfficial) { if (isOfficial) return '<span class="gold-badge" style="background:#ffd700; color:#000; border-radius:20px; padding:2px 8px; font-size:11px;">⭐ Official</span>'; if (isCreator) return '<span class="verified-badge" style="background:var(--accent); border-radius:20px; padding:2px 8px; font-size:11px;">✓ Verified</span>'; return ''; }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
    function updateTitleWithUnread() { document.title = unreadCount > 0 ? `(${unreadCount}) FreedomNet` : 'FreedomNet'; }

    async function loadFeed(reset = false) {
        if (reset) { feedOffset = 0; feedHasMore = true; feed = []; }
        if (!feedHasMore || feedLoading) return;
        feedLoading = true;
        try {
            const res = await api(`/api/feed?offset=${feedOffset}&limit=15`);
            if (reset) feed = res.posts; else feed = [...feed, ...res.posts];
            feedHasMore = res.hasMore;
            feedOffset += 15;
            unreadCount = Math.min(feed.filter(p => !p.read).length, 99);
            updateTitleWithUnread();
        } catch(e) { console.error(e); }
        feedLoading = false;
    }
    async function loadAllUsers() { try { allUsers = await api('/api/users'); } catch(e) { allUsers = []; } }
    async function loadFollows() { try { userFollows = await api('/api/follows'); } catch(e) { userFollows = []; } }
    async function loadConversationsList() { try { conversationsList = await api('/api/chat-users'); } catch(e) { conversationsList = []; } }
    async function loadFollowersAndFollowing(userId) { try { followersList = await api(`/api/followers/${userId}`); followingList = await api(`/api/following/${userId}`); } catch(e) { followersList = []; followingList = []; } }
    function isFollowing(userId) { return userFollows.some(f => f.followee_id === userId); }
    async function followUser(userId) { await api(`/api/follow/${userId}`, { method: 'POST' }); await loadFollows(); if (currentProfileUser && currentProfileUser.id === userId) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function unfollowUser(userId) { await api(`/api/follow/${userId}`, { method: 'DELETE' }); await loadFollows(); if (currentProfileUser && currentProfileUser.id === userId) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function deletePost(postId) { if (confirm('Delete this post?')) { await api(`/api/posts/${postId}`, { method: 'DELETE' }); await loadFeed(true); renderMain(); } }
    async function toggleLike(postId) { const post = feed.find(p => p.id === postId); if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' }); else await api(`/api/like/${postId}`, { method: 'POST' }); await loadFeed(true); renderMain(); }
    async function addComment(postId) { const input = document.getElementById(`commentInput-${postId}`); const content = input?.value.trim(); if (!content) return; await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } }); await loadFeed(true); renderMain(); }
    async function loadProfileUser(username) { try { currentProfileUser = await api(`/api/user/${username}`); await loadFollowersAndFollowing(currentProfileUser.id); await loadFeed(true); renderMain(); } catch(e) { currentProfileUser = null; } }
    window.viewProfile = (username) => { if (username === currentUser.username) { currentTab = 'profile'; currentProfileUser = null; loadFollowersAndFollowing(currentUser.id).then(() => renderMain()); } else { loadProfileUser(username); currentTab = 'profile'; renderMain(); } };
    function showLogoutConfirm() { if (confirm('Logout?')) { api('/api/logout', { method: 'POST' }).then(() => { currentUser = null; render(); }); } }

    function renderPostCard(post) {
        const isOwnPost = post.user_id === currentUser.id;
        return `<div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
                ${post.avatar ? `<img class="post-avatar-img" src="${post.avatar}" onerror="this.style.display='none';">` : `<div class="avatar-placeholder" style="width:48px; height:48px;">${(post.username || 'U')[0].toUpperCase()}</div>`}
                <div class="post-body">
                    <div class="post-user">
                        <span class="post-username" onclick="viewProfile('${post.username}')">${escapeHtml(post.username)}</span>${renderCreatorBadge(post.is_creator, post.is_official)}
                        <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                        ${post.edited ? `<span class="edited-badge">(${t('edited')})</span>` : ''}
                    </div>
                    <div class="post-content">${parseMentionsAndHashtags(post.content || '')}</div>
                    ${post.image ? `<div class="post-image-container"><img src="${post.image}" class="post-image" onclick="window.open('${post.image}')"></div>` : ''}
                    <div class="post-stats">
                        <button class="stat-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">♥ ${post.likes_count || 0}</button>
                        <button class="stat-btn" onclick="document.getElementById('comments-${post.id}').style.display = document.getElementById('comments-${post.id}').style.display === 'none' ? 'block' : 'none'">💬 ${post.comments?.length || 0}</button>
                        ${isOwnPost ? `<button class="delete-btn" onclick="deletePost(${post.id})">🗑 ${t('delete')}</button>` : ''}
                    </div>
                    <div id="comments-${post.id}" style="display:none;" class="comments-section">
                        ${(post.comments || []).map(c => `<div class="comment"><div><strong onclick="viewProfile('${c.username}')">${escapeHtml(c.username)}</strong> ${parseMentionsAndHashtags(c.content)}</div></div>`).join('')}
                        <div class="comment-input"><input type="text" id="commentInput-${post.id}" placeholder="${t('reply')}..."><button onclick="addComment(${post.id})">→</button></div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    async function renderMain() {
        await loadFeed(); await loadConversationsList(); await loadAllUsers(); await loadFollows();
        const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.className = savedTheme;
        const root = document.getElementById('root');
        if (currentTab === 'profile') {
            const user = currentProfileUser || currentUser;
            const isOwnProfile = !currentProfileUser;
            const userPosts = feed.filter(p => p.user_id === user.id);
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">FreedomNet</div>${['feed','profile','messages','search','interesting','notifications','create','feedback','more'].map(tab => `<div class="nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; currentProfileUser=null; currentChatUser=null; renderMain()"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${['feed','profile','messages','search','interesting'].map(tab => `<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; renderMain()"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div><div class="profile-container"><div class="profile-header"><div class="avatar-placeholder" style="width:120px;height:120px;font-size:48px;margin:0 auto 16px;">${(user.username||'U')[0].toUpperCase()}</div><h2>${escapeHtml(user.username)}</h2><div class="profile-stats"><div class="stat-item" onclick="showUserListModal('${t('followers')}', followersList)"><div class="stat-number">${followersList.length}</div><div class="stat-label">${t('followers')}</div></div><div class="stat-item" onclick="showUserListModal('${t('following')}', followingList)"><div class="stat-number">${followingList.length}</div><div class="stat-label">${t('following')}</div></div><div class="stat-item"><div class="stat-number">${userPosts.length}</div><div class="stat-label">${t('posts')}</div></div></div><p>${t('joined')} ${new Date(user.created_at).toLocaleDateString()}</p>${!isOwnProfile ? (isFollowing(user.id) ? `<button class="unfollow-btn" onclick="unfollowUser(${user.id})">${t('unfollow')}</button>` : `<button class="follow-btn" onclick="followUser(${user.id})">${t('follow')}</button>`) : ''}</div><div>${userPosts.map(p => renderPostCard(p)).join('') || '<div style="padding:40px;text-align:center;">'+t('noPosts')+'</div>'}</div></div></div></div>`;
        } else {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">FreedomNet</div>${['feed','profile','messages','search','interesting','notifications','create','feedback','more'].map(tab => `<div class="nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; currentProfileUser=null; currentChatUser=null; renderMain()"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${['feed','profile','messages','search','interesting'].map(tab => `<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; renderMain()"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${currentTab==='more'?t('settings'):t(currentTab)}</div>${currentTab==='feed'?`<div class="feed-container"><div class="create-post"><div class="avatar-placeholder">${currentUser.username[0].toUpperCase()}</div><div class="post-input-area"><textarea id="postContent" rows="2" placeholder="${t('whatsHappening')} (4-500 chars)"></textarea><div class="post-actions-bar"><label class="image-upload">📷 <input type="file" id="postImage" accept="image/*" style="display:none;"></label><button class="publish-btn" onclick="publishPost()">${t('publish')}</button></div></div></div><div id="feedPosts">${feed.map(p=>renderPostCard(p)).join('')}</div>${feedHasMore?'<div style="text-align:center;padding:20px;">Loading...</div>':'<div style="text-align:center;padding:20px;">End of feed</div>'}</div>`:currentTab==='messages'?`<div class="messages-container"><div class="conversations-sidebar"><div class="conversations-header"><input class="conversations-search" placeholder="Search"></div><div class="conversations-list">${conversationsList.map(c=>`<div class="conversation-item" onclick="alert('Chat demo: select user')"><img class="conversation-avatar" src="${c.avatar||''}"><div><div>${escapeHtml(c.username)}</div></div></div>`).join('')}</div></div><div class="chat-area"><div class="empty-chat">Select a conversation</div></div></div>`:currentTab==='search'?`<div class="search-container"><input id="searchInput" class="search-input" placeholder="Search..."><div id="searchResults"></div></div>`:currentTab==='interesting'?`<div class="feed-container">${feed.slice(0,5).map(p=>`<div class="recommendation-card"><div><strong>@${p.username}</strong><div>${p.content?.substring(0,80)}</div><button onclick="followUser(${p.user_id})" style="background:var(--accent);border:none;padding:4px 12px;border-radius:20px;">${t('follow')}</button></div></div>`).join('')}</div>`:currentTab==='notifications'?`<div class="feed-container">${feed.slice(0,5).map(p=>`<div class="notification"><div><strong>@${p.username}</strong> liked your post</div></div>`).join('')}</div>`:currentTab==='create'?`<div class="feed-container" style="padding:20px;"><div class="recommendation-card" onclick="createPostModal()" style="cursor:pointer;"><div><strong>✏️ Create Post</strong></div></div></div>`:currentTab==='feedback'?`<div class="feed-container" style="padding:20px;"><div class="recommendation-card" onclick="alert('Feedback demo')"><div><strong>📝 Feedback</strong></div></div></div>`:`<div class="feed-container" style="padding:20px;"><div class="profile-header"><h3>Settings</h3><div class="recommendation-card" onclick="showLogoutConfirm()" style="cursor:pointer;"><div>${t('logout')}</div></div></div></div>`}</div></div>`;
        }
        if (currentTab === 'feed') document.getElementById('feedPosts') && (document.getElementById('feedPosts').innerHTML = feed.map(p=>renderPostCard(p)).join(''));
        document.getElementById('postImage')?.addEventListener('change', e => { const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ pendingImage=ev.target.result; document.getElementById('imagePreview')?.remove(); const div=document.createElement('div'); div.id='imagePreview'; div.innerHTML=`<img src="${pendingImage}" style="max-width:100%;max-height:150px;border-radius:12px;">`; document.querySelector('.post-actions-bar')?.before(div); }; r.readAsDataURL(f); } });
    }
    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value;
        if (!content || content.trim().length < 4) { alert('Post must be at least 4 characters'); return; }
        const fd = new FormData(); fd.append('content', content); if(pendingImage){ const blob=await fetch(pendingImage).then(r=>r.blob()); fd.append('image',blob,'photo.jpg'); }
        await api('/api/posts', { method:'POST', body:fd }); pendingImage=null; document.getElementById('postContent').value=''; document.getElementById('imagePreview')?.remove(); await loadFeed(true); renderMain();
    };
    function createPostModal() { const content=prompt('What\'s happening? (4-500 chars)'); if(content && content.trim().length>=4) api('/api/posts',{method:'POST',body:JSON.stringify({content}),headers:{'Content-Type':'application/json'}}).then(()=>{loadFeed(true);renderMain();}); else alert('Too short'); }
    function showUserListModal(title, users) { alert(`${title}: ${users.map(u=>u.username).join(', ')}`); }

    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="auth-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:1000;"><div class="auth-card"><h2 style="margin-bottom:20px;text-align:center;color:var(--accent);">FreedomNet</h2><div id="authForm"><input type="text" id="guestUsername" placeholder="${t('enterUsername')}" maxlength="20"><button onclick="guestLogin()" class="guest-btn" style="background:#2f3336;margin-top:8px;">${t('continueAsGuest')}</button><div class="divider">or</div><input type="text" id="loginInput" placeholder="Username/Email"><input type="password" id="loginPassword" placeholder="Password"><button onclick="login()">${t('login')}</button><button onclick="showRegister()" style="background:#2f3336;margin-top:10px;">Register</button></div></div></div>`;
    }
    window.guestLogin = async () => {
        const username = document.getElementById('guestUsername').value.trim();
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) { alert('Username 3-20 chars (letters, numbers, underscore)'); return; }
        try {
            const res = await api('/api/guest', { method: 'POST', body: JSON.stringify({ username }), headers: { 'Content-Type':'application/json' } });
            currentUser = res.user;
            await loadFeed(true); await loadFollowersAndFollowing(currentUser.id);
            render();
        } catch(e) { alert('Username taken or error'); }
    };
    window.login = async () => {
        const login = document.getElementById('loginInput').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', { method:'POST', body:JSON.stringify({ login, password }), headers:{'Content-Type':'application/json'} });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed(true); await loadFollowersAndFollowing(currentUser.id);
            render();
        } catch(e) { alert('Invalid credentials'); }
    };
    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `<input type="text" id="regUsername" placeholder="Username"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Password"><button onclick="register()">Sign up</button><button onclick="renderAuth()" style="background:#2f3336;margin-top:10px;">Back</button><div id="registerMessage"></div>`;
    };
    window.register = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) { alert('Invalid username'); return; }
        if (!email.includes('@')) { alert('Invalid email'); return; }
        if (password.length < 4) { alert('Password too short'); return; }
        try {
            await api('/api/register', { method:'POST', body:JSON.stringify({ username, email, password }), headers:{'Content-Type':'application/json'} });
            alert('Registered! Please login.');
            renderAuth();
        } catch(e) { alert('Username/email taken'); }
    };
    async function render() { if (!currentUser) await renderAuth(); else await renderMain(); }
    (async () => { try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); } } catch(e) {} render(); })();
</script>
</body>
</html>
