<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --text-primary: #ffffff;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: #080808;
            --accent: #1d9bf0;
            --gold: #ffd700;
        }
        body.dark { --bg-primary: #000000; --bg-secondary: #000000; --text-primary: #ffffff; --border-color: #2f3336; --hover-bg: #080808; }
        body.dark-gray { --bg-primary: #121212; --bg-secondary: #1a1a1a; --text-primary: #ffffff; --border-color: #2a2a2a; --hover-bg: #1e1e1e; }
        body.gray { --bg-primary: #1a1a1a; --bg-secondary: #222222; --text-primary: #ffffff; --border-color: #333333; --hover-bg: #262626; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --text-primary: #000000; --text-secondary: #536471; --border-color: #e1e8ed; --hover-bg: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: background 0.2s ease, color 0.2s ease; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loading-content { text-align: center; }
        .loading-logo { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        
        .sidebar { width: 275px; position: fixed; height: 100vh; padding: 20px 12px; border-right: 1px solid var(--border-color); background: var(--bg-primary); overflow-y: auto; transition: background 0.2s ease, border-color 0.2s ease; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; padding: 12px; color: var(--accent); letter-spacing: -1px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; margin: 4px 0; border-radius: 9999px; cursor: pointer; font-size: 20px; font-weight: 400; width: fit-content; color: var(--text-secondary); background: transparent; transition: color 0.2s ease; }
        .nav-item:hover { color: var(--text-primary); background: transparent; }
        .nav-item.active { font-weight: 700; color: var(--accent); }
        .nav-item.logout:hover { color: #f4212e; }
        .nav-text { font-size: 20px; }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 12px 20px; z-index: 100; justify-content: space-around; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; cursor: pointer; color: var(--text-secondary); transition: color 0.2s ease; font-size: 12px; font-weight: 500; border-radius: 12px; }
        .bottom-nav-item.active { color: var(--accent); background: rgba(29, 155, 240, 0.1); }
        .bottom-nav-item span { font-size: 13px; font-weight: 500; }
        
        .main-content { margin-left: 275px; flex: 1; min-height: 100vh; border-right: 1px solid var(--border-color); transition: border-color 0.2s ease; padding-bottom: 0; }
        .header { position: sticky; top: 0; background: var(--bg-primary); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 800; z-index: 10; color: var(--text-primary); transition: background 0.2s ease, color 0.2s ease; }
        
        .custom-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); animation: fadeIn 0.2s ease; }
        .custom-modal-content { background: var(--bg-primary); border-radius: 28px; padding: 28px; width: 380px; text-align: center; border: 1px solid var(--border-color); max-height: 80vh; overflow-y: auto; animation: scaleIn 0.2s ease; }
        .custom-modal-content p { margin-bottom: 20px; font-size: 18px; font-weight: 500; color: var(--text-primary); }
        .custom-modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary); outline: none; }
        .custom-modal-content input:focus { border-color: var(--accent); }
        .custom-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .custom-modal-btn { padding: 10px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s ease; }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        .custom-modal-btn-secondary { background: var(--border-color); color: var(--text-primary); }
        .custom-modal-btn-danger { background: #f4212e; color: white; }
        .error-message { color: #f4212e; font-size: 13px; margin-top: 8px; text-align: center; }
        .success-message { color: #1d9bf0; font-size: 13px; margin-top: 8px; text-align: center; }
        
        .auth-card { background: #000000; border: 1px solid #2f3336; border-radius: 20px; padding: 40px; width: 400px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000000; border: 1px solid #2f3336; border-radius: 8px; color: #ffffff; outline: none; transition: border-color 0.2s ease; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 9999px; font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
        .auth-card button:hover { opacity: 0.9; }
        .guest-btn { background: #2f3336; margin-top: 12px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; border-right: none; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .auth-card { width: 90%; padding: 24px; }
            .custom-modal-content { width: 90%; padding: 20px; }
        }
    </style>
</head>
<body>
<div id="loading" class="loading-screen" style="display:flex;">
    <div class="loading-content"><div class="loading-logo">FreedomNet</div></div>
</div>
<div id="root" style="display:none;"></div>

<script>
    let currentUser = null;
    let currentTab = 'feed';
    let feed = [];
    let allUsers = [];
    let userFollows = [];
    let followersList = [];
    let followingList = [];
    let currentProfileUser = null;
    let feedOffset = 0;
    let feedHasMore = true;
    let feedLoading = false;
    let currentLang = 'en';
    
    const translations = {
        en: { feed: 'Feed', profile: 'Profile', messages: 'Messages', search: 'Search', interesting: 'Interesting', notifications: 'Notifications', create: 'Create', feedback: 'Feedback', more: 'More', logout: 'Logout', settings: 'Settings', followers: 'Followers', following: 'Following', posts: 'Posts', noPosts: 'No posts yet', whatsHappening: "What's happening?", publish: 'Post', delete: 'Delete', reply: 'Reply', follow: 'Follow', unfollow: 'Unfollow', joined: 'Joined', enterUsername: 'Enter username', continueAsGuest: 'Continue without account', login: 'Login', register: 'Register', signup: 'Sign up', or: 'or', back: 'Back', email: 'Email', password: 'Password', username: 'Username', edit: 'Edit', changePassword: 'Change Password', account: 'Account', security: 'Security', theme: 'Theme', language: 'Language' },
        ru: { feed: 'Лента', profile: 'Профиль', messages: 'Сообщения', search: 'Поиск', interesting: 'Интересное', notifications: 'Уведомления', create: 'Создать', feedback: 'Отзывы', more: 'Ещё', logout: 'Выйти', settings: 'Настройки', followers: 'Подписчики', following: 'Подписки', posts: 'Посты', noPosts: 'Нет постов', whatsHappening: 'Что нового?', publish: 'Пост', delete: 'Удалить', reply: 'Ответить', follow: 'Подписаться', unfollow: 'Отписаться', joined: 'Присоединился', enterUsername: 'Введите имя', continueAsGuest: 'Продолжить без аккаунта', login: 'Войти', register: 'Регистрация', signup: 'Зарегистрироваться', or: 'или', back: 'Назад', email: 'Почта', password: 'Пароль', username: 'Имя', edit: 'Изменить', changePassword: 'Сменить пароль', account: 'Аккаунт', security: 'Безопасность', theme: 'Тема', language: 'Язык' }
    };
    function t(key) { return translations[currentLang]?.[key] || translations.en[key] || key; }
    
    function hideLoadingScreen() {
        const loading = document.getElementById('loading');
        const root = document.getElementById('root');
        if (loading) { loading.style.opacity = '0'; setTimeout(() => { loading.style.display = 'none'; if (root) root.style.display = 'block'; }, 500); }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hideLoadingScreen);
    else hideLoadingScreen();
    
    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    function renderCreatorBadge(isCreator, isOfficial) { if (isOfficial) return '<span style="background:#ffd700; color:#000; border-radius:20px; padding:2px 8px; font-size:11px;">⭐ Official</span>'; if (isCreator) return '<span style="background:var(--accent); border-radius:20px; padding:2px 8px; font-size:11px;">✓ Verified</span>'; return ''; }
    
    function showCustomModal(title, message, onConfirm, confirmText = 'OK', cancelText = null) {
        const existing = document.querySelector('.custom-modal');
        if (existing) existing.remove();
        
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `
            <div class="custom-modal-content">
                <p><strong>${escapeHtml(title)}</strong></p>
                <p style="font-size:14px; color:var(--text-secondary);">${escapeHtml(message)}</p>
                <div class="custom-modal-buttons">
                    <button class="custom-modal-btn custom-modal-btn-primary" id="confirmYes">${confirmText}</button>
                    ${cancelText ? `<button class="custom-modal-btn custom-modal-btn-secondary" id="confirmCancel">${cancelText}</button>` : ''}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('confirmYes').onclick = () => { modal.remove(); if (onConfirm) onConfirm(true); };
        if (cancelText) document.getElementById('confirmCancel').onclick = () => { modal.remove(); if (onConfirm) onConfirm(false); };
        
        const clickOutside = (e) => { if (!modal.contains(e.target)) { modal.remove(); } };
        setTimeout(() => document.addEventListener('click', clickOutside), 100);
    }
    
    function showInputModal(title, placeholder, onConfirm) {
        const existing = document.querySelector('.custom-modal');
        if (existing) existing.remove();
        
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `
            <div class="custom-modal-content">
                <p><strong>${escapeHtml(title)}</strong></p>
                <input type="text" id="modalInput" placeholder="${escapeHtml(placeholder)}" autocomplete="off">
                <div id="modalError" class="error-message" style="display:none;"></div>
                <div class="custom-modal-buttons">
                    <button class="custom-modal-btn custom-modal-btn-primary" id="confirmYes">${t('continueAsGuest')}</button>
                    <button class="custom-modal-btn custom-modal-btn-secondary" id="confirmCancel">${t('cancel')}</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = document.getElementById('modalInput');
        document.getElementById('confirmYes').onclick = () => {
            const val = input.value.trim();
            if (!val) {
                const err = document.getElementById('modalError');
                err.textContent = 'Username required';
                err.style.display = 'block';
                return;
            }
            modal.remove();
            onConfirm(val);
        };
        document.getElementById('confirmCancel').onclick = () => modal.remove();
        input.focus();
    }
    
    async function loadFeed(reset = false) {
        if (reset) { feedOffset = 0; feedHasMore = true; feed = []; }
        if (!feedHasMore || feedLoading) return;
        feedLoading = true;
        try {
            const res = await api(`/api/feed?offset=${feedOffset}&limit=15`);
            if (reset) feed = res.posts; else feed = [...feed, ...res.posts];
            feedHasMore = res.hasMore;
            feedOffset += 15;
        } catch(e) { console.error(e); }
        feedLoading = false;
    }
    
    async function loadFollows() { try { userFollows = await api('/api/follows'); } catch(e) { userFollows = []; } }
    async function loadFollowersAndFollowing(userId) { try { followersList = await api(`/api/followers/${userId}`); followingList = await api(`/api/following/${userId}`); } catch(e) { followersList = []; followingList = []; } }
    function isFollowing(userId) { return userFollows.some(f => f.followee_id === userId); }
    async function followUser(userId) { await api(`/api/follow/${userId}`, { method: 'POST' }); await loadFollows(); if (currentProfileUser && currentProfileUser.id === userId) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function unfollowUser(userId) { await api(`/api/follow/${userId}`, { method: 'DELETE' }); await loadFollows(); if (currentProfileUser && currentProfileUser.id === userId) await loadProfileUser(currentProfileUser.username); renderMain(); }
    async function deletePost(postId) { showCustomModal('Delete post', 'Are you sure you want to delete this post?', async (confirmed) => { if (confirmed) { await api(`/api/posts/${postId}`, { method: 'DELETE' }); await loadFeed(true); renderMain(); } }, t('delete'), t('cancel')); }
    async function toggleLike(postId) { const post = feed.find(p => p.id === postId); if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' }); else await api(`/api/like/${postId}`, { method: 'POST' }); await loadFeed(true); renderMain(); }
    async function addComment(postId) { const input = document.getElementById(`commentInput-${postId}`); const content = input?.value.trim(); if (!content) return; await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } }); await loadFeed(true); renderMain(); }
    async function loadProfileUser(username) { try { currentProfileUser = await api(`/api/user/${username}`); await loadFollowersAndFollowing(currentProfileUser.id); await loadFeed(true); renderMain(); } catch(e) { currentProfileUser = null; } }
    window.viewProfile = (username) => { if (username === currentUser.username) { currentTab = 'profile'; currentProfileUser = null; loadFollowersAndFollowing(currentUser.id).then(() => renderMain()); } else { loadProfileUser(username); currentTab = 'profile'; renderMain(); } };
    
    function showLogoutConfirm() { showCustomModal(t('logout'), 'Are you sure you want to logout?', async (confirmed) => { if (confirmed) { await api('/api/logout', { method: 'POST' }); currentUser = null; render(); } }, t('logout'), t('cancel')); }
    
    function renderPostCard(post) {
        const isOwnPost = post.user_id === currentUser.id;
        return `<div class="post-card" style="border-bottom:1px solid var(--border-color); padding:12px 16px; cursor:pointer;">
            <div style="display:flex; gap:12px;">
                <div style="width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center;">${(post.username || 'U')[0].toUpperCase()}</div>
                <div style="flex:1;">
                    <div><strong>${escapeHtml(post.username)}</strong> ${renderCreatorBadge(post.is_creator, post.is_official)} <span style="color:var(--text-secondary); font-size:13px;">${new Date(post.created_at).toLocaleString()}</span></div>
                    <div style="margin:8px 0;">${escapeHtml(post.content || '')}</div>
                    ${post.image ? `<img src="${post.image}" style="max-width:100%; max-height:200px; border-radius:12px; margin-top:8px;">` : ''}
                    <div style="display:flex; gap:24px; margin-top:8px;">
                        <button onclick="toggleLike(${post.id})" style="background:none; border:none; color:${post.user_liked ? '#f91880' : 'var(--text-secondary)'}; cursor:pointer;">❤️ ${post.likes_count || 0}</button>
                        <button onclick="document.getElementById('comments-${post.id}').style.display = document.getElementById('comments-${post.id}').style.display === 'none' ? 'block' : 'none'" style="background:none; border:none; color:var(--text-secondary); cursor:pointer;">💬 ${post.comments?.length || 0}</button>
                        ${isOwnPost ? `<button onclick="deletePost(${post.id})" style="background:none; border:none; color:var(--text-secondary); cursor:pointer;">🗑 ${t('delete')}</button>` : ''}
                    </div>
                    <div id="comments-${post.id}" style="display:none; margin-top:12px;">
                        ${(post.comments || []).map(c => `<div style="margin:8px 0;"><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.content)}</div>`).join('')}
                        <div style="display:flex; gap:8px; margin-top:8px;"><input id="commentInput-${post.id}" placeholder="${t('reply')}..." style="flex:1; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:20px; padding:8px 12px; color:var(--text-primary);"><button onclick="addComment(${post.id})" style="background:var(--accent); border:none; border-radius:20px; padding:8px 16px; color:white;">→</button></div>
                    </div>
                </div>
            </div>
        </div>`;
    }
    
    function renderProfilePage() {
        const user = currentProfileUser || currentUser;
        const isOwnProfile = !currentProfileUser;
        const userPosts = feed.filter(p => p.user_id === user.id);
        return `<div style="max-width:600px; margin:0 auto;">
            <div style="padding:20px; text-align:center; border-bottom:1px solid var(--border-color);">
                <div style="width:120px; height:120px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:48px; margin:0 auto 16px;">${(user.username || 'U')[0].toUpperCase()}</div>
                <h2>${escapeHtml(user.username)}</h2>
                <div>@${escapeHtml(user.username)} ${renderCreatorBadge(user.is_creator, user.is_official)}</div>
                <div style="display:flex; justify-content:center; gap:32px; margin:16px 0;">
                    <div><strong>${followersList.length}</strong> ${t('followers')}</div>
                    <div><strong>${followingList.length}</strong> ${t('following')}</div>
                    <div><strong>${userPosts.length}</strong> ${t('posts')}</div>
                </div>
                ${!isOwnProfile ? (isFollowing(user.id) ? `<button onclick="unfollowUser(${user.id})" style="background:transparent; border:1px solid var(--border-color); border-radius:20px; padding:8px 24px; color:var(--text-primary); cursor:pointer;">${t('unfollow')}</button>` : `<button onclick="followUser(${user.id})" style="background:var(--accent); border:none; border-radius:20px; padding:8px 24px; color:white; cursor:pointer;">${t('follow')}</button>`) : ''}
            </div>
            <div>${userPosts.map(p => renderPostCard(p)).join('') || '<div style="padding:40px; text-align:center;">'+t('noPosts')+'</div>'}</div>
        </div>`;
    }
    
    function renderMore() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const themeNames = { dark: 'Dark (Black)', 'dark-gray': 'Dark Gray', gray: 'Gray', light: 'Light' };
        return `<div style="max-width:600px; margin:0 auto; padding:20px;">
            <div style="margin-bottom:20px;"><h3>${t('account')}</h3><div>${t('username')}: @${escapeHtml(currentUser?.username)}</div></div>
            <div style="margin-bottom:20px;"><h3>${t('theme')}</h3>
                <select onchange="setTheme(this.value)" style="background:var(--bg-primary); border:1px solid var(--border-color); border-radius:20px; padding:10px; color:var(--text-primary); width:100%;">
                    <option value="dark" ${savedTheme==='dark'?'selected':''}>Dark (Black)</option>
                    <option value="dark-gray" ${savedTheme==='dark-gray'?'selected':''}>Dark Gray</option>
                    <option value="gray" ${savedTheme==='gray'?'selected':''}>Gray</option>
                    <option value="light" ${savedTheme==='light'?'selected':''}>Light</option>
                </select>
            </div>
            <div style="margin-bottom:20px;"><h3>${t('language')}</h3>
                <select onchange="setLanguage(this.value)" style="background:var(--bg-primary); border:1px solid var(--border-color); border-radius:20px; padding:10px; color:var(--text-primary); width:100%;">
                    <option value="en" ${currentLang==='en'?'selected':''}>English</option>
                    <option value="ru" ${currentLang==='ru'?'selected':''}>Русский</option>
                </select>
            </div>
            <div style="border-top:1px solid var(--border-color); padding-top:20px;"><button onclick="showLogoutConfirm()" style="background:#2f3336; border:none; border-radius:20px; padding:12px; color:white; width:100%; cursor:pointer;">${t('logout')}</button></div>
        </div>`;
    }
    
    function renderFeed() {
        return `<div style="max-width:600px; margin:0 auto;">
            <div style="padding:16px; border-bottom:1px solid var(--border-color); display:flex; gap:12px;">
                <div style="width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center;">${currentUser?.username?.[0]?.toUpperCase() || 'U'}</div>
                <div style="flex:1;"><textarea id="postContent" rows="2" placeholder="${t('whatsHappening')} (4-500 chars)" style="width:100%; background:transparent; border:none; color:var(--text-primary); font-size:18px; resize:none;"></textarea><button onclick="publishPost()" style="background:var(--accent); border:none; border-radius:20px; padding:8px 20px; color:white; cursor:pointer; float:right;">${t('publish')}</button></div>
            </div>
            <div id="feedPosts">${feed.map(p => renderPostCard(p)).join('')}</div>
        </div>`;
    }
    
    async function renderMain() {
        await loadFeed();
        const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.className = savedTheme;
        const root = document.getElementById('root');
        const tabsList = ['feed', 'profile', 'more'];
        
        if (currentTab === 'profile') {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">FreedomNet</div>${tabsList.map(tab => `<div class="nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; currentProfileUser=null; renderMain()"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${tabsList.map(tab => `<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; renderMain()"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div>${renderProfilePage()}</div></div>`;
        } else if (currentTab === 'more') {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">FreedomNet</div>${tabsList.map(tab => `<div class="nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; currentProfileUser=null; renderMain()"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${tabsList.map(tab => `<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; renderMain()"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('settings')}</div>${renderMore()}</div></div>`;
        } else {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo">FreedomNet</div>${tabsList.map(tab => `<div class="nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; currentProfileUser=null; renderMain()"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top:40px;"><span class="nav-text">${t('logout')}</span></div></div><div class="bottom-nav">${tabsList.map(tab => `<div class="bottom-nav-item ${currentTab===tab?'active':''}" onclick="currentTab='${tab}'; renderMain()"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('feed')}</div>${renderFeed()}</div></div>`;
        }
        document.getElementById('feedPosts') && (document.getElementById('feedPosts').innerHTML = feed.map(p => renderPostCard(p)).join(''));
    }
    
    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value;
        if (!content || content.trim().length < 4) { showCustomModal('Error', 'Post must be at least 4 characters', null, 'OK'); return; }
        if (content.length > 500) { showCustomModal('Error', 'Post cannot exceed 500 characters', null, 'OK'); return; }
        await api('/api/posts', { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        document.getElementById('postContent').value = '';
        await loadFeed(true);
        renderMain();
    };
    
    window.setTheme = (theme) => { document.body.className = theme; localStorage.setItem('theme', theme); renderMain(); };
    window.setLanguage = (lang) => { currentLang = lang; localStorage.setItem('language', lang); renderMain(); };
    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; renderMain(); };
    
    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;"><div class="auth-card"><h2 style="margin-bottom:20px;text-align:center;color:var(--accent);">FreedomNet</h2><div id="authForm"><input type="text" id="guestUsername" placeholder="${t('enterUsername')}" maxlength="20"><button onclick="guestLogin()" class="guest-btn" style="background:#2f3336;margin-top:8px;">${t('continueAsGuest')}</button><div class="divider">${t('or')}</div><input type="text" id="loginInput" placeholder="${t('username')} / ${t('email')}"><input type="password" id="loginPassword" placeholder="${t('password')}"><button onclick="login()">${t('login')}</button><button onclick="showRegister()" style="background:#2f3336;margin-top:10px;">${t('register')}</button></div></div></div>`;
    }
    
    window.guestLogin = async () => {
        const username = document.getElementById('guestUsername').value.trim();
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) { showCustomModal('Error', 'Username 3-20 chars (letters, numbers, underscore)', null, 'OK'); return; }
        try {
            const res = await api('/api/guest', { method: 'POST', body: JSON.stringify({ username }), headers: { 'Content-Type':'application/json' } });
            currentUser = res.user;
            await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); await loadFollows();
            render();
        } catch(e) { showCustomModal('Error', 'Username taken or error', null, 'OK'); }
    };
    
    window.login = async () => {
        const login = document.getElementById('loginInput').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', { method:'POST', body:JSON.stringify({ login, password }), headers:{'Content-Type':'application/json'} });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); await loadFollows();
            render();
        } catch(e) { showCustomModal('Error', 'Invalid credentials', null, 'OK'); }
    };
    
    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `<input type="text" id="regUsername" placeholder="${t('username')}"><input type="email" id="regEmail" placeholder="${t('email')}"><input type="password" id="regPassword" placeholder="${t('password')}"><button onclick="register()">${t('signup')}</button><button onclick="renderAuth()" style="background:#2f3336;margin-top:10px;">${t('back')}</button><div id="registerMessage"></div>`;
    };
    
    window.register = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) { showCustomModal('Error', 'Invalid username', null, 'OK'); return; }
        if (!email.includes('@')) { showCustomModal('Error', 'Invalid email', null, 'OK'); return; }
        if (password.length < 4) { showCustomModal('Error', 'Password too short', null, 'OK'); return; }
        try {
            await api('/api/register', { method:'POST', body:JSON.stringify({ username, email, password }), headers:{'Content-Type':'application/json'} });
            showCustomModal('Success', 'Registered! Please login.', () => renderAuth(), 'OK');
        } catch(e) { showCustomModal('Error', 'Username/email taken', null, 'OK'); }
    };
    
    async function render() { if (!currentUser) await renderAuth(); else await renderMain(); }
    
    (async () => {
        try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadFollowersAndFollowing(currentUser.id); await loadFollows(); } } catch(e) {}
        render();
    })();
</script>
</body>
</html>
