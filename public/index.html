<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FreedomNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        .app {
            display: flex;
            min-height: 100vh;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
        }

        .sidebar {
            width: 275px;
            position: fixed;
            height: 100vh;
            padding: 20px 12px;
            border-right: 1px solid #2f3336;
            background: #000000;
            overflow-y: auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            padding: 12px;
            color: #1d9bf0;
            letter-spacing: -1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            margin: 4px 0;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 20px;
            font-weight: 400;
            width: fit-content;
            color: #e7e9ea;
        }

        .nav-item:hover {
            background: #181818;
            color: #ffffff;
        }

        .nav-item.active {
            font-weight: 700;
            color: #1d9bf0;
        }

        .nav-item.active:hover {
            background: #181818;
            color: #1d9bf0;
        }

        .nav-text {
            font-size: 20px;
        }

        .main-content {
            margin-left: 275px;
            flex: 1;
            min-height: 100vh;
            border-right: 1px solid #2f3336;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-bottom: 1px solid #2f3336;
            font-size: 20px;
            font-weight: 800;
            z-index: 10;
        }

        .feed-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .create-post {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }

        .avatar:hover {
            opacity: 0.8;
        }

        .post-input-area {
            flex: 1;
        }

        .post-input-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 18px;
            resize: vertical;
            font-family: inherit;
            outline: none;
            min-height: 60px;
        }

        .post-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .image-upload {
            color: #1d9bf0;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: opacity 0.1s ease;
        }

        .image-upload:hover {
            background: #181818;
        }

        .publish-btn {
            background: #1d9bf0;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }

        .publish-btn:hover {
            opacity: 0.9;
        }

        .post-card {
            border-bottom: 1px solid #2f3336;
            padding: 12px 16px;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .post-card:hover {
            background: #080808;
        }

        .post-header {
            display: flex;
            gap: 12px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .post-avatar:hover {
            opacity: 0.8;
        }

        .post-body {
            flex: 1;
        }

        .post-user {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .post-username {
            color: #71767b;
            font-weight: 400;
            margin-left: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .post-username:hover {
            text-decoration: underline;
        }

        .post-time {
            color: #71767b;
            font-size: 13px;
            margin-left: 6px;
        }

        .post-content {
            font-size: 15px;
            margin: 8px 0;
            line-height: 1.4;
        }

        .mention {
            color: #1d9bf0;
            cursor: pointer;
        }

        .hashtag {
            color: #1d9bf0;
            cursor: pointer;
        }

        .post-image {
            margin-top: 12px;
            border-radius: 16px;
            max-width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid #2f3336;
        }

        .post-stats {
            display: flex;
            gap: 32px;
            margin-top: 12px;
        }

        .stat-btn {
            background: none;
            border: none;
            color: #71767b;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            transition: all 0.1s ease;
        }

        .stat-btn:hover {
            background: #181818;
            color: #ffffff;
        }

        .stat-btn.liked {
            color: #f91880;
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2f3336;
        }

        .comment {
            font-size: 14px;
            margin: 8px 0;
        }

        .comment strong {
            color: #1d9bf0;
            cursor: pointer;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 10px 16px;
            color: #ffffff;
            outline: none;
        }

        .comment-input input:focus {
            border-color: #1d9bf0;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: #1d9bf0;
        }

        .search-result {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .search-result:hover {
            background: #080808;
        }

        .reels-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .reel {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .reel-video {
            width: 100%;
            aspect-ratio: 9/16;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .recommendation-card {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: background 0.1s ease;
        }

        .recommendation-card:hover {
            background: #080808;
        }

        .notification {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 12px;
            transition: background 0.1s ease;
        }

        .notification:hover {
            background: #080808;
        }

        .messages-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .conversations-list {
            width: 350px;
            border-right: 1px solid #2f3336;
            overflow-y: auto;
        }

        .conversation {
            padding: 16px;
            border-bottom: 1px solid #2f3336;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .conversation:hover {
            background: #080808;
        }

        .conversation.active {
            background: #181818;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }

        .message.outgoing {
            background: #1d9bf0;
            color: white;
            align-self: flex-end;
        }

        .message.incoming {
            background: #2f3336;
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #2f3336;
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: 1px solid #2f3336;
            border-radius: 9999px;
            padding: 12px 16px;
            color: #ffffff;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #1d9bf0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 24px;
            width: 500px;
            max-width: 90%;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #ffffff;
            outline: none;
        }

        .auth-card input:focus {
            border-color: #1d9bf0;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
        }

        .error-message {
            color: #f4212e;
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 4px;
            text-align: center;
        }

        .success-message {
            color: #1d9bf0;
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 4px;
            text-align: center;
        }

        /* User preview card (X style) */
        .user-preview {
            position: fixed;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            padding: 16px;
            width: 280px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-preview-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .user-preview-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .user-preview-name {
            font-weight: 700;
            font-size: 16px;
        }

        .user-preview-username {
            color: #71767b;
            font-size: 14px;
        }

        .user-preview-bio {
            margin: 12px 0;
            font-size: 14px;
        }

        .user-preview-joined {
            color: #71767b;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .user-preview-btn {
            width: 100%;
            padding: 8px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }

        .user-preview-btn:hover {
            opacity: 0.9;
        }

        .suggestions-dropdown {
            position: absolute;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 150;
            width: 300px;
        }

        .suggestion-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .suggestion-item:hover {
            background: #181818;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f3336;
            border-radius: 4px;
        }

        @media (max-width: 1000px) {
            .sidebar { width: 88px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 88px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    let currentUser = null;
    let currentTab = 'home';
    let feed = [];
    let conversations = [];
    let currentChatUser = null;
    let pendingImage = null;
    let searchQuery = '';
    let searchResults = [];
    let allUsers = [];

    const tabs = ['Home', 'Reels', 'Messages', 'Search', 'Interesting', 'Notifications', 'Create', 'More'];
    const tabKeys = ['home', 'reels', 'messages', 'search', 'interesting', 'notifications', 'create', 'more'];

    async function api(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function showMessage(elementId, message, isError = false) {
        const container = document.getElementById(elementId);
        if (container) {
            const existing = container.querySelector('.error-message, .success-message');
            if (existing) existing.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'error-message' : 'success-message';
            msgDiv.textContent = message;
            container.appendChild(msgDiv);
            setTimeout(() => { if (msgDiv.parentNode) msgDiv.remove(); }, 4000);
        }
    }

    function parseMentionsAndHashtags(text) {
        if (!text) return '';
        let html = escapeHtml(text);
        html = html.replace(/@(\w+)/g, '<span class="mention" data-mention="$1">@$1</span>');
        html = html.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return html;
    }

    async function loadAllUsers() {
        try { allUsers = await api('/api/users'); } catch(e) { allUsers = []; }
    }

    function showUserPreview(user, x, y, elementId) {
        const existing = document.querySelector('.user-preview');
        if (existing) existing.remove();
        
        const preview = document.createElement('div');
        preview.className = 'user-preview';
        preview.style.left = x + 'px';
        preview.style.top = y + 'px';
        preview.innerHTML = `
            <div class="user-preview-header">
                <div class="user-preview-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                <div>
                    <div class="user-preview-name">${escapeHtml(user.username)}</div>
                    <div class="user-preview-username">@${escapeHtml(user.username)}</div>
                </div>
            </div>
            <div class="user-preview-bio">${escapeHtml(user.bio || 'No bio yet')}</div>
            <div class="user-preview-joined">Joined ${new Date(user.created_at || Date.now()).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</div>
            <div class="user-preview-btn" onclick="viewProfile('${user.username}'); document.querySelector('.user-preview')?.remove();">View Profile</div>
        `;
        document.body.appendChild(preview);
        
        setTimeout(() => {
            const clickHandler = (e) => {
                if (!preview.contains(e.target) && e.target.id !== elementId) {
                    preview.remove();
                    document.removeEventListener('click', clickHandler);
                }
            };
            document.addEventListener('click', clickHandler);
        }, 100);
    }

    window.viewProfile = (username) => {
        currentTab = 'more';
        renderMain();
    };

    async function render() {
        if (!currentUser) {
            await renderAuth();
            return;
        }
        await loadAllUsers();
        await renderMain();
    }

    async function renderAuth() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="margin-bottom:20px; text-align:center;">FreedomNet</h2>
                    <div id="authForm">
                        <input type="text" id="loginInput" placeholder="Username / Email">
                        <input type="password" id="loginPassword" placeholder="Password">
                        <button onclick="login()">Login</button>
                        <p style="margin:15px 0; text-align:center; color:#71767b;">or</p>
                        <button onclick="showRegister()" style="background:#2f3336;">Register</button>
                    </div>
                </div>
            </div>
        `;
    }

    window.showRegister = () => {
        document.getElementById('authForm').innerHTML = `
            <input type="text" id="regUsername" placeholder="Username" maxlength="20">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">
            <button onclick="register()">Register</button>
            <button onclick="renderAuth()" style="background:#2f3336; margin-top:10px;">Back</button>
            <div id="registerMessage"></div>
        `;
    };

    window.register = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!username.match(/^[a-zA-Z0-9_]{3,20}$/)) {
            showMessage('registerMessage', 'Username must be 3-20 characters (letters, numbers, underscore)', true);
            return;
        }
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            showMessage('registerMessage', 'Invalid email format', true);
            return;
        }
        if (password.length < 4) {
            showMessage('registerMessage', 'Password must be at least 4 characters', true);
            return;
        }
        
        try {
            await api('/api/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password }),
                headers: { 'Content-Type': 'application/json' }
            });
            showMessage('registerMessage', 'Registration successful! Please login.', false);
            setTimeout(() => renderAuth(), 1500);
        } catch(e) {
            showMessage('registerMessage', 'Username or email already taken', true);
        }
    };

    window.login = async () => {
        const login = document.getElementById('loginInput').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await api('/api/login', {
                method: 'POST',
                body: JSON.stringify({ login, password }),
                headers: { 'Content-Type': 'application/json' }
            });
            const me = await api('/api/me');
            currentUser = me.user;
            await loadFeed();
            await loadConversations();
            render();
        } catch(e) {
            showMessage('authForm', 'Invalid username/email or password', true);
        }
    };

    async function loadFeed() {
        try { feed = await api('/api/feed'); } catch(e) { feed = []; }
    }

    async function loadConversations() {
        try { conversations = await api('/api/conversations'); } catch(e) { conversations = []; }
    }

    async function searchUsers() {
        if (!searchQuery.trim()) { searchResults = []; renderMain(); return; }
        try {
            const users = await api('/api/users');
            searchResults = users.filter(u => u.username.toLowerCase().includes(searchQuery.toLowerCase()));
            renderMain();
        } catch(e) { searchResults = []; }
    }

    async function renderMain() {
        await loadFeed();
        await loadConversations();
        
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">FreedomNet</div>
                    ${tabs.map((tab, idx) => `
                        <div class="nav-item ${currentTab === tabKeys[idx] ? 'active' : ''}" onclick="switchTab('${tabKeys[idx]}')">
                            <span class="nav-text">${tab}</span>
                        </div>
                    `).join('')}
                    <div class="nav-item" onclick="logout()" style="margin-top: 40px;">
                        <span class="nav-text">Logout</span>
                    </div>
                </div>
                <div class="main-content">
                    <div class="header">${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}</div>
                    ${currentTab === 'home' ? renderHome() : ''}
                    ${currentTab === 'reels' ? renderReels() : ''}
                    ${currentTab === 'messages' ? renderMessages() : ''}
                    ${currentTab === 'search' ? renderSearch() : ''}
                    ${currentTab === 'interesting' ? renderInteresting() : ''}
                    ${currentTab === 'notifications' ? renderNotifications() : ''}
                    ${currentTab === 'create' ? renderCreateModal() : ''}
                    ${currentTab === 'more' ? renderMore() : ''}
                </div>
            </div>
        `;
        
        if (currentTab === 'home') attachFeedEvents();
        if (currentTab === 'search') {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; searchUsers(); });
            }
        }
        
        document.querySelectorAll('.mention').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const username = el.dataset.mention;
                const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() };
                const rect = el.getBoundingClientRect();
                showUserPreview(user, rect.left, rect.bottom + 5, el.id);
            });
        });
        
        document.querySelectorAll('.hashtag').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                searchQuery = el.dataset.hashtag;
                currentTab = 'search';
                renderMain();
            });
        });
        
        document.querySelectorAll('.post-avatar, .post-username').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const username = el.closest('.post-header')?.querySelector('.post-username')?.textContent?.replace('@', '') || 
                                 el.closest('.post-user')?.querySelector('.post-username')?.textContent?.replace('@', '');
                if (username) {
                    const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() };
                    const rect = el.getBoundingClientRect();
                    showUserPreview(user, rect.left, rect.bottom + 5, el.id);
                }
            });
        });
    }

    function renderHome() {
        return `
            <div class="feed-container">
                <div class="create-post">
                    <div class="avatar" onclick="viewProfile('${currentUser.username}')">${currentUser?.username?.[0]?.toUpperCase() || 'U'}</div>
                    <div class="post-input-area">
                        <textarea id="postContent" rows="2" placeholder="What's happening?"></textarea>
                        <div id="suggestionsContainer" style="position:relative;"></div>
                        <div id="imagePreview" style="margin-top:8px;"></div>
                        <div class="post-actions-bar">
                            <label class="image-upload">📷 <input type="file" id="postImage" accept="image/*" style="display:none;"></label>
                            <button class="publish-btn" onclick="publishPost()">Post</button>
                        </div>
                    </div>
                </div>
                ${feed.map(post => `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar" data-username="${post.username}">${(post.username || 'U')[0].toUpperCase()}</div>
                            <div class="post-body">
                                <div class="post-user">
                                    <span class="post-username" data-username="${post.username}">${escapeHtml(post.username)}</span>
                                    <span class="post-username">@${escapeHtml(post.username)}</span>
                                    <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div class="post-content">${parseMentionsAndHashtags(post.content || '')}</div>
                                ${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open('${post.image}')">` : ''}
                                <div class="post-stats">
                                    <button class="stat-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                        ♥ ${post.likes_count || 0}
                                    </button>
                                    <button class="stat-btn" onclick="toggleComments(${post.id})">
                                        💬 ${post.comments?.length || 0}
                                    </button>
                                </div>
                                <div id="comments-${post.id}" style="display:none;" class="comments-section">
                                    ${(post.comments || []).map(c => `<div class="comment"><strong onclick="viewProfile('${c.username}')">${escapeHtml(c.username)}</strong> ${parseMentionsAndHashtags(c.content)}</div>`).join('')}
                                    <div class="comment-input">
                                        <input type="text" id="commentInput-${post.id}" placeholder="Add a comment...">
                                        <button onclick="addComment(${post.id})">→</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderReels() {
        return `
            <div class="reels-container">
                ${[1,2,3,4,5].map(i => `
                    <div class="reel">
                        <div class="reel-video">▶ Reel ${i}</div>
                        <div style="padding:12px;"><strong>creator_${i}</strong><div style="color:#71767b; font-size:12px;">1.2M views</div></div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderMessages() {
        return `
            <div class="messages-container">
                <div class="conversations-list" id="conversationsList">
                    ${conversations.map(c => `
                        <div class="conversation" onclick="openChat(${c.other_id}, '${escapeHtml(c.username)}')">
                            <strong>${escapeHtml(c.username)}</strong>
                            <div style="font-size:12px; color:#71767b;">${escapeHtml(c.last_message || 'No messages yet')}</div>
                        </div>
                    `).join('')}
                    ${conversations.length === 0 ? '<div style="padding:20px; color:#71767b;">No conversations yet</div>' : ''}
                </div>
                <div class="chat-area" id="chatArea" style="display:none;">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Message...">
                        <button onclick="sendChatMessage()" style="background:#1d9bf0; border:none; border-radius:9999px; padding:8px 20px; color:white;">Send</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderSearch() {
        return `
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search users...">
                <div id="searchResults" style="margin-top:20px;">
                    ${searchResults.map(u => `
                        <div class="search-result" onclick="viewProfile('${u.username}')">
                            <strong>${escapeHtml(u.username)}</strong>
                            <div style="font-size:12px; color:#71767b;">@${escapeHtml(u.username)}</div>
                        </div>
                    `).join('')}
                    ${searchQuery && searchResults.length === 0 ? '<div style="padding:20px; color:#71767b;">No users found</div>' : ''}
                </div>
            </div>
        `;
    }

    function renderInteresting() {
        return `
            <div class="feed-container">
                ${feed.slice(0,5).map(post => `
                    <div class="recommendation-card">
                        <strong onclick="viewProfile('${post.username}')" style="cursor:pointer;">@${escapeHtml(post.username)}</strong>
                        <div style="margin-top:8px;">${parseMentionsAndHashtags(post.content || '')}</div>
                        <button onclick="switchTab('home')" style="margin-top:12px; background:#1d9bf0; border:none; padding:6px 16px; border-radius:20px; color:white; cursor:pointer;">Follow</button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderNotifications() {
        return `
            <div class="feed-container">
                ${feed.slice(0,8).map(post => `
                    <div class="notification">
                        <div class="avatar" style="width:40px;height:40px;">♥</div>
                        <div><strong onclick="viewProfile('${post.username}')" style="cursor:pointer;">${escapeHtml(post.username)}</strong> liked your post</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderCreateModal() {
        setTimeout(() => {
            const modal = document.getElementById('createModal');
            if (modal) {
                modal.style.display = 'flex';
                document.getElementById('modalPostContent')?.focus();
            }
        }, 10);
        return `
            <div id="createModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3 style="margin-bottom:16px;">Create new post</h3>
                    <textarea id="modalPostContent" rows="3" style="width:100%; background:#000; border:1px solid #2f3336; border-radius:12px; padding:12px; color:white;" placeholder="What's happening?"></textarea>
                    <input type="file" id="modalPostImage" accept="image/*" style="margin:12px 0;">
                    <div id="modalImagePreview"></div>
                    <div style="display:flex; gap:12px; margin-top:16px;">
                        <button onclick="publishModalPost()" style="flex:1; background:#1d9bf0; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Post</button>
                        <button onclick="switchTab('home')" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMore() {
        return `
            <div class="feed-container" style="padding:20px;">
                <div class="recommendation-card" onclick="logout()" style="cursor:pointer;">
                    <strong>Logout</strong>
                    <div style="color:#71767b;">Sign out of your account</div>
                </div>
                <div class="recommendation-card">
                    <strong>Profile</strong>
                    <div style="color:#71767b;">@${escapeHtml(currentUser?.username)}</div>
                    <div style="color:#71767b; font-size:13px; margin-top:8px;">Joined ${new Date(currentUser?.created_at || Date.now()).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</div>
                </div>
                <div class="recommendation-card">
                    <strong>Settings</strong>
                    <div style="color:#71767b;">Appearance, language, privacy</div>
                </div>
            </div>
        `;
    }

    window.publishModalPost = async () => {
        const content = document.getElementById('modalPostContent')?.value || '';
        const file = document.getElementById('modalPostImage')?.files[0];
        const formData = new FormData();
        formData.append('content', content);
        if (file) formData.append('image', file);
        await api('/api/posts', { method: 'POST', body: formData });
        switchTab('home');
        await loadFeed();
        renderMain();
    };

    function attachFeedEvents() {
        const textarea = document.getElementById('postContent');
        const suggestionsContainer = document.getElementById('suggestionsContainer');
        
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                const value = e.target.value;
                const lastChar = value[value.length - 1];
                const lastWord = value.split(/[\s\n]/).pop();
                
                if (lastWord && (lastWord.startsWith('@') || lastWord.startsWith('#'))) {
                    const query = lastWord.substring(1);
                    if (lastWord.startsWith('@')) {
                        const matches = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length > 0) {
                            suggestionsContainer.innerHTML = `
                                <div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000; border:1px solid #2f3336; border-radius:12px;">
                                    ${matches.map(m => `<div class="suggestion-item" data-suggestion="${m.username}" data-type="mention">@${escapeHtml(m.username)}</div>`).join('')}
                                </div>
                            `;
                            document.querySelectorAll('.suggestion-item').forEach(el => {
                                el.addEventListener('click', () => {
                                    const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'mention' ? '@' : '#') + el.dataset.suggestion + ' ';
                                    textarea.value = newValue;
                                    suggestionsContainer.innerHTML = '';
                                    textarea.focus();
                                });
                            });
                        } else {
                            suggestionsContainer.innerHTML = '';
                        }
                    } else if (lastWord.startsWith('#')) {
                        const hashtags = ['trending', 'news', 'viral', 'coding', 'design', 'tech', 'art', 'music', 'photography'];
                        const matches = hashtags.filter(h => h.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length > 0) {
                            suggestionsContainer.innerHTML = `
                                <div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:#000; border:1px solid #2f3336; border-radius:12px;">
                                    ${matches.map(m => `<div class="suggestion-item" data-suggestion="${m}" data-type="hashtag">#${escapeHtml(m)}</div>`).join('')}
                                </div>
                            `;
                            document.querySelectorAll('.suggestion-item').forEach(el => {
                                el.addEventListener('click', () => {
                                    const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'hashtag' ? '#' : '@') + el.dataset.suggestion + ' ';
                                    textarea.value = newValue;
                                    suggestionsContainer.innerHTML = '';
                                    textarea.focus();
                                });
                            });
                        } else {
                            suggestionsContainer.innerHTML = '';
                        }
                    }
                } else {
                    suggestionsContainer.innerHTML = '';
                }
            });
        }
        
        const imageInput = document.getElementById('postImage');
        if (imageInput) {
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingImage = ev.target.result;
                        const preview = document.getElementById('imagePreview');
                        if (preview) {
                            preview.innerHTML = `<img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;">`;
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    }

    window.publishPost = async () => {
        const content = document.getElementById('postContent')?.value || '';
        const formData = new FormData();
        formData.append('content', content);
        if (pendingImage) {
            const blob = await fetch(pendingImage).then(r => r.blob());
            formData.append('image', blob, 'photo.jpg');
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null;
        const postContent = document.getElementById('postContent');
        if (postContent) postContent.value = '';
        const preview = document.getElementById('imagePreview');
        if (preview) preview.innerHTML = '';
        await loadFeed();
        renderMain();
    };

    window.toggleLike = async (postId) => {
        const post = feed.find(p => p.id === postId);
        if (post.user_liked) {
            await api(`/api/like/${postId}`, { method: 'DELETE' });
        } else {
            await api(`/api/like/${postId}`, { method: 'POST' });
        }
        await loadFeed();
        renderMain();
    };

    window.toggleComments = (postId) => {
        const el = document.getElementById(`comments-${postId}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const content = input?.value.trim();
        if (!content) return;
        await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        await loadFeed();
        renderMain();
    };

    window.switchTab = (tab) => {
        currentTab = tab;
        renderMain();
    };

    window.openChat = async (userId, username) => {
        currentChatUser = { id: userId, username };
        const messages = await api(`/api/messages/${userId}`);
        const conversationsDiv = document.getElementById('conversationsList');
        const chatArea = document.getElementById('chatArea');
        if (conversationsDiv) conversationsDiv.style.display = 'none';
        if (chatArea) chatArea.style.display = 'flex';
        const container = document.getElementById('chatMessages');
        if (container) {
            container.innerHTML = messages.map(m => `
                <div class="message ${m.from_id === currentUser.id ? 'outgoing' : 'incoming'}">
                    ${escapeHtml(m.content)}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
    };

    window.sendChatMessage = async () => {
        const input = document.getElementById('chatInput');
        const content = input?.value.trim();
        if (!content || !currentChatUser) return;
        await api(`/api/messages/${currentChatUser.id}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } });
        if (input) input.value = '';
        await openChat(currentChatUser.id, currentChatUser.username);
    };

    window.logout = async () => {
        await api('/api/logout', { method: 'POST' });
        currentUser = null;
        render();
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    (async () => {
        try {
            const me = await api('/api/me');
            if (me.user) {
                currentUser = me.user;
                await loadFeed();
            }
        } catch(e) {}
        render();
    })();
</script>
</body>
</html>
