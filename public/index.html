<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="auth-container">
            <div class="auth-card">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </div>
                
                <h1 class="title">Happening now</h1>
                <p class="subtitle">Join today.</p>
                
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="login">Sign in</button>
                    <button class="tab-btn" data-tab="register">Create account</button>
                </div>
                
                <form id="loginForm" class="form active">
                    <div class="input-field">
                        <input type="text" id="loginUsername" required autocomplete="off">
                        <label>Email or username</label>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="loginPassword" required>
                        <label>Password</label>
                        <button type="button" class="show-password" data-target="loginPassword">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn">Sign in</button>
                </form>
                
                <form id="registerForm" class="form">
                    <div class="input-field">
                        <input type="text" id="regFullName" required autocomplete="off">
                        <label>Full name</label>
                    </div>
                    
                    <div class="input-field">
                        <input type="text" id="regUsername" required autocomplete="off">
                        <label>Username</label>
                    </div>
                    
                    <div class="input-field">
                        <input type="email" id="regEmail" required autocomplete="off">
                        <label>Email</label>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="regPassword" required>
                        <label>Password</label>
                        <button type="button" class="show-password" data-target="regPassword">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="regConfirmPassword" required>
                        <label>Confirm password</label>
                    </div>
                    
                    <button type="submit" class="submit-btn">Create account</button>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
        
        <div id="dashboard" class="dashboard">
            <div class="dashboard-sidebar">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </div>
                <nav class="sidebar-nav">
                    <div class="nav-item active">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/>
                        </svg>
                        <span>Home</span>
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Profile</span>
                    </div>
                </nav>
                <button id="logoutBtn" class="logout-btn">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
            
            <div class="dashboard-main">
                <div class="dashboard-header">
                    <h2>Welcome back, <span id="userName"></span></h2>
                    <div class="header-actions">
                        <div class="notification-badge">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <div class="dashboard-content">
                    <div class="welcome-card">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <h3>Authentication successful</h3>
                        <p>You're now signed in to your account</p>
                        <div class="status-indicator">
                            <div class="status-dot"></div>
                            <span>Active session</span>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-label">Account status</div>
                            <div class="info-value">Verified</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Session type</div>
                            <div class="info-value">Test mode</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Security level</div>
                            <div class="info-value">High</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
