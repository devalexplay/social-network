<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="container">
        <div class="card">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                </svg>
                <h1>auth<span>flow</span></h1>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="login">sign in</button>
                <button class="tab" data-tab="register">sign up</button>
            </div>
            
            <form id="loginForm" class="form active">
                <div class="input-group">
                    <input type="text" id="loginUsername" required autocomplete="off">
                    <label>username or email</label>
                    <div class="line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="loginPassword" required>
                    <label>password</label>
                    <div class="line"></div>
                    <button type="button" class="eye" data-target="loginPassword">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
                
                <div class="options">
                    <label class="check">
                        <input type="checkbox" id="rememberMe">
                        <span>remember me</span>
                    </label>
                    <a href="#" class="link">forgot password?</a>
                </div>
                
                <button type="submit" class="btn">
                    <span>sign in</span>
                    <svg class="arrow" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </button>
            </form>
            
            <form id="registerForm" class="form">
                <div class="input-group">
                    <input type="text" id="regFullName" required autocomplete="off">
                    <label>full name</label>
                    <div class="line"></div>
                </div>
                
                <div class="input-group">
                    <input type="text" id="regUsername" required autocomplete="off">
                    <label>username</label>
                    <div class="line"></div>
                </div>
                
                <div class="input-group">
                    <input type="email" id="regEmail" required autocomplete="off">
                    <label>email</label>
                    <div class="line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="regPassword" required>
                    <label>password</label>
                    <div class="line"></div>
                    <button type="button" class="eye" data-target="regPassword">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
                
                <div class="input-group">
                    <input type="password" id="regConfirmPassword" required>
                    <label>confirm password</label>
                    <div class="line"></div>
                </div>
                
                <button type="submit" class="btn">
                    <span>create account</span>
                    <svg class="arrow" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <div id="dashboard" class="dashboard">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <div class="greeting">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <h2>welcome, <span id="userName"></span></h2>
                </div>
                <button id="logoutBtn" class="logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2"/>
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2"/>
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    logout
                </button>
            </div>
            <div class="dashboard-content">
                <div class="test">
                    <h3>authentication successful</h3>
                    <p>you have successfully logged in to the system</p>
                    <div class="divider"></div>
                    <div class="status">
                        <span class="badge">active session</span>
                        <span class="text">test mode</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
