<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FreedomNet — iOS 26 Style</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231d9bf0'/%3E%3C/svg%3E">
    <style>
        /* ---------- iOS 26 Glassmorphism Style ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(20, 20, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --accent: #1d9bf0;
            --accent-glow: rgba(29, 155, 240, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --bg-dark: #0a0a0f;
            --card-bg: rgba(25, 25, 35, 0.7);
            --hover-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.1);
            --gold: #ffd700;
            --moderator: #23c55e;
            --admin: #f4212e;
            --online-green: #23c55e;
            --offline-gray: #6b7280;
            --transition-default: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            backdrop-filter: blur(0px);
        }

        /* Glassmorphism Base */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--glass-shadow);
        }

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
        }

        .animate-fade-up {
            animation: fadeInUp 0.5s ease forwards;
        }

        .animate-fade {
            animation: fadeIn 0.3s ease forwards;
        }

        .animate-scale {
            animation: scaleIn 0.3s ease forwards;
        }

        /* Logo Pulse */
        .logo-pulse {
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 0px var(--accent); }
            50% { opacity: 0.8; text-shadow: 0 0 10px var(--accent); }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loading-logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -2px;
            animation: loadingPulse 1s ease infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            position: fixed;
            height: 100vh;
            padding: 24px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            transition: var(--transition-default);
            overflow-y: auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 40px;
            padding: 12px 16px;
            color: var(--accent);
            letter-spacing: -1px;
            cursor: pointer;
            display: inline-block;
            transition: var(--transition-default);
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            margin: 6px 0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition-default);
            backdrop-filter: blur(10px);
        }

        .nav-item:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .nav-item.logout:hover {
            background: rgba(244, 33, 46, 0.2);
            color: #f4212e;
        }

        /* Bottom Nav (Mobile) */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px;
            z-index: 100;
            justify-content: space-around;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition-default);
            border-radius: 16px;
            font-size: 12px;
        }

        .bottom-nav-item.active {
            color: var(--accent);
            background: rgba(29, 155, 240, 0.15);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            min-height: 100vh;
            padding: 20px;
            transition: var(--transition-default);
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px 24px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            font-size: 24px;
            font-weight: 700;
            animation: slideInLeft 0.4s ease;
        }

        /* Cards */
        .post-card, .static-card, .notification, .conversation-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            transition: var(--transition-default);
            cursor: pointer;
            animation: fadeInUp 0.4s ease;
        }

        .post-card:hover, .static-card:hover, .notification:hover, .conversation-item:hover {
            transform: translateY(-2px);
            background: rgba(35, 35, 45, 0.8);
            border-color: var(--accent);
        }

        /* Create Post */
        .create-post {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            transition: var(--transition-default);
        }

        .create-post textarea {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .publish-btn {
            background: var(--accent);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: var(--transition-default);
        }

        .publish-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Buttons */
        button, .custom-modal-btn {
            transition: var(--transition-default);
        }

        button:hover, .custom-modal-btn:hover {
            transform: scale(1.02);
        }

        /* Custom Modal */
        .custom-modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            animation: scaleIn 0.3s ease;
        }

        /* Inputs */
        input, textarea, select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            color: var(--text-primary);
            transition: var(--transition-default);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Profile Avatar */
        .profile-avatar {
            transition: var(--transition-default);
        }

        .profile-avatar:hover {
            transform: scale(1.02);
        }

        /* Messages Container */
        .messages-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .conversations-sidebar {
            background: rgba(20, 20, 30, 0.5);
            border-right: 1px solid var(--border-color);
        }

        .chat-area {
            background: rgba(15, 15, 25, 0.5);
        }

        .message-bubble {
            transition: var(--transition-default);
            animation: fadeInUp 0.2s ease;
        }

        /* Badges */
        .gold-badge, .moderator-badge, .admin-badge, .verified-badge {
            backdrop-filter: blur(4px);
            transition: var(--transition-default);
        }

        .gold-badge:hover, .moderator-badge:hover, .admin-badge:hover {
            transform: scale(1.02);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            transition: var(--transition-default);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Global Footer */
        .global-footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
                padding-bottom: 80px;
            }
            .bottom-nav {
                display: flex;
            }
            .header {
                font-size: 20px;
                padding: 14px 20px;
            }
            .post-card, .static-card {
                padding: 12px;
            }
            .create-post {
                padding: 16px;
            }
            .custom-modal-content {
                width: 90%;
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .bottom-nav-item span {
                font-size: 11px;
            }
            .header {
                font-size: 18px;
            }
        }

        /* Crop Modal */
        .crop-modal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
        }

        .crop-modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
        }

        /* Custom Select Dropdown */
        .custom-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: var(--transition-default);
        }

        .custom-select:hover {
            border-color: var(--accent);
        }

        .custom-select-dropdown {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-top: 8px;
        }

        /* Auth Card */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            width: 420px;
            max-width: 90%;
            animation: scaleIn 0.4s ease;
        }
    </style>
</head>

        return currentUser?.role === 'moderator' || currentUser?.role === 'admin' || currentUser?.username === 'DevAlexPlay';

    function isAdmin() {

        if (user?.is_creator && currentUser?.username !== 'DevAlexPlay') return '<span class="verified-badge">✓ Verified</span>';
        return '';

    // WebSocket connection for real-time updates
    function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        ws.onopen = () => {
            console.log('WebSocket connected');
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'new_post') {
                    feed.unshift(data.post);
                    if (currentTab === 'feed') {
                        updateFeedPosts();
                    }
                } else if (data.type === 'new_comment') {
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed[postIndex].comments = data.comments;
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                } else if (data.type === 'post_deleted') {
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed.splice(postIndex, 1);
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                } else if (data.type === 'like_update') {
                    const postIndex = feed.findIndex(p => p.id === data.post_id);
                    if (postIndex !== -1) {
                        feed[postIndex].likes_count = data.likes_count;
                        feed[postIndex].user_liked = data.user_liked;
                        if (currentTab === 'feed') {
                            updateFeedPosts();
                        }
                    }
                } else if (data.type === 'new_message') {
                    if (currentChatUser && currentChatUser.id === data.from_id) {
                        currentChatMessages.push(data.message);
                        renderMain();
                        setTimeout(() => {
                            const container = document.getElementById('chatMessages');
                            if (container) container.scrollTop = container.scrollHeight;
                        }, 100);
                    }
                    loadConversationsList();
                } else if (data.type === 'new_report') {
                    if (isModeratorOrAdmin()) {
                        showToast(`New report from ${data.reportedBy}: ${data.reason}`);
                    }
                } else if (data.type === 'user_role_changed') {
                    if (data.username === currentUser?.username) {
                        currentUser.role = data.newRole;
                        renderMain();
                    }
                    loadAllUsers();
                }
            } catch(e) { console.error('WebSocket message error:', e); }
        };
        
        ws.onclose = () => {
            console.log('WebSocket disconnected, reconnecting...');
            reconnectTimeout = setTimeout(connectWebSocket, 3000);
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };
    }
    
    function sendWebSocketMessage(type, data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type, ...data }));
        }
    }

    // Avatar crop editor - fixed
    function openAdvancedCropModal(file) {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => {
            img.src = e.target.result;
            img.onload = () => {
                cropScale = 1;
                cropTranslateX = 0;
                cropTranslateY = 0;
                
                const modal = document.createElement('div');
                modal.className = 'crop-modal';
                modal.innerHTML = `
                    <div class="crop-modal-content">
                        <h3 style="margin-bottom:16px;">Adjust Avatar</h3>
                        <div class="crop-container" id="cropContainer">
                            <img class="crop-image" id="cropImage" src="${img.src}" style="transform: scale(1) translate(0px, 0px);">
                            <div class="crop-grid">
                                <div class="vline"></div>
                                <div class="vline"></div>
                            </div>
                        </div>
                        <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1">
                        <div style="display:flex; gap:12px; margin-top:20px;">
                            <button id="cropApply" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Apply</button>
                            <button id="cropCancel" style="flex:1; background:#2f3336; border:none; padding:10px; border-radius:9999px; color:white; cursor:pointer;">Cancel</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                const cropImg = document.getElementById('cropImage');
                const container = document.getElementById('cropContainer');
                const slider = document.getElementById('zoomSlider');
                
                const updateTransform = () => {
                    cropImg.style.transform = `scale(${cropScale}) translate(${cropTranslateX}px, ${cropTranslateY}px)`;
                };
                
                slider.addEventListener('input', (e) => {
                    cropScale = parseFloat(e.target.value);
                    updateTransform();
                });
                
                const onMouseDown = (e) => {
                    isDraggingCrop = true;
                    cropStartX = e.clientX;
                    cropStartY = e.clientY;
                    cropStartTranslateX = cropTranslateX;
                    cropStartTranslateY = cropTranslateY;
                    container.style.cursor = 'grabbing';
                    e.preventDefault();
                };
                
                const onMouseMove = (e) => {
                    if (!isDraggingCrop) return;
                    const dx = e.clientX - cropStartX;
                    const dy = e.clientY - cropStartY;
                    cropTranslateX = cropStartTranslateX + dx / cropScale;
                    cropTranslateY = cropStartTranslateY + dy / cropScale;
                    updateTransform();
                };
                
                const onMouseUp = () => {
                    isDraggingCrop = false;
                    container.style.cursor = 'grab';
                };
                
                container.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                
                modal.querySelector('#cropApply').onclick = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 400;
                    canvas.width = size;
                    canvas.height = size;
                    
                    const imgWidth = img.width;
                    const imgHeight = img.height;
                    const scaledWidth = imgWidth * cropScale;
                    const scaledHeight = imgHeight * cropScale;
                    const dx = (size - scaledWidth) / 2 + (cropTranslateX * cropScale);
                    const dy = (size - scaledHeight) / 2 + (cropTranslateY * cropScale);
                    
                    ctx.drawImage(img, dx, dy, scaledWidth, scaledHeight);
                    canvas.toBlob((blob) => {
                        updateAvatar(blob);
                        modal.remove();
                    }, 'image/png');
                };
                
                modal.querySelector('#cropCancel').onclick = () => modal.remove();
                
                const clickOutside = (e) => {
                    if (!modal.contains(e.target)) {
                        modal.remove();
                        document.removeEventListener('click', clickOutside);
                    }
                };
                setTimeout(() => document.addEventListener('click', clickOutside), 100);
            };
        };
        reader.readAsDataURL(file);
    }

        html = html.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return html;
    }

    function showMessage(elementId, message, isError = false) {
        const container = document.getElementById(elementId);
        if (container) {
            const existing = container.querySelector('.error-message, .success-message');
            if (existing) existing.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'error-message' : 'success-message';
            msgDiv.textContent = message;
            container.appendChild(msgDiv);
            setTimeout(() => { if (msgDiv.parentNode) msgDiv.remove(); }, 4000);
        }

    async function loadFeed(reset = false) {

        if (!feedHasMore || feedLoading) return;
        feedLoading = true;
        try {
            const res = await api(`/api/feed?offset=${feedOffset}&limit=15`);
            if (reset) feed = res.posts; else feed = [...feed, ...res.posts];
            feedHasMore = res.hasMore; feedOffset += 15;
            updateUnreadCountAndTitle();
        } catch(e) { console.error(e); }

    function renderMore() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const themeNames = { dark: 'Dark (Black)', 'dark-gray': 'Dark Gray', gray: 'Gray', light: 'Light' };
        
        setTimeout(() => {
            const themeSelect = document.getElementById('themeSelect');
            const langSelect = document.getElementById('languageSelect');
            const notifSelect = document.getElementById('notificationsSelect');
            const nsfwSelect = document.getElementById('nsfwSelect');
            if (themeSelect) { themeSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('themeDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; themeSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            if (langSelect) { langSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('languageDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; langSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            if (notifSelect) { notifSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('notificationsDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; notifSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            if (nsfwSelect) { nsfwSelect.onclick = (e) => { e.stopPropagation(); closeAllDropdowns(); const dropdown = document.getElementById('nsfwDropdown'); if (dropdown) { const isOpen = dropdown.style.display === 'block'; dropdown.style.display = isOpen ? 'none' : 'block'; nsfwSelect.querySelector('.arrow').innerHTML = isOpen ? '▼' : '▲'; if (!isOpen) activeDropdown = dropdown; } }; }
            document.addEventListener('click', (e) => { if (!e.target.closest('.custom-select')) closeAllDropdowns(); });
        }, 10);
        
        const languages = [
            { code: 'en', name: 'English' }, { code: 'ru', name: 'Русский' },
            { code: 'es', name: 'Español' }, { code: 'fr', name: 'Français' },
            { code: 'ar', name: 'العربية' }, { code: 'el', name: 'Ελληνικά' },
            { code: 'zh', name: '中文' }, { code: 'pt', name: 'Português' },
            { code: 'de', name: 'Deutsch' }, { code: 'it', name: 'Italiano' }
        ];
        
        return `<div class="feed-container" style="padding:20px;"><div class="profile-header" style="border-bottom: none;"><div style="text-align:left; margin-bottom:20px;"><h3>${t('account')}</h3><div><span class="email-masked">${t('email')}: ${maskEmail(currentUser?.email)}</span><span class="edit-link" onclick="showChangeEmailModal()">${t('edit')}</span></div><div style="margin-top:12px;"><span style="color:var(--text-primary);">${t('username')}: @${escapeHtml(currentUser?.username)}</span><span class="edit-link" onclick="showChangeUsernameModal()">${t('edit')}</span></div></div><div style="text-align:left; margin-bottom:20px;"><h3>${t('security')}</h3><div><span class="edit-link" onclick="showChangePasswordModal()">${t('changePassword')}</span></div></div><h3 style="text-align:left; margin-bottom:20px;">${t('theme')}</h3><div class="custom-select" id="themeSelect"><span id="selectedThemeText">${themeNames[savedTheme]}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="themeDropdown" style="display:none;"><div class="custom-select-option ${savedTheme === 'dark' ? 'selected' : ''}" onclick="setTheme('dark'); document.getElementById('selectedThemeText').innerText='Dark (Black)';">Dark (Black)</div><div class="custom-select-option ${savedTheme === 'dark-gray' ? 'selected' : ''}" onclick="setTheme('dark-gray'); document.getElementById('selectedThemeText').innerText='Dark Gray';">Dark Gray</div><div class="custom-select-option ${savedTheme === 'gray' ? 'selected' : ''}" onclick="setTheme('gray'); document.getElementById('selectedThemeText').innerText='Gray';">Gray</div><div class="custom-select-option ${savedTheme === 'light' ? 'selected' : ''}" onclick="setTheme('light'); document.getElementById('selectedThemeText').innerText='Light';">Light</div></div></div><h3 style="text-align:left; margin-bottom:20px; margin-top:20px;">${t('language')}</h3><div class="custom-select" id="languageSelect"><span id="selectedLanguageText">${languages.find(l => l.code === currentLang)?.name || 'English'}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="languageDropdown" style="display:none;">${languages.map(lang => `<div class="custom-select-option ${currentLang === lang.code ? 'selected' : ''}" onclick="setLanguage('${lang.code}'); document.getElementById('selectedLanguageText').innerText='${lang.name}';">${lang.name}</div>`).join('')}</div></div><div class="notification-settings"><h3>${t('notificationsSettings')}</h3><div class="custom-select" id="notificationsSelect"><span id="selectedNotifText">${notificationSetting === 'all' ? t('allNotifications') : (notificationSetting === 'mentions' ? t('mentionsOnly') : t('none'))}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="notificationsDropdown" style="display:none;"><div class="custom-select-option ${notificationSetting === 'all' ? 'selected' : ''}" onclick="setNotificationSetting('all'); document.getElementById('selectedNotifText').innerText='${t('allNotifications')}';">${t('allNotifications')}</div><div class="custom-select-option ${notificationSetting === 'mentions' ? 'selected' : ''}" onclick="setNotificationSetting('mentions'); document.getElementById('selectedNotifText').innerText='${t('mentionsOnly')}';">${t('mentionsOnly')}</div><div class="custom-select-option ${notificationSetting === 'none' ? 'selected' : ''}" onclick="setNotificationSetting('none'); document.getElementById('selectedNotifText').innerText='${t('none')}';">${t('none')}</div></div></div></div><h3 style="text-align:left; margin-bottom:16px; margin-top:24px;">Content Settings</h3><div class="custom-select" id="nsfwSelect"><span id="selectedNsfwText">${nsfwEnabled ? t('nsfwEnabled') : t('nsfwDisabled')}</span><span class="arrow">▼</span><div class="custom-select-dropdown" id="nsfwDropdown" style="display:none;"><div class="custom-select-option ${nsfwEnabled === true ? 'selected' : ''}" onclick="setNsfwSetting(true); document.getElementById('selectedNsfwText').innerText='${t('nsfwEnabled')}';">${t('nsfwEnabled')}</div><div class="custom-select-option ${nsfwEnabled === false ? 'selected' : ''}" onclick="setNsfwSetting(false); document.getElementById('selectedNsfwText').innerText='${t('nsfwDisabled')}';">${t('nsfwDisabled')}</div></div></div><h3 style="text-align:left; margin-bottom:16px; margin-top:24px;">Features</h3><div class="static-card" onclick="showStatsModal()" style="cursor:pointer; margin-bottom:10px;"><div><strong>${t('stats')}</strong><div style="color:var(--text-secondary);">View your account statistics</div></div></div>${isModeratorOrAdmin() ? `<div class="static-card" onclick="showReportsModal()" style="cursor:pointer; margin-bottom:10px;"><div><strong>📋 ${t('reports')}</strong><div style="color:var(--text-secondary);">View user reports</div></div></div>` : ''}</div><div class="static-card" onclick="showDeleteAccountModal()" style="cursor:pointer; margin-bottom:10px; border-color:#f4212e;"><div><strong style="color:#f4212e;">${t('deleteAccount')}</strong><div style="color:var(--text-secondary);">${t('deleteAccountWarning')}</div></div></div><div class="footer-note">© 2026 FreedomNet</div></div>`;
    }
    
    function openAvatarUpload() { 
        closeAllDropdowns(); 
        closePreviewPopup(); 
        const input = document.createElement('input'); 
        input.type = 'file'; 
        input.accept = 'image/*,image/gif'; 
        input.onchange = (e) => { 
            const file = e.target.files[0]; 
            if (file) {
                openAdvancedCropModal(file);
            }
        }; 
        input.click(); 
    }
    
    function publishPost(content = null) {
        const c = content || document.getElementById('postContent')?.value;
        if (!c || c.trim().length < 1) { showToast('Post must contain at least 1 character', true); return; }
        if (c.length > 500) { showToast('Post cannot exceed 500 characters', true); return; }
        publishPostAsync(c);
    }
    
    async function publishPostAsync(content) {
        const formData = new FormData(); 
        formData.append('content', content);
        if (pendingImage) { 
            const blob = await fetch(pendingImage).then(r => r.blob()); 
            formData.append('image', blob, 'photo.jpg'); 
        }
        await api('/api/posts', { method: 'POST', body: formData });
        pendingImage = null; 
        if (document.getElementById('postContent')) document.getElementById('postContent').value = ''; 
        if (document.getElementById('imagePreview')) document.getElementById('imagePreview').innerHTML = '';
        await loadFeed(true);
        sendWebSocketMessage('new_post', {});
        renderMain();
    }
    
    function updateFeedPosts() { 
        const container = document.getElementById('feedPosts'); 
        if (container) container.innerHTML = feed.map(post => renderPostCard(post)).join(''); 
        const loader = document.getElementById('feedLoader'); 
        if (loader && !feedHasMore) loader.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">You\'ve seen all posts</div>'; 
    }
    
    window.searchConversations = () => {
        const query = document.getElementById('conversationsSearch')?.value.toLowerCase() || '';
        const container = document.getElementById('conversationsList');
        if (container) {
            const items = container.querySelectorAll('.conversation-item');
            items.forEach(item => {
                const name = item.querySelector('.conversation-name')?.innerText.toLowerCase() || '';
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }
    };
    
    function startFakeOnlineCounter() {
        function updateCounter() {
            const change = Math.random() > 0.5 ? 1 : -1;
            let newValue = fakeOnlineCount + change;
            if (newValue < 7) newValue = 8;
            if (newValue > 34) newValue = 33;
            fakeOnlineCount = newValue;
            const onlineCountSpan = document.getElementById('fakeOnlineCount');
            if (onlineCountSpan) onlineCountSpan.textContent = fakeOnlineCount;
            const nextUpdate = Math.floor(Math.random() * (30000 - 10000 + 1) + 10000);
            setTimeout(updateCounter, nextUpdate);
        }
        const firstDelay = Math.floor(Math.random() * (30000 - 10000 + 1) + 10000);
        setTimeout(updateCounter, firstDelay);
    }

    const tabs = ['feed', 'profile', 'messages', 'search', 'interesting', 'notifications', 'create', 'feedback', 'more'];
    const allowedDomains = ['gmail.com', 'mail.com', 'hotmail.com', 'outlook.com', 'yahoo.com'];

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function isValidEmail(email) { return allowedDomains.includes(email.split('@')[1]); }

    function maskEmail(email) {
        if (!email) return '';
        const [local, domain] = email.split('@');
        return `${local[0]}*****${local[local.length-1]}@${domain[0]}***${domain[domain.length-1]}`;
    }

    function updateUnreadCountAndTitle() {
        const newCount = feed.filter(post => !post.read).length;
        unreadCount = Math.min(newCount, 99);
        updateTitleWithUnread();
    }

    async function renderMain() {
        await loadFeed(); await loadConversationsList();
        for (const user of allUsers) { const isOnline = await checkUserOnline(user.id); if (isOnline) onlineUsers.add(user.id); else onlineUsers.delete(user.id); }
        setInterval(async () => { for (const user of allUsers) { const isOnline = await checkUserOnline(user.id); if (isOnline) onlineUsers.add(user.id); else onlineUsers.delete(user.id); } if (currentTab === 'profile') renderMain(); }, 10000);
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;
        const root = document.getElementById('root');
        if (currentTab === 'profile') {
            root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map((tab, idx) => `<div class="nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top: 40px;"><span class="nav-text logout-btn">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0, 5).map((tab, idx) => `<div class="bottom-nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${t('profile')}</div>${renderProfilePage()}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
            attachGlobalEvents(); 
            startLogoPulse();
            return;
        }
        root.innerHTML = `<div class="app"><div class="sidebar"><div class="logo" onclick="switchTab('feed')">FreedomNet</div>${tabs.map((tab, idx) => `<div class="nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span class="nav-text">${t(tab)}</span></div>`).join('')}<div class="nav-item logout" onclick="showLogoutConfirm()" style="margin-top: 40px;"><span class="nav-text logout-btn">${t('logout')}</span></div></div><div class="bottom-nav">${tabs.slice(0, 5).map((tab, idx) => `<div class="bottom-nav-item ${currentTab === tabs[idx] ? 'active' : ''}" onclick="switchTab('${tabs[idx]}')"><span>${t(tab)}</span></div>`).join('')}</div><div class="main-content"><div class="header">${currentTab === 'more' ? t('settings') : t(currentTab)}</div>${currentTab === 'feed' ? renderHome() : ''}${currentTab === 'messages' ? renderMessages() : ''}${currentTab === 'search' ? renderSearch() : ''}${currentTab === 'interesting' ? renderInteresting() : ''}${currentTab === 'notifications' ? renderNotifications() : ''}${currentTab === 'create' ? '<div class="feed-container" style="padding:20px;"><div class="static-card" onclick="showCreateModal()" style="cursor:pointer;"><div><strong>✏️ ' + t('create') + ' ' + t('post') + '</strong><div style="color:var(--text-secondary);">Share what\'s happening</div></div></div></div>' : ''}${currentTab === 'feedback' ? renderFeedback() : ''}${currentTab === 'more' ? renderMore() : ''}<div class="global-footer">© 2026 FreedomNet</div></div></div>`;
        if (currentTab === 'feed') { updateFeedPosts(); attachHomeEvents(); const feedContainer = document.getElementById('feedContainer'); if (feedContainer) { const onScroll = () => { if (feedContainer.scrollTop + feedContainer.clientHeight >= feedContainer.scrollHeight - 100) { loadFeed(); updateFeedPosts(); } }; feedContainer.addEventListener('scroll', onScroll); } }
        attachGlobalEvents();
        startLogoPulse();
    }
    
    function startLogoPulse() {
        const logo = document.querySelector('.logo');
        if (!logo) return;
        function applyPulse() {
            logo.classList.add('logo-pulse');
            setTimeout(() => logo.classList.remove('logo-pulse'), 3000);
            const nextInterval = Math.floor(Math.random() * (300000 - 50000 + 1) + 50000);
            setTimeout(applyPulse, nextInterval);
        }
        const firstDelay = Math.floor(Math.random() * (300000 - 50000 + 1) + 50000);
        setTimeout(applyPulse, firstDelay);
    }
    
    window.showLogoutConfirm = () => { showConfirmDialog('Are you sure you want to logout?', async () => { await api('/api/logout', { method: 'POST' }); if (ws) ws.close(); currentUser = null; render(); }, true); };
    
    function attachGlobalEvents() {
        document.querySelectorAll('.mention, .hashtag, .post-username, .post-avatar-img, .avatar-placeholder, .avatar-img, .verified-badge, .gold-badge, .moderator-badge, .admin-badge').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (el.classList.contains('verified-badge') || el.classList.contains('gold-badge') || el.classList.contains('moderator-badge') || el.classList.contains('admin-badge')) {
                    const username = el.closest('[data-username]')?.dataset?.username || el.closest('.post-user')?.querySelector('.post-username')?.dataset?.username;
                    if (username) { const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now(), is_creator: true }; const rect = el.getBoundingClientRect(); showVerificationPopup(user, rect.left, rect.bottom + 5, el.classList.contains('gold-badge')); }
                    return;
                }
                const username = el.dataset?.mention || el.dataset?.username || el.closest('[data-username]')?.dataset?.username;
                if (username) { const user = allUsers.find(u => u.username === username) || { username, created_at: Date.now() }; const rect = el.getBoundingClientRect(); showUserPreview(user, rect.left, rect.bottom + 5); }
            });
        });
    }
    
    function attachHomeEvents() {
        const textarea = document.getElementById('postContent');
        const suggestionsContainer = document.getElementById('suggestionsContainer');
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                const value = e.target.value;
                const lastWord = value.split(/[\s\n]/).pop();
                if (lastWord && (lastWord.startsWith('@') || lastWord.startsWith('#'))) {
                    const query = lastWord.substring(1);
                    if (lastWord.startsWith('@')) {
                        const matches = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase())).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m.username}" data-type="mention" style="padding:10px 12px; cursor:pointer;">@${escapeHtml(m.username)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    } else {
                        const hashtags = ['trending', 'news', 'viral', 'coding', 'design', 'tech', 'art', 'music'];
                        const matches = hashtags.filter(h => h.includes(query)).slice(0,5);
                        if (matches.length) suggestionsContainer.innerHTML = `<div class="suggestions-dropdown" style="position:absolute; bottom:100%; left:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:12px;">${matches.map(m => `<div class="suggestion-item" data-suggestion="${m}" data-type="hashtag" style="padding:10px 12px; cursor:pointer;">#${escapeHtml(m)}</div>`).join('')}</div>`;
                        else suggestionsContainer.innerHTML = '';
                    }
                    document.querySelectorAll('.suggestion-item').forEach(el => {
                        el.addEventListener('click', () => { const newValue = value.substring(0, value.length - lastWord.length) + (el.dataset.type === 'mention' ? '@' : '#') + el.dataset.suggestion + ' '; textarea.value = newValue; suggestionsContainer.innerHTML = ''; textarea.focus(); });
                    });
                } else suggestionsContainer.innerHTML = '';
            });
        }
        const imageInput = document.getElementById('postImage');
        if (imageInput) { 
            imageInput.addEventListener('change', (e) => { 
                const file = e.target.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (ev) => { 
                        pendingImage = ev.target.result; 
                        document.getElementById('imagePreview').innerHTML = `<div class="post-image-container" style="position:relative; display:inline-block;"><img src="${pendingImage}" style="max-width:100%; max-height:150px; border-radius:12px;"><button class="remove-image-btn" onclick="removePendingImage()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:20px; padding:6px 12px; font-size:12px; cursor:pointer; transition:background 0.2s ease;">Remove image</button></div>`; 
                    }; 
                    reader.readAsDataURL(file); 
                } 
            }); 
        }
    }
    
    function removePendingImage() {
        pendingImage = null;
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('postImage').value = '';
    }
    
    window.toggleLike = async (postId) => { const post = feed.find(p => p.id === postId); if (post.user_liked) await api(`/api/like/${postId}`, { method: 'DELETE' }); else await api(`/api/like/${postId}`, { method: 'POST' }); await loadFeed(true); sendWebSocketMessage('like_update', { post_id: postId }); renderMain(); };
    window.toggleComments = (postId) => { const el = document.getElementById(`comments-${postId}`); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
    window.addComment = async (postId) => { const input = document.getElementById(`commentInput-${postId}`); const content = input?.value.trim(); if (!content) return; await api(`/api/comment/${postId}`, { method: 'POST', body: JSON.stringify({ content }), headers: { 'Content-Type': 'application/json' } }); await loadFeed(true); sendWebSocketMessage('new_comment', { post_id: postId }); renderMain(); };
    window.switchTab = (tab) => { currentTab = tab; currentProfileUser = null; currentChatUser = null; closeAllDropdowns(); closePreviewPopup(); renderMain(); };
    window.performSearch = async () => { if (!searchQuery.trim()) { searchResults = []; searchPosts = []; renderMain(); return; } try { const res = await api(`/api/search?q=${encodeURIComponent(searchQuery)}`); searchResults = res.users || []; searchPosts = res.posts || []; renderMain(); } catch(e) { searchResults = []; searchPosts = []; } };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    
    startFakeOnlineCounter();
    
    (async () => { try { const me = await api('/api/me'); if (me.user) { currentUser = me.user; await loadFeed(true); await loadConversationsList(); await loadAllUsers(); await loadFollows(); connectWebSocket(); } } catch(e) {} render(); })();
</script>
