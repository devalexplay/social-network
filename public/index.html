<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System | Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles"></div>
    
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-container">
                        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <h1>Auth<span>Flow</span></h1>
                    </div>
                    <p class="subtitle">Secure authentication system</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="input-field">
                        <input type="text" id="loginUsername" required>
                        <label>Username or Email</label>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="loginPassword" required>
                        <label>Password</label>
                        <div class="input-border"></div>
                        <button type="button" class="toggle-password" data-target="loginPassword">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/>
                                <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span>Sign In</span>
                        <svg class="btn-arrow" viewBox="0 0 24 24">
                            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                </form>
                
                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="input-field">
                        <input type="text" id="regFullName" required>
                        <label>Full Name</label>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <input type="text" id="regUsername" required>
                        <label>Username</label>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <input type="email" id="regEmail" required>
                        <label>Email</label>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="regPassword" required>
                        <label>Password</label>
                        <div class="input-border"></div>
                        <button type="button" class="toggle-password" data-target="regPassword">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/>
                                <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="input-field">
                        <input type="password" id="regConfirmPassword" required>
                        <label>Confirm Password</label>
                        <div class="input-border"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span>Create Account</span>
                        <svg class="btn-arrow" viewBox="0 0 24 24">
                            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                </form>
                
                <div id="message" class="message-container"></div>
            </div>
            
            <div class="auth-footer">
                <p>&copy; 2024 AuthFlow. All rights reserved.</p>
            </div>
        </div>
    </div>
    
    <!-- Dashboard (hidden initially) -->
    <div id="dashboard" class="dashboard">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <div class="user-greeting">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <h2>Welcome back, <span id="userName"></span>!</h2>
                </div>
                <button id="logoutBtn" class="logout-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2"/>
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2"/>
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    Logout
                </button>
            </div>
            <div class="dashboard-content">
                <div class="test-box">
                    <h3>✅ Authentication Successful</h3>
                    <p>You have successfully logged in to the system.</p>
                    <div class="test-divider"></div>
                    <div class="test-status">
                        <span class="status-badge">TEST MODE</span>
                        <span class="status-text">This is your authenticated dashboard</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
